<body>
<canvas id="c"></canvas>
<script>
'use strict';
const canvas=document.getElementById('c');
const ctx=canvas.getContext('2d');

// ── RESIZE ──────────────────────────────────────
let W=400,H=640;
let vigGrad=null,bgGrad=null;
function resize(){
  const vw=window.innerWidth,vh=window.innerHeight,asp=400/640;
  if(vw/vh<asp){W=vw;H=Math.round(vw/asp);}else{H=vh;W=Math.round(vh*asp);}
  if(W>480){H=Math.round(480/asp);W=480;}
  canvas.width=W;canvas.height=H;
  canvas.style.width=W+'px';canvas.style.height=H+'px';
  vigGrad=null;bgGrad=null;
  genSkyline();
}
resize();
window.addEventListener('resize',resize);

// ── HI-SCORE (persistent) ───────────────────────
let hiScore=0;
try{hiScore=parseInt(localStorage.getItem('dronex_hi'))||0;}catch(e){}
function saveHi(){try{localStorage.setItem('dronex_hi',hiScore);}catch(e){}}

// ── AUDIO ──────────────────────────────────────
let ac=null;
function getAC(){
  if(!ac) ac=new(window.AudioContext||window.webkitAudioContext)();
  if(ac.state==='suspended') ac.resume();
  return ac;
}
function tone(freq,type,dur,vol,t0){
  vol=vol||0.1;t0=t0||0;
  try{
    const a=getAC(),o=a.createOscillator(),g=a.createGain();
    o.connect(g);g.connect(a.destination);
    o.type=type;o.frequency.setValueAtTime(freq,a.currentTime+t0);
    g.gain.setValueAtTime(vol,a.currentTime+t0);
    g.gain.exponentialRampToValueAtTime(0.0001,a.currentTime+t0+dur);
    o.start(a.currentTime+t0);o.stop(a.currentTime+t0+dur+0.05);
  }catch(e){}
}
// Engine hum
var engA=null,engB=null,engGA=null,engGB=null;
function startEngine(){
  try{
    const a=getAC();
    engA=a.createOscillator();engGA=a.createGain();
    engB=a.createOscillator();engGB=a.createGain();
    engA.connect(engGA);engGA.connect(a.destination);
    engB.connect(engGB);engGB.connect(a.destination);
    engA.type='sine';engA.frequency.value=48;
    engB.type='sine';engB.frequency.value=96;
    engGA.gain.value=0;engGB.gain.value=0;
    engGA.gain.setTargetAtTime(0.036,a.currentTime,0.65);
    engGB.gain.setTargetAtTime(0.013,a.currentTime,0.65);
    engA.start();engB.start();
  }catch(e){}
}
function stopEngine(){
  try{
    if(!engA) return;
    const t=getAC().currentTime;
    engGA.gain.setTargetAtTime(0,t,0.2);
    engGB.gain.setTargetAtTime(0,t,0.2);
    var a=engA,b=engB; engA=engB=engGA=engGB=null;
    setTimeout(function(){try{a.stop();b.stop();}catch(e){}},700);
  }catch(e){}
}
function pitchEngine(norm){
  try{
    if(!engA) return;
    var t=getAC().currentTime;
    engA.frequency.setTargetAtTime(48+norm*30,t,0.4);
    engB.frequency.setTargetAtTime(96+norm*60,t,0.4);
  }catch(e){}
}
const sfx={
  flap:function(){tone(155,'square',0.07,0.1);},
  score:function(){tone(440,'sine',0.07,0.07);tone(660,'sine',0.07,0.07,0.08);},
  chip:function(m){tone(480+m*70,'sine',0.07,0.09);},
  die:function(){tone(220,'sawtooth',0.18,0.18);tone(130,'sawtooth',0.25,0.18,0.16);tone(80,'sawtooth',0.35,0.18,0.3);},
  shield:function(){tone(320,'sine',0.09,0.1);tone(480,'sine',0.09,0.1,0.1);tone(640,'sine',0.12,0.1,0.2);},
  shieldBreak:function(){tone(500,'square',0.08,0.15);tone(220,'square',0.18,0.15,0.09);},
  emp:function(){tone(80,'sawtooth',0.1,0.22);tone(420,'square',0.07,0.16,0.08);tone(200,'sine',0.32,0.14,0.12);},
  closeCall:function(){tone(172,'sine',0.12,0.07);},
  levelUp:function(){tone(300,'square',0.05,0.1);tone(400,'square',0.05,0.1,0.07);tone(600,'square',0.1,0.1,0.14);},
  comboBreak:function(m){tone(260+m*55,'triangle',0.09,0.11);}
};

// ── PARTICLES (typed array pool — zero GC) ──────
var MAX_P=280;
var PX=new Float32Array(MAX_P),PY=new Float32Array(MAX_P);
var PVX=new Float32Array(MAX_P),PVY=new Float32Array(MAX_P);
var PL=new Float32Array(MAX_P),PML=new Float32Array(MAX_P);
var PSZ=new Float32Array(MAX_P),PC=new Uint8Array(MAX_P),PA=new Uint8Array(MAX_P);
// Color lookup [r,g,b,maxAlpha] — desaturated, industrial palette
var PCLR=[
  [160,185,200,0.35],  // COL_TRAIL  — cold blue-gray exhaust
  [210,140,60,1.0],    // COL_EXPL   — amber/bronze explosion
  [140,195,220,0.75],  // COL_SHIELD — steel-blue shield
  [200,175,90,0.88],   // COL_EMP    — dusty gold EMP
  [130,160,180,0.55],  // COL_FLAP   — muted slate flap
  [100,195,140,0.80],  // COL_CHIP   — military green chip
  [175,165,150,0.65],  // COL_DEBRIS — concrete debris
  [220,195,120,0.82]   // COL_SPARK  — brass spark
];
var COL_TRAIL=0,COL_EXPL=1,COL_SHIELD=2,COL_EMP=3,COL_FLAP=4,COL_CHIP=5,COL_DEBRIS=6,COL_SPARK=7;
function emit(x,y,vx,vy,life,size,col){
  for(var i=0;i<MAX_P;i++){
    if(PA[i]) continue;
    PX[i]=x;PY[i]=y;PVX[i]=vx;PVY[i]=vy;
    PL[i]=life;PML[i]=life;PSZ[i]=size;PC[i]=col;PA[i]=1;
    return;
  }
}
function burst(x,y,n,col,spd,life){
  for(var i=0;i<n;i++){
    var a=Math.random()*6.2832,s=(0.4+Math.random())*spd*H*0.009;
    emit(x,y,Math.cos(a)*s,Math.sin(a)*s,life*0.5+Math.random()*life*0.5,W*0.005+Math.random()*W*0.009,col);
  }
}

// ── SKYLINE ─────────────────────────────────────
// Three depth layers: far, mid, near
var BLDG_N=90;
var BX=new Float32Array(BLDG_N),BW=new Float32Array(BLDG_N),BH=new Float32Array(BLDG_N);
var BLY=new Uint8Array(BLDG_N); // layer: 0=far,1=mid,2=near
var skyW=1;
// Window lights
var WLN=18;
var WLBi=new Uint8Array(WLN),WLFx=new Float32Array(WLN),WLFy=new Float32Array(WLN),WLFv=new Float32Array(WLN);
// Antenna blink timers
var ANT_N=8;
var ANTbi=new Uint8Array(ANT_N),ANTt=new Float32Array(ANT_N);
function genSkyline(){
  var x=0;
  for(var i=0;i<BLDG_N;i++){
    var w=W*(0.035+Math.random()*0.09),h=H*(0.055+Math.random()*0.24);
    BX[i]=x;BW[i]=w;BH[i]=h;
    BLY[i]=Math.random()<0.35?0:(Math.random()<0.5?1:2);
    x+=w+W*(0.008+Math.random()*0.025);
  }
  skyW=x;
  for(var j=0;j<WLN;j++){
    WLBi[j]=Math.floor(Math.random()*BLDG_N);
    WLFx[j]=0.1+Math.random()*0.8;WLFy[j]=0.1+Math.random()*0.85;WLFv[j]=Math.random();
  }
  for(var k=0;k<ANT_N;k++){
    ANTbi[k]=Math.floor(Math.random()*BLDG_N);
    ANTt[k]=Math.random()*120;
  }
}

// ── GAME STATE ──────────────────────────────────
var ST={MENU:0,PLAY:1,DEAD:2};
var state=ST.MENU,score=0,frame=0;
var shakeT=0,shakeX=0,shakeY=0;
var lastLv=1,lvMsg='',lvMsgT=0;
var closeCallT=0;
var combo=0;
var empFlash=0;
var bgOff=0;
let countdown=0,goTimer=0;

// ── DRONE ───────────────────────────────────────
var dr={x:0,y:0,vy:0,ang:0,shield:false,shT:0};
// Motion blur trail — ring buffer
var MBLUR_N=6;
var MBX=new Float32Array(MBLUR_N),MBY=new Float32Array(MBLUR_N),MBANG=new Float32Array(MBLUR_N);
var mblurIdx=0;
function resetDrone(){
  dr.x=W*0.27;dr.y=H*0.5;dr.vy=0;dr.ang=0;dr.shield=false;dr.shT=0;
  for(var i=0;i<MBLUR_N;i++){MBX[i]=dr.x;MBY[i]=dr.y;MBANG[i]=0;}
  mblurIdx=0;
}

// ── DIFFICULTY ──────────────────────────────────
function spd(){return W*0.004+score*W*0.00012+Math.floor(score/8)*W*0.0004;}
function gap(){return Math.max(H*0.245,H*0.41-score*H*0.0025);}
function spawnEvery(){return Math.max(88,155-score*2.2);}
function lvNum(){return Math.floor(score/8)+1;}
function comboMult(){return Math.min(4,1+Math.floor(combo/3));}

// ── PIPES ───────────────────────────────────────
var pipes=[],pipeT=0;
function mkPipe(){
  var g=gap(),minY=H*0.12,maxY=H*0.88-g;
  var gY=minY+Math.random()*(maxY-minY);
  var mov=score>=20&&Math.random()<0.42;
  return{x:W+W*0.1,gY:gY,g:g,w:W*0.145,scored:false,
    mov:mov,baseY:gY,mAmp:mov?H*(0.04+Math.random()*0.06):0,
    mSpd:mov?(0.018+Math.random()*0.022):0,mPh:Math.random()*6.2832};
}

// ── POWERUPS ────────────────────────────────────
var pups=[],pupT=0;
var PUP_EVERY=432;
function mkPup(){
  return{x:W+20,y:H*0.17+Math.random()*H*0.66,r:W*0.028,
    type:Math.random()<0.62?0:1,pulse:Math.random()*6.2832};
}

// ── DATA CHIPS ──────────────────────────────────
var chips=[];
function mkChip(pipe){
  if(Math.random()>0.72) return null;
  return{x:pipe.x+pipe.w*0.5+W*0.24,
    y:pipe.gY+pipe.g*0.5+(Math.random()-0.5)*pipe.g*0.3,
    r:W*0.019,pulse:Math.random()*6.2832};
}

// ── FLOATING POPUPS ─────────────────────────────
var pops=[];
function addPop(x,y,txt,r,g,b){
  pops.push({x:x,y:y,txt:txt,r:r,g:g,b:b,life:1,vy:-H*0.006});
}

// ── SCORE REPORTING TO APP ──────────────────────
function sendScoreToApp(score, isNewRecord) {
  if (window.ReactNativeWebView) {
    window.ReactNativeWebView.postMessage(JSON.stringify({
      type: 'SEND_SCORE',
      score: score,
      game: 'DroneX',
      isNewRecord: isNewRecord,
    }));
  }
}

// ── START/RESET ─────────────────────────────────
function startGame(){
  score=0;frame=0;pipeT=0;pupT=0;
  pipes=[];pups=[];chips=[];pops=[];
  PA.fill(0);
  lastLv=1;lvMsg='';lvMsgT=0;
  closeCallT=0;combo=0;empFlash=0;bgOff=0;
  resetDrone();
  stopEngine();startEngine();
  state=ST.PLAY;
  countdown=210;
  goTimer=0;
}

// ── INPUT ───────────────────────────────────────
var inputLock=false;
function onInput(){
  if(state===ST.MENU||state===ST.DEAD){
    if(!inputLock){startGame();inputLock=true;setTimeout(function(){inputLock=false;},300);}
    return;
  }
  if(state===ST.PLAY&&countdown>0) return;
  dr.vy=-H*0.023;
  sfx.flap();
  burst(dr.x-W*0.04,dr.y,3,COL_FLAP,0.6,0.26);
}
window.addEventListener('keydown',function(e){
  if(e.code==='Space'||e.code==='ArrowUp'){e.preventDefault();onInput();}
});
canvas.addEventListener('pointerdown',function(e){e.preventDefault();onInput();},{passive:false});

// ── COLLISION ───────────────────────────────────
function hit(){
  var hw=W*0.046,hh=H*0.026;
  if(dr.y-hh<=0||dr.y+hh>=H) return true;
  for(var i=0;i<pipes.length;i++){
    var p=pipes[i];
    if(dr.x+hw>p.x&&dr.x-hw<p.x+p.w)
      if(dr.y-hh<p.gY||dr.y+hh>p.gY+p.g) return true;
  }
  return false;
}
function nearMiss(){
  var mg=H*0.044;
  for(var i=0;i<pipes.length;i++){
    var p=pipes[i];
    if(p.x<dr.x&&p.x+p.w>dr.x-W*0.05)
      if(dr.y-H*0.026<p.gY+mg||dr.y+H*0.026>p.gY+p.g-mg) return true;
  }
  return false;
}
function pipeDanger(p){
  if(dr.x+W*0.12<p.x||dr.x-W*0.05>p.x+p.w) return 0;
  var fTop=dr.y-p.gY,fBot=(p.gY+p.g)-dr.y;
  return Math.max(0,Math.min(1,1-Math.min(fTop,fBot)/(p.g*0.38)));
}

// ── DRAW BACKGROUND ─────────────────────────────
// Pre-baked noise texture for grunge overlay
var noiseCanvas=null,noiseCtx=null;
function ensureNoise(){
  if(noiseCanvas) return;
  noiseCanvas=document.createElement('canvas');
  noiseCanvas.width=128;noiseCanvas.height=128;
  noiseCtx=noiseCanvas.getContext('2d');
  var id=noiseCtx.createImageData(128,128),d=id.data;
  for(var i=0;i<d.length;i+=4){
    var v=Math.random()*40|0;
    d[i]=d[i+1]=d[i+2]=v;d[i+3]=Math.random()*38|0;
  }
  noiseCtx.putImageData(id,0,0);
}

function drawBg(){
  ensureNoise();
  // Sky gradient — overcast charcoal
  var skyG=ctx.createLinearGradient(0,0,0,H*0.68);
  skyG.addColorStop(0,'#0d1017');
  skyG.addColorStop(0.55,'#111620');
  skyG.addColorStop(1,'#0a0e18');
  ctx.fillStyle=skyG;
  ctx.fillRect(0,0,W,H);

  // Ground fog band
  var fogG=ctx.createLinearGradient(0,H*0.55,0,H);
  fogG.addColorStop(0,'rgba(10,14,22,0)');
  fogG.addColorStop(0.5,'rgba(8,12,20,0.55)');
  fogG.addColorStop(1,'rgba(6,9,16,0.88)');
  ctx.fillStyle=fogG;
  ctx.fillRect(0,H*0.55,W,H*0.45);

  // Distant haze glow — amber city light pollution on horizon
  var haze=ctx.createRadialGradient(W*0.5,H*0.72,0,W*0.5,H*0.72,W*0.7);
  haze.addColorStop(0,'rgba(80,55,28,0.22)');
  haze.addColorStop(0.55,'rgba(50,35,14,0.09)');
  haze.addColorStop(1,'rgba(0,0,0,0)');
  ctx.fillStyle=haze;
  ctx.fillRect(0,H*0.4,W,H*0.6);

  var sc=(bgOff*0.15)%skyW;

  // Layer 0 — far buildings (very dark, minimal)
  for(var i=0;i<BLDG_N;i++){
    if(BLY[i]!==0) continue;
    var bx=BX[i]-sc;
    while(bx>W) bx-=skyW;
    while(bx+BW[i]<0) bx+=skyW;
    ctx.fillStyle='#0e1218';
    ctx.fillRect(bx,H-BH[i]*0.55,BW[i]*0.9,BH[i]*0.55);
  }

  // Layer 1 — mid buildings
  for(var i=0;i<BLDG_N;i++){
    if(BLY[i]!==1) continue;
    var bx=BX[i]-sc*1.0;
    while(bx>W) bx-=skyW;
    while(bx+BW[i]<0) bx+=skyW;
    // Main body — dark steel
    ctx.fillStyle='#111820';
    ctx.fillRect(bx,H-BH[i]*0.78,BW[i],BH[i]*0.78);
    // Top edge highlight — lighter rim suggesting moonlight
    ctx.fillStyle='rgba(90,105,120,0.22)';
    ctx.fillRect(bx,H-BH[i]*0.78,BW[i],2);
    // Subtle vertical panel seams
    ctx.fillStyle='rgba(0,0,0,0.3)';
    for(var sx=bx+BW[i]*0.33;sx<bx+BW[i]-2;sx+=BW[i]*0.33){
      ctx.fillRect(sx,H-BH[i]*0.78,1,BH[i]*0.78);
    }
  }

  // Layer 2 — near buildings (most detail)
  for(var i=0;i<BLDG_N;i++){
    if(BLY[i]!==2) continue;
    var bx=BX[i]-sc*1.0;
    while(bx>W) bx-=skyW;
    while(bx+BW[i]<0) bx+=skyW;
    var bh=BH[i];
    // Body
    ctx.fillStyle='#161e28';
    ctx.fillRect(bx,H-bh,BW[i],bh);
    // Concrete ledge bands
    ctx.fillStyle='rgba(40,52,64,0.7)';
    for(var ly=H-bh+bh*0.25;ly<H;ly+=bh*0.18){
      ctx.fillRect(bx-1,ly,BW[i]+2,Math.max(1,H*0.004));
    }
    // Left face edge (moonlight rim)
    ctx.fillStyle='rgba(80,100,118,0.28)';
    ctx.fillRect(bx,H-bh,2,bh);
    // Roof parapet
    ctx.fillStyle='#1e2a38';
    ctx.fillRect(bx-W*0.003,H-bh-H*0.01,BW[i]+W*0.006,H*0.01);
  }

  // Window lights — amber/dim white, not neon
  for(var j=0;j<WLN;j++){
    if(WLFv[j]>0.38){
      var bi=WLBi[j];
      var bx2=BX[bi]-sc;
      while(bx2>W) bx2-=skyW;
      while(bx2+BW[bi]<0) bx2+=skyW;
      var bright=WLFv[j];
      // Warm amber or cool dim white
      var isWarm=j%3!==0;
      var wr=isWarm?180:140,wg=isWarm?130:150,wb=isWarm?55:165;
      ctx.fillStyle='rgba('+wr+','+wg+','+wb+','+(bright*0.28).toFixed(2)+')';
      var wx=bx2+BW[bi]*WLFx[j],wy=H-BH[bi]+BH[bi]*WLFy[j];
      ctx.fillRect(wx,wy,W*0.009,H*0.011);
      // Soft light bleed on wall
      ctx.fillStyle='rgba('+wr+','+wg+','+wb+','+(bright*0.05).toFixed(2)+')';
      ctx.fillRect(wx-2,wy-1,W*0.015,H*0.018);
    }
  }

  // Antenna red blink lights
  for(var k=0;k<ANT_N;k++){
    ANTt[k]++;
    var bi2=ANTbi[k];
    if(BLY[bi2]===0) continue;
    var bx3=BX[bi2]-sc;
    while(bx3>W) bx3-=skyW;
    while(bx3+BW[bi2]<0) bx3+=skyW;
    // blink cycle: 0-60 off, 60-80 on
    var phase=(ANTt[k]%120);
    if(phase>100){
      var bri=(phase<110)?(phase-100)/10:1-(phase-110)/10;
      ctx.fillStyle='rgba(200,60,40,'+(bri*0.85).toFixed(2)+')';
      ctx.beginPath();
      ctx.arc(bx3+BW[bi2]*0.5,H-BH[bi2]-H*0.012,H*0.004,0,6.2832);
      ctx.fill();
    }
  }

  // Fine horizontal scan-grid — very subtle depth cue
  ctx.strokeStyle='rgba(20,32,48,0.55)';
  ctx.lineWidth=0.5;
  var gs=H*0.045;
  var gscY=(bgOff*0.6)%gs;
  for(var y=gscY-gs;y<H;y+=gs){
    ctx.beginPath();ctx.moveTo(0,y);ctx.lineTo(W,y);ctx.stroke();
  }
  // Vertical lines, wider spacing
  var gsvX=bgOff%( W*0.22);
  ctx.strokeStyle='rgba(15,26,42,0.45)';
  for(var x=gsvX-W*0.22;x<W;x+=W*0.22){
    ctx.beginPath();ctx.moveTo(x,0);ctx.lineTo(x,H);ctx.stroke();
  }
}

// ── DRAW PIPE ───────────────────────────────────
function drawPipe(p){
  var gY=p.gY,g=p.g,x=p.x,w=p.w;
  var dng=pipeDanger(p);
  var capH=H*0.022,capExt=w*0.1;

  // Danger tint — amber-red rather than neon
  var ar=Math.round(50+dng*160),ag=Math.round(65*(1-dng*0.8)),ab=Math.round(70*(1-dng*0.9));
  var dangerAlpha=(0.18+dng*0.55).toFixed(2);

  function bar(bx,by,bw,bh){
    if(bh<=0) return;
    // Base — dark gunmetal
    var panG=ctx.createLinearGradient(bx,0,bx+bw,0);
    panG.addColorStop(0,'#1a2535');
    panG.addColorStop(0.18,'#222f42');
    panG.addColorStop(0.82,'#1e2b3c');
    panG.addColorStop(1,'#141e2c');
    ctx.fillStyle=panG;
    ctx.fillRect(bx,by,bw,bh);
    // Riveted panel lines — horizontal
    ctx.strokeStyle='rgba(8,15,26,0.6)';
    ctx.lineWidth=1;
    var step=Math.max(16,H*0.028);
    for(var sy=by+step*0.6;sy<by+bh;sy+=step){
      ctx.beginPath();ctx.moveTo(bx+4,sy);ctx.lineTo(bx+bw-4,sy);ctx.stroke();
    }
    // Left shadow edge
    ctx.fillStyle='rgba(0,0,0,0.5)';
    ctx.fillRect(bx,by,3,bh);
    // Right highlight
    ctx.fillStyle='rgba(60,80,100,0.18)';
    ctx.fillRect(bx+bw-3,by,3,bh);
    // Danger glow fill
    if(dng>0){
      ctx.fillStyle='rgba('+ar+','+ag+','+ab+','+dangerAlpha+')';
      ctx.fillRect(bx,by,bw,bh);
    }
  }

  // Top pipe
  bar(x,0,w,gY);
  // Cap — heavier, industrial flange
  ctx.fillStyle='#1e2d3f';
  ctx.fillRect(x-capExt,gY-capH,w+capExt*2,capH);
  // Cap top border (pipe edge)
  ctx.fillStyle='rgba(50,70,90,0.55)';
  ctx.fillRect(x-capExt,gY-capH,w+capExt*2,2);
  // Danger edge line on cap inner face
  ctx.fillStyle='rgba('+ar+','+ag+','+ab+','+(0.28+dng*0.5).toFixed(2)+')';
  ctx.fillRect(x-capExt,gY-2,w+capExt*2,2);
  // Warning stripe — only at danger>0.45
  if(dng>0.45){
    var stripeW=w+capExt*2,stripeH=capH*0.45;
    ctx.save();
    ctx.beginPath();ctx.rect(x-capExt,gY-capH,stripeW,stripeH);ctx.clip();
    var sw=8;
    ctx.fillStyle='rgba('+ar+','+ag+','+ab+',0.18)';
    for(var sx=x-capExt-capH;sx<x-capExt+stripeW+capH;sx+=sw*2){
      ctx.beginPath();
      ctx.moveTo(sx,gY-capH);ctx.lineTo(sx+sw,gY-capH);
      ctx.lineTo(sx+sw+capH,gY-capH+stripeH);ctx.lineTo(sx+capH,gY-capH+stripeH);
      ctx.fill();
    }
    ctx.restore();
  }

  // Bottom pipe
  var bY=gY+g;
  bar(x,bY,w,H-bY);
  // Cap
  ctx.fillStyle='#1e2d3f';
  ctx.fillRect(x-capExt,bY,w+capExt*2,capH);
  ctx.fillStyle='rgba(50,70,90,0.55)';
  ctx.fillRect(x-capExt,bY+capH-2,w+capExt*2,2);
  ctx.fillStyle='rgba('+ar+','+ag+','+ab+','+(0.28+dng*0.5).toFixed(2)+')';
  ctx.fillRect(x-capExt,bY,w+capExt*2,2);
  if(dng>0.45){
    var stripeW2=w+capExt*2,stripeH2=capH*0.45;
    ctx.save();
    ctx.beginPath();ctx.rect(x-capExt,bY+capH-stripeH2,stripeW2,stripeH2);ctx.clip();
    ctx.fillStyle='rgba('+ar+','+ag+','+ab+',0.18)';
    for(var sx2=x-capExt-capH;sx2<x-capExt+stripeW2+capH;sx2+=16){
      ctx.beginPath();
      ctx.moveTo(sx2,bY+capH);ctx.lineTo(sx2+8,bY+capH);
      ctx.lineTo(sx2+8+capH,bY+capH-stripeH2);ctx.lineTo(sx2+capH,bY+capH-stripeH2);
      ctx.fill();
    }
    ctx.restore();
  }

  // Moving pipe — motion indicator chevrons
  if(p.mov){
    ctx.strokeStyle='rgba(80,110,140,0.25)';ctx.lineWidth=1;
    for(var cy=bY+capH+8;cy<H-6;cy+=16){
      ctx.beginPath();ctx.moveTo(x+w*0.33,cy);ctx.lineTo(x+w*0.5,cy+7);ctx.lineTo(x+w*0.67,cy);ctx.stroke();
    }
  }
}

// ── DRAW POWERUP ────────────────────────────────
function drawPup(pu){
  var pv=Math.sin(pu.pulse+frame*0.09)*0.22+0.78;
  var isE=pu.type===1;
  // Shield: steel blue. EMP: brass gold. No neon.
  var cr=isE?200:80,cg=isE?165:165,cb=isE?60:195;
  var cs='rgba('+cr+','+cg+','+cb+',';

  // Outer ring
  ctx.strokeStyle=cs+(pv*0.3).toFixed(2)+')';ctx.lineWidth=1;
  ctx.beginPath();ctx.arc(pu.x,pu.y,pu.r*1.9,0,6.2832);ctx.stroke();
  // Mid ring
  ctx.strokeStyle=cs+(pv*0.55).toFixed(2)+')';ctx.lineWidth=1.5;
  ctx.beginPath();ctx.arc(pu.x,pu.y,pu.r*1.35,0,6.2832);ctx.stroke();
  // Fill
  ctx.fillStyle=cs+(pv*0.12).toFixed(2)+')';
  ctx.beginPath();ctx.arc(pu.x,pu.y,pu.r,0,6.2832);ctx.fill();
  // Border
  ctx.strokeStyle=cs+(pv*0.82).toFixed(2)+')';ctx.lineWidth=1.5;
  ctx.beginPath();ctx.arc(pu.x,pu.y,pu.r,0,6.2832);ctx.stroke();
  // Icon
  ctx.fillStyle=cs+(pv*0.9).toFixed(2)+')';
  ctx.font='bold '+(pu.r*1.18)+'px monospace';
  ctx.textAlign='center';ctx.textBaseline='middle';
  ctx.fillText(isE?'⚡':'◈',pu.x,pu.y);
}

// ── DRAW CHIP ───────────────────────────────────
function drawChip(ch){
  var pv=Math.sin(ch.pulse+frame*0.13)*0.22+0.78;
  ctx.save();ctx.translate(ch.x,ch.y);ctx.rotate(frame*0.022);
  ctx.beginPath();
  for(var i=0;i<6;i++){var a=0.5236+i*1.0472;i===0?ctx.moveTo(Math.cos(a)*ch.r,Math.sin(a)*ch.r):ctx.lineTo(Math.cos(a)*ch.r,Math.sin(a)*ch.r);}
  ctx.closePath();
  ctx.fillStyle='rgba(90,165,110,'+(pv*0.18).toFixed(2)+')';ctx.fill();
  ctx.strokeStyle='rgba(110,185,130,'+(pv*0.82).toFixed(2)+')';ctx.lineWidth=1.5;ctx.stroke();
  ctx.fillStyle='rgba(130,200,148,'+(pv*0.88).toFixed(2)+')';
  ctx.beginPath();ctx.arc(0,0,ch.r*0.32,0,6.2832);ctx.fill();
  ctx.restore();
}

// ── DRAW DRONE ──────────────────────────────────
function drawDrone(){
  var dw=W*0.075,dh=H*0.028;
  var AD=[[-1,-1],[1,-1],[-1,1],[1,1]];

  // Motion blur ghost frames — translucent, desaturated
  for(var mi=0;mi<MBLUR_N;mi++){
    var idx=(mblurIdx-mi-1+MBLUR_N)%MBLUR_N;
    var alpha=(MBLUR_N-mi-1)/(MBLUR_N*3.5);
    if(alpha<0.02) continue;
    ctx.save();
    ctx.globalAlpha=alpha;
    ctx.translate(MBX[idx],MBY[idx]);
    ctx.rotate(MBANG[idx]);
    // Draw simplified ghost fuselage
    ctx.fillStyle='#6a8a9a';
    ctx.beginPath();ctx.ellipse(0,0,dw*0.58,dh*0.65,0,0,6.2832);ctx.fill();
    ctx.restore();
  }

  ctx.save();ctx.translate(dr.x,dr.y);
  dr.ang+=(Math.atan2(dr.vy*0.38,H*0.1)-dr.ang)*0.14;
  ctx.rotate(dr.ang);

  // Shield aura — steel-blue, subtle
  if(dr.shield){
    var pv=Math.sin(frame*0.17)*0.18+0.82;
    ctx.save();ctx.globalAlpha=pv*0.1;
    var shG=ctx.createRadialGradient(0,0,dw*0.4,0,0,dw*1.7);
    shG.addColorStop(0,'rgba(140,195,220,0.9)');
    shG.addColorStop(1,'rgba(80,130,165,0)');
    ctx.fillStyle=shG;
    ctx.beginPath();ctx.arc(0,0,dw*1.7,0,6.2832);ctx.fill();
    ctx.restore();
    ctx.strokeStyle='rgba(140,195,220,'+(pv*0.6).toFixed(2)+')';
    ctx.lineWidth=1.2;ctx.beginPath();ctx.arc(0,0,dw*1.62,0,6.2832);ctx.stroke();
    // Inner ring
    ctx.strokeStyle='rgba(160,210,235,'+(pv*0.3).toFixed(2)+')';
    ctx.lineWidth=0.7;ctx.beginPath();ctx.arc(0,0,dw*1.42,0,6.2832);ctx.stroke();
  }

  // Arms — carbon fiber look: dark gray with thin highlight
  for(var ai=0;ai<4;ai++){
    // Shadow
    ctx.strokeStyle='rgba(0,0,0,0.5)';ctx.lineWidth=Math.max(2.5,H*0.007)+1;ctx.lineCap='round';
    ctx.beginPath();ctx.moveTo(AD[ai][0]*dw*0.28+0.5,AD[ai][1]*dh*0.5+0.5);
    ctx.lineTo(AD[ai][0]*dw*0.85+0.5,AD[ai][1]*dh*1.1+0.5);ctx.stroke();
    // Main arm
    ctx.strokeStyle='#3a4f5e';ctx.lineWidth=Math.max(2.5,H*0.007);
    ctx.beginPath();ctx.moveTo(AD[ai][0]*dw*0.28,AD[ai][1]*dh*0.5);
    ctx.lineTo(AD[ai][0]*dw*0.85,AD[ai][1]*dh*1.1);ctx.stroke();
    // Highlight
    ctx.strokeStyle='rgba(100,130,148,0.4)';ctx.lineWidth=1;
    ctx.beginPath();ctx.moveTo(AD[ai][0]*dw*0.28,AD[ai][1]*dh*0.5);
    ctx.lineTo(AD[ai][0]*dw*0.85,AD[ai][1]*dh*1.1);ctx.stroke();
  }

  // Rotors — fast blur discs instead of line cross
  var ra=frame*0.35;
  for(var ai2=0;ai2<4;ai2++){
    var rx=AD[ai2][0]*dw*0.85,ry=AD[ai2][1]*dh*1.1,rr=dw*0.31;
    // Disc blur — semi-transparent filled ellipse
    ctx.fillStyle='rgba(155,185,200,0.12)';
    ctx.beginPath();ctx.ellipse(rx,ry,rr,rr*0.28,ra,0,6.2832);ctx.fill();
    // Blade lines
    ctx.strokeStyle='rgba(175,200,215,0.48)';ctx.lineWidth=Math.max(1.4,H*0.0036);
    ctx.beginPath();ctx.moveTo(rx+Math.cos(ra)*rr,ry+Math.sin(ra)*rr*0.28);ctx.lineTo(rx-Math.cos(ra)*rr,ry-Math.sin(ra)*rr*0.28);ctx.stroke();
    ctx.beginPath();ctx.moveTo(rx+Math.cos(ra+1.5708)*rr,ry+Math.sin(ra+1.5708)*rr*0.28);ctx.lineTo(rx-Math.cos(ra+1.5708)*rr,ry-Math.sin(ra+1.5708)*rr*0.28);ctx.stroke();
    // Motor hub — small dark cylinder
    var hubG=ctx.createRadialGradient(rx-rr*0.08,ry-rr*0.1,0,rx,ry,dw*0.14);
    hubG.addColorStop(0,'#445a6a');
    hubG.addColorStop(1,'#1e2c38');
    ctx.fillStyle=hubG;
    ctx.beginPath();ctx.arc(rx,ry,dw*0.11,0,6.2832);ctx.fill();
    ctx.strokeStyle='rgba(80,100,115,0.5)';ctx.lineWidth=0.8;
    ctx.beginPath();ctx.arc(rx,ry,dw*0.11,0,6.2832);ctx.stroke();
  }

  // Fuselage — matte dark composite, subtle metallic rim
  var fusG=ctx.createRadialGradient(-dw*0.18,-dh*0.3,0,0,0,dw*0.7);
  fusG.addColorStop(0,'#8aa4b5');
  fusG.addColorStop(0.5,'#6a8494');
  fusG.addColorStop(1,'#3e5060');
  ctx.fillStyle=fusG;
  ctx.beginPath();ctx.ellipse(0,0,dw*0.62,dh*0.72,0,0,6.2832);ctx.fill();
  // Fuselage rim
  ctx.strokeStyle='rgba(50,68,82,0.7)';ctx.lineWidth=1;
  ctx.beginPath();ctx.ellipse(0,0,dw*0.62,dh*0.72,0,0,6.2832);ctx.stroke();

  // Top dome — cockpit canopy (dark tinted)
  var domeG=ctx.createRadialGradient(-dw*0.12,-dh*0.4,0,dw*0.05,-dh*0.15,dw*0.42);
  domeG.addColorStop(0,'rgba(160,195,215,0.6)');
  domeG.addColorStop(0.5,'rgba(80,110,130,0.55)');
  domeG.addColorStop(1,'rgba(30,45,58,0.7)');
  ctx.fillStyle=domeG;
  ctx.beginPath();ctx.ellipse(dw*0.06,-dh*0.18,dw*0.36,dh*0.4,0,0,6.2832);ctx.fill();

  // Status light — red/green, recessed
  var sLit=dr.shield?'#5ec8e8':(Math.sin(frame*0.08)>0?'#c83030':'#661818');
  ctx.fillStyle='rgba(0,0,0,0.4)';ctx.beginPath();ctx.arc(0,0,H*0.0075,0,6.2832);ctx.fill();
  ctx.fillStyle=sLit;ctx.beginPath();ctx.arc(0,0,H*0.005,0,6.2832);ctx.fill();

  // Camera lens — forward-facing
  ctx.fillStyle='#0d1820';
  ctx.beginPath();ctx.arc(dw*0.44,0,H*0.0095,0,6.2832);ctx.fill();
  // Lens glint
  ctx.fillStyle='rgba(170,210,230,0.5)';
  ctx.beginPath();ctx.arc(dw*0.42,-H*0.003,H*0.003,0,6.2832);ctx.fill();
  ctx.fillStyle='rgba(100,175,210,0.35)';
  ctx.beginPath();ctx.arc(dw*0.44,0,H*0.005,0,6.2832);ctx.fill();

  ctx.restore();
}

// ── DRAW PARTICLES ──────────────────────────────
function drawParticles(){
  for(var i=0;i<MAX_P;i++){
    if(!PA[i]) continue;
    var a=PL[i]/PML[i];
    var c=PCLR[PC[i]];
    ctx.fillStyle='rgba('+c[0]+','+c[1]+','+c[2]+','+(c[3]*a*a).toFixed(2)+')'; // squared falloff = softer
    var r=Math.max(0.5,PSZ[i]*a);
    ctx.beginPath();ctx.arc(PX[i],PY[i],r,0,6.2832);ctx.fill();
  }
}

// ── DRAW HUD ────────────────────────────────────
// HUD: minimal, monospaced, desaturated — military green/amber
function drawHUD(){
  if(state!==ST.PLAY) return;
  ctx.textAlign='center';ctx.textBaseline='top';

  // Score — amber-white
  ctx.fillStyle='rgba(220,210,185,0.92)';
  ctx.font='bold '+(H*0.058)+'px \'Courier New\',monospace';
  ctx.fillText(score,W/2,H*0.038);

  // Best
  if(hiScore>0){
    ctx.fillStyle='rgba(140,130,105,0.5)';
    ctx.font=(H*0.023)+'px \'Courier New\',monospace';
    ctx.fillText('BEST '+hiScore,W/2,H*0.102);
  }

  // Speed level — top right, muted
  ctx.textAlign='right';
  ctx.fillStyle='rgba(100,120,110,0.6)';
  ctx.font=(H*0.021)+'px \'Courier New\',monospace';
  ctx.fillText('SPD-'+lvNum(),W*0.95,H*0.038);

  // Combo — military green
  if(combo>=2){
    var m=comboMult();
    ctx.textAlign='right';
    ctx.fillStyle=m>=4?'rgba(210,175,70,0.88)':'rgba(110,180,130,0.78)';
    ctx.font='bold '+(H*0.025)+'px \'Courier New\',monospace';
    ctx.fillText('x'+m+' COMBO',W*0.95,H*0.068);
    var bw=W*0.17,fill=(combo%3)/3;
    ctx.fillStyle='rgba(20,30,22,0.55)';ctx.fillRect(W*0.95-bw,H*0.094,bw,H*0.007);
    ctx.fillStyle=m>=4?'rgba(210,175,70,0.72)':'rgba(110,180,130,0.7)';
    ctx.fillRect(W*0.95-bw,H*0.094,bw*fill,H*0.007);
  }

  // Shield bar — steel blue
  if(dr.shield){
    var t=dr.shT/180;
    ctx.textAlign='left';ctx.textBaseline='top';
    ctx.fillStyle='rgba(140,195,215,0.85)';
    ctx.font=(H*0.021)+'px \'Courier New\',monospace';
    ctx.fillText('SHIELD '+Math.ceil(dr.shT/60)+'s',W*0.04,H*0.038);
    ctx.fillStyle='rgba(20,35,48,0.55)';ctx.fillRect(W*0.04,H*0.067,W*0.22,H*0.009);
    ctx.fillStyle='rgba(140,195,215,0.65)';ctx.fillRect(W*0.04,H*0.067,W*0.22*t,H*0.009);
  }

  // Level up message
  if(lvMsgT>0){
    var a2=Math.min(1,lvMsgT/20)*Math.min(1,lvMsgT/60);
    ctx.textAlign='center';ctx.textBaseline='middle';
    ctx.fillStyle='rgba(190,175,120,'+a2.toFixed(2)+')';
    ctx.font='bold '+(H*0.036)+'px \'Courier New\',monospace';
    ctx.fillText(lvMsg,W/2,H*0.22);
  }

  // Close call
  if(closeCallT>0){
    var a3=Math.min(1,closeCallT/10);
    ctx.textAlign='center';ctx.textBaseline='middle';
    ctx.fillStyle='rgba(210,170,60,'+(a3*0.88).toFixed(2)+')';
    ctx.font='bold '+(H*0.027)+'px \'Courier New\',monospace';
    ctx.fillText('CLOSE CALL!',W/2,H*0.3);
  }

  // Popups
  for(var pi=0;pi<pops.length;pi++){
    var pp=pops[pi];
    ctx.fillStyle='rgba('+pp.r+','+pp.g+','+pp.b+','+pp.life.toFixed(2)+')';
    ctx.font='bold '+(H*0.027)+'px \'Courier New\',monospace';
    ctx.textAlign='center';ctx.textBaseline='middle';
    ctx.fillText(pp.txt,pp.x,pp.y);
  }

  // Countdown / GO! overlay
  if(countdown>0||goTimer>0){
    ctx.fillStyle='rgba(0,0,0,0.35)';
    ctx.fillRect(0,0,W,H);
    ctx.textAlign='center';ctx.textBaseline='middle';
    ctx.fillStyle='rgba(215,205,175,0.95)';
    if(countdown>0){
      let num=countdown>140?'3':(countdown>70?'2':'1');
      ctx.font='bold '+(H*0.15)+'px \'Courier New\',monospace';
      ctx.fillText(num,W/2,H*0.45);
    } else if(goTimer>0){
      ctx.font='bold '+(H*0.12)+'px \'Courier New\',monospace';
      ctx.fillText('GO!',W/2,H*0.45);
    }
  }
}

  ctx.fillText('POWERED BY  GREEK GAMES STUDIOS',W/2,H*0.94);
}

// ── POST FX ─────────────────────────────────────
function drawPostFX(){
  // Subtle scanlines — thinner, less harsh
  ctx.fillStyle='rgba(0,0,0,0.016)';
  for(var y=0;y<H;y+=4) ctx.fillRect(0,y,W,1);

  // Vignette (cached radial) — deeper than before
  if(!vigGrad){
    vigGrad=ctx.createRadialGradient(W/2,H/2,H*0.22,W/2,H/2,H*0.72);
    vigGrad.addColorStop(0,'rgba(0,0,0,0)');
    vigGrad.addColorStop(0.65,'rgba(0,0,0,0.08)');
    vigGrad.addColorStop(1,'rgba(0,0,0,0.42)');
  }
  ctx.fillStyle=vigGrad;ctx.fillRect(0,0,W,H);

  // Horizontal bands — thin light-leak bands at random rare intervals
  // (pre-computed in update, just draw here)

  // EMP flash — amber/gold
  if(empFlash>0){
    ctx.fillStyle='rgba(190,155,50,'+(empFlash*0.28).toFixed(2)+')';
    ctx.fillRect(0,0,W,H);
  }

  // Noise grain — drawn at low alpha using pre-baked tile, creates film grain
  if(noiseCanvas){
    ctx.save();
    ctx.globalAlpha=0.04;
    // Tile the 128x128 noise across the canvas
    for(var ny=0;ny<H;ny+=128){
      for(var nx=0;nx<W;nx+=128){
        ctx.drawImage(noiseCanvas,nx,ny);
      }
    }
    ctx.restore();
  }
}

// ── UPDATE ──────────────────────────────────────
function update(){
  frame++;
  if(state!==ST.PLAY) return;

  if(countdown>0){
    countdown--;
    if(countdown===0){goTimer=30;}
    bgOff+=spd();
    return;
  }
  if(goTimer>0) goTimer--;

  var s=spd();
  bgOff+=s;

  if(frame%45===0) pitchEngine(Math.min(1,(s-W*0.004)/(W*0.009)));

  // Window light flicker
  if(frame%40===0){
    var wi=Math.floor(Math.random()*WLN);
    WLFv[wi]=0.2+Math.random()*0.8;
    WLFx[wi]=0.1+Math.random()*0.8;WLFy[wi]=0.1+Math.random()*0.85;
    WLBi[wi]=Math.floor(Math.random()*BLDG_N);
  }

  // Drone physics
  dr.vy+=H*0.0019;
  dr.vy=Math.min(dr.vy,H*0.022);
  dr.y+=dr.vy;

  // Motion blur ring buffer update
  MBX[mblurIdx]=dr.x;MBY[mblurIdx]=dr.y;MBANG[mblurIdx]=dr.ang;
  mblurIdx=(mblurIdx+1)%MBLUR_N;

  // Trail — smoke/exhaust (less frequent, slightly bigger)
  if(frame%3===0){
    emit(dr.x-W*0.05+(Math.random()-0.5)*W*0.014,
      dr.y+(Math.random()-0.5)*H*0.022,
      -W*0.0008+(Math.random()-0.5)*W*0.001,(Math.random()-0.5)*H*0.0015,
      0.48+Math.random()*0.36,W*0.007+Math.random()*W*0.006,COL_TRAIL);
  }

  // Pipes
  pipeT++;
  if(pipeT>=spawnEvery()){
    var np=mkPipe();pipes.push(np);
    var nc=mkChip(np);if(nc) chips.push(nc);
    pipeT=0;
  }
  for(var i=0;i<pipes.length;i++){
    var p=pipes[i];
    p.x-=s;
    if(p.mov) p.gY=p.baseY+Math.sin(p.mPh+frame*p.mSpd)*p.mAmp;
    if(!p.scored&&p.x+p.w<dr.x-W*0.04){
      p.scored=true;score++;
      combo++;
      if(score>hiScore){hiScore=score;saveHi();}
      sfx.score();
      var lv=lvNum();
      if(lv>lastLv){lastLv=lv;lvMsg='SPEED UP  x'+lv;lvMsgT=90;sfx.levelUp();}
    }
  }
  while(pipes.length&&pipes[0].x+pipes[0].w<-5) pipes.shift();

  // Powerups
  pupT++;
  if(pupT>=PUP_EVERY){pups.push(mkPup());pupT=0;}
  for(var pi=pups.length-1;pi>=0;pi--){
    var pu=pups[pi];
    pu.x-=s*0.82;
    var dx=pu.x-dr.x,dy=pu.y-dr.y,rSum=pu.r+W*0.056;
    if(dx*dx+dy*dy<rSum*rSum){
      if(pu.type===0){
        dr.shield=true;dr.shT=180;
        sfx.shield();burst(dr.x,dr.y,14,COL_SHIELD,1.4,0.55);
        addPop(dr.x,dr.y-H*0.06,'SHIELD',140,195,215);
      } else {
        sfx.emp();empFlash=1;
        for(var pj=0;pj<pipes.length;pj++){
          burst((pipes[pj].x+pipes[pj].x+pipes[pj].w)*0.5,pipes[pj].gY+pipes[pj].g*0.5,5,COL_EMP,1.6,0.45);
        }
        pipes=[];chips=[];pipeT=0;
        score+=2;if(score>hiScore){hiScore=score;saveHi();}
        addPop(dr.x,dr.y-H*0.06,'EMP  +2',200,165,60);
        burst(dr.x,dr.y,22,COL_EMP,2.4,0.7);
      }
      pups.splice(pi,1);
    } else if(pu.x+pu.r<0){pups.splice(pi,1);}
  }

  // Chips
  for(var ci=chips.length-1;ci>=0;ci--){
    var ch=chips[ci];
    ch.x-=s;
    var dx2=ch.x-dr.x,dy2=ch.y-dr.y,rS2=ch.r+W*0.055;
    if(dx2*dx2+dy2*dy2<rS2*rS2){
      var m=comboMult();
      score+=m;if(score>hiScore){hiScore=score;saveHi();}
      sfx.chip(m);
      burst(ch.x,ch.y,8,COL_CHIP,1.2,0.42);
      addPop(ch.x,ch.y,m>1?'+'+m+' x'+m:'+1',110,180,130);
      chips.splice(ci,1);
    } else if(ch.x+ch.r<0){chips.splice(ci,1);}
  }

  if(dr.shield){dr.shT--;if(dr.shT<=0){dr.shield=false;sfx.shieldBreak();}}
  if(empFlash>0) empFlash=Math.max(0,empFlash-0.045);

  // Particles
  for(var pxi=0;pxi<MAX_P;pxi++){
    if(!PA[pxi]) continue;
    PX[pxi]+=PVX[pxi];PY[pxi]+=PVY[pxi];
    PVY[pxi]+=H*0.000038;
    PL[pxi]-=0.01667;
    if(PL[pxi]<=0) PA[pxi]=0;
  }

  // Popups
  for(var poi=pops.length-1;poi>=0;poi--){
    var pp=pops[poi];
    pp.y+=pp.vy;pp.life-=0.01667;
    if(pp.life<=0) pops.splice(poi,1);
  }

  // Near miss / combo reset
  if(nearMiss()&&closeCallT<=0){
    closeCallT=48;sfx.closeCall();
    if(combo>0) sfx.comboBreak(comboMult());
    combo=0;
  }
  if(closeCallT>0) closeCallT--;
  if(lvMsgT>0) lvMsgT--;

  // Collision
  if(hit()){
    if(dr.shield){
      dr.shield=false;dr.shT=0;
      sfx.shieldBreak();
      burst(dr.x,dr.y,18,COL_SHIELD,1.9,0.52);
      dr.vy=-H*0.013;
    } else {
      sfx.die();
      burst(dr.x,dr.y,22,COL_EXPL,2.2,0.95);
      // Send score to app
      const isNew = score > hiScore;
      sendScoreToApp(score, isNew);
      burst(dr.x,dr.y,14,COL_DEBRIS,1.8,0.75);
      burst(dr.x,dr.y,10,COL_SPARK,2.8,0.5);
      burst(dr.x,dr.y,6,COL_SHIELD,1.4,0.4);
      shakeT=26;
      stopEngine();
      state=ST.DEAD;
    }
  }

  if(shakeT>0){
    var iv=shakeT*H*0.0005;
    shakeX=(Math.random()-0.5)*iv;shakeY=(Math.random()-0.5)*iv;shakeT--;
  } else {shakeX=0;shakeY=0;}
}

// ── RENDER ──────────────────────────────────────
function render(){
  ctx.save();ctx.translate(shakeX,shakeY);
  drawBg();
  for(var i=0;i<pipes.length;i++) drawPipe(pipes[i]);
  for(var j=0;j<chips.length;j++) drawChip(chips[j]);
  for(var k=0;k<pups.length;k++) drawPup(pups[k]);
  drawParticles();
  if(state!==ST.MENU) drawDrone();
  drawHUD();
  ctx.restore();
  drawPostFX();
  if(state===ST.MENU) drawOverlay(false);
  else if(state===ST.DEAD) drawOverlay(true);
}

// ── MAIN LOOP ───────────────────────────────────
var last=0;
function loop(ts){
  if(ts-last>=14){last=ts;update();render();}
  requestAnimationFrame(loop);
}
requestAnimationFrame(loop);
</script>
