<style>
*,*::before,*::after{margin:0;padding:0;box-sizing:border-box}
:root{
  --bg:#030609;--cg:#00e87a;--cc:#00d4ff;--cgold:#ffc844;
  --cp:#c44dff;--cr:#ff2255;--co:#ff7700;--cb:#3399ff;
  --tdim:#1e4030;--text:#6fffa0;--mono:'Share Tech Mono','Courier New',monospace;
  --title:'Orbitron',sans-serif;
}
html,body{width:100%;height:100%;background:var(--bg);color:var(--text);
  font-family:var(--mono);overflow:hidden;
  user-select:none;-webkit-user-select:none;touch-action:none;
  -webkit-tap-highlight-color:transparent;}
body::before{content:'';position:fixed;inset:0;pointer-events:none;z-index:997;
  background:repeating-linear-gradient(180deg,transparent 0,transparent 3px,rgba(0,0,0,.09) 3px,rgba(0,0,0,.09) 4px);}
body::after{content:'';position:fixed;inset:0;pointer-events:none;z-index:996;
  background:radial-gradient(ellipse at center,transparent 35%,rgba(0,0,0,.65) 100%);}
#app{display:flex;flex-direction:column;align-items:center;justify-content:center;
  height:100%;gap:5px;padding:5px;position:relative;}

/* HUD SP */
#hud{display:flex;align-items:center;justify-content:space-between;
  width:100%;max-width:740px;padding:4px 10px;flex-wrap:wrap;gap:3px;
  border:1px solid rgba(0,232,122,.15);background:rgba(0,10,6,.9);}
/* HUD MP */
#mp-hud{display:none;align-items:center;justify-content:space-between;
  width:100%;max-width:740px;padding:4px 10px;gap:5px;
  border:1px solid rgba(0,232,122,.15);background:rgba(0,10,6,.9);}
  
.hi{display:flex;flex-direction:column;align-items:center;min-width:50px;}
.hl{color:var(--tdim);font-size:.65em;letter-spacing:1px;text-transform:uppercase;}
.hv{color:var(--cg);font-size:clamp(10px,2.2vw,13px);letter-spacing:1px;}
#cel{color:var(--cgold);font-size:clamp(11px,2.5vw,14px);transition:transform .08s;}
#cel.pop{transform:scale(1.45);}
#puhud{display:none;}
#pubar{width:42px;height:3px;background:rgba(255,255,255,.07);border-radius:2px;overflow:hidden;margin-top:2px;}
#pufill{height:100%;background:var(--cp);transition:width .1s linear;}

/* Level indicator */
#lvlbar-wrap{width:100%;max-width:740px;height:2px;background:rgba(0,232,122,.08);}
#lvlbar{height:100%;background:linear-gradient(90deg,var(--cg),var(--cc));width:0%;transition:width .3s;}

/* Canvas */
#cwrap{position:relative;line-height:0;flex-shrink:0;}
#gc{display:block;border:1px solid rgba(0,232,122,.18);
  box-shadow:0 0 40px rgba(0,232,122,.04),0 0 1px rgba(0,212,255,.15) inset;}

/* Overlay Screens */
#ov {
  position: absolute;
  inset: 0;
  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: center;
  background: rgba(3, 6, 9, 0.95);
  z-index: 10;
  padding: 15px;
  text-align: center;
  box-sizing: border-box;
}
#ov.gone { display: none; }

.otitle {
  font-family: var(--title); font-weight: 900; letter-spacing: 4px;
  text-shadow: 0 0 30px rgba(0,232,122,.35); margin-bottom: 5px;
  font-size: clamp(22px, 6vw, 36px); color: var(--cg); line-height: 1.1;
}
.otitle span { color: var(--cc); }
.osub {
  font-size: clamp(9px, 2vw, 11px); color: var(--tdim);
  letter-spacing: 3px; margin-bottom: 25px;
}

.obtn {
  background: transparent; border: 1px solid var(--cg); color: var(--cg);
  font-family: var(--mono); font-size: clamp(12px, 2.5vw, 14px); letter-spacing: 2px;
  padding: 12px 30px; cursor: pointer; text-transform: uppercase;
  position: relative; overflow: hidden; transition: color .18s; margin-top: 10px; width: 220px;
}
.obtn::after {
  content: ''; position: absolute; inset: 0; background: var(--cg);
  transform: translateX(-101%); transition: transform .18s; z-index: -1;
}
.obtn:hover::after, .obtn:active::after { transform: none; }
.obtn:hover, .obtn:active { color: var(--bg); }
.obtn.btn-cyan { border-color: var(--cc); color: var(--cc); }
.obtn.btn-cyan::after { background: var(--cc); }
.obtn.btn-cyan:hover, .obtn.btn-cyan:active { color: var(--bg); } /* <--- ΠΡΟΣΘΗΚΗ */

.obtn.btn-gold { border-color: var(--cgold); color: var(--cgold); }
.obtn.btn-gold::after { background: var(--cgold); }
.obtn.btn-gold:hover, .obtn.btn-gold:active { color: var(--bg); } /* <--- ΠΡΟΣΘΗΚΗ */

.legend {
  display: flex; gap: 8px; flex-wrap: wrap; justify-content: center;
  margin: 10px 0 25px 0; font-size: clamp(9px, 2vw, 11px); color: var(--tdim);
}
.li { display: flex; align-items: center; gap: 4px; }
.ld { width: 7px; height: 7px; border-radius: 50%; flex-shrink: 0; }

/* Grid Στατιστικών */
.sgrid { display: grid; grid-template-columns: 1fr 1fr; gap: 20px 30px; margin-bottom: 25px; width: 100%; max-width: 320px; }
.si { display: flex; flex-direction: column; align-items: center; justify-content: center; min-height: 45px; gap: 4px; }
.sl { color: var(--tdim); font-size: 10px; text-transform: uppercase; letter-spacing: 1px; line-height: 1; }
.sv { color: var(--cc); font-size: clamp(18px, 5vw, 24px); font-weight: bold; line-height: 1; }

.nr { color: var(--cgold); font-size: clamp(10px, 2.5vw, 13px); letter-spacing: 2px; margin-bottom: 20px; animation: blink .45s infinite; }
@keyframes blink { 50% { opacity: 0; } }

/* MP Cards */
.mp-card { display:flex; flex-direction:column; align-items:center; border:1px solid rgba(255,255,255,.1); padding:4px 8px; background:rgba(0,0,0,.4); width:32%; }
.mp-card.eliminated { opacity: 0.3; filter: grayscale(1); }
.mp-card.eliminated .sv { text-decoration: line-through; }
.mp-lives { font-size: 10px; margin-top:2px; letter-spacing: 1px; }

/* Glitch title */
.glitch{position:relative;display:inline-block;}
.glitch::before,.glitch::after{content:attr(data-text);position:absolute;inset:0;}
.glitch::before{color:var(--cc);animation:g1 4.5s infinite; clip-path:polygon(0 0,100% 0,100% 40%,0 40%);}
.glitch::after{color:var(--cr);animation:g2 4.5s infinite; clip-path:polygon(0 60%,100% 60%,100% 100%,0 100%);}
@keyframes g1{0%,86%,100%{transform:none;opacity:0}88%{transform:translateX(-4px);opacity:.9}91%{transform:translateX(3px);opacity:.9}94%{opacity:0}}
@keyframes g2{0%,87%,100%{transform:none;opacity:0}90%{transform:translateX(4px);opacity:.9}93%{transform:translateX(-3px);opacity:.9}95%{opacity:0}}

/* D-pad */
#dpad{display:none;flex-direction:column;align-items:center;gap:3px;margin-top:2px;}
#dpad.show{display:flex;}
.drow{display:flex;gap:3px;}
.db{width:50px;height:50px;background:rgba(0,232,122,.04); border:1px solid rgba(0,232,122,.22);border-radius:4px;color:var(--cg); font-size:17px;display:flex;align-items:center;justify-content:center;cursor:pointer;}
.db:active{background:rgba(0,232,122,.16);box-shadow:0 0 10px rgba(0,232,122,.15);}
.dsp{width:50px;height:50px;}

/* Footer */
#foot{font-size:clamp(7px,1.4vw,9px);color:var(--tdim);letter-spacing:2px; opacity:.4;text-transform:uppercase;margin-top:1px;}

/* Speed meter in HUD */
#speedmeter{display:flex;flex-direction:column;align-items:center;}
#speedbar{width:36px;height:3px;background:rgba(255,255,255,.06);border-radius:2px;overflow:hidden;margin-top:4px;}
#speedfill{height:100%;background:linear-gradient(90deg,var(--cg),var(--co),var(--cr));width:10%;transition:width .4s;}

@media (max-height: 400px) {
  #ov { padding: 5px; } .otitle { font-size: 22px !important; margin-bottom: 2px; } .osub { margin-bottom: 8px; }
  .sgrid { margin-bottom: 8px; gap: 10px 20px; } .si { min-height: 35px; } .sv { font-size: 16px; }
  .obtn { padding: 8px 20px; margin-top: 5px; } .nr { margin-bottom: 8px; }
}
</style>

<script>
'use strict';
// ═══════════════════════════════════════════════
//  Cyber Worm  |  Greek Games Studios
// ═══════════════════════════════════════════════

let GS = 22;     
const BASE_MS = 155;    
const MIN_MS = 55;      
const LVL_EAT = 7;      
const COMBO_TTL = 2400; 
const PU_DUR = 6500;    
const MAX_FW = 20;      

const DIRS = {UP:{x:0,y:-1},DOWN:{x:0,y:1},LEFT:{x:-1,y:0},RIGHT:{x:1,y:0}};

const FT = {
  DATA:     {color:'#00d4ff',glow:'rgba(0,212,255,.3)', pts:10, w:58, label:'DATA PACKET'},
  MEGA:     {color:'#ffc844',glow:'rgba(255,200,68,.3)', pts:50, w:14, label:'MEGABYTE'},
  SHIELD:   {color:'#3399ff',glow:'rgba(51,153,255,.3)', pts:5,  w:11, label:'FIREWALL.EXE'},
  OVERCLOCK:{color:'#ff7700',glow:'rgba(255,119,0,.3)',  pts:5,  w:9,  label:'OVERCLOCK'},
  GHOST:    {color:'#c44dff',glow:'rgba(196,77,255,.3)', pts:5,  w:8,  label:'GHOST.MODE'},
  VIRUS:    {color:'#ff2255',glow:'rgba(255,34,85,.3)',  pts:10, w:8,  label:'VIRUS', mpOnly:true}
};

const MP_CFG = [
  { id:0, color:'#00e87a', name:'P1', start:{x:3, y:13}, dir:'RIGHT', keys:{w:'UP',s:'DOWN',a:'LEFT',d:'RIGHT',W:'UP',S:'DOWN',A:'LEFT',D:'RIGHT'} },
  { id:1, color:'#00d4ff', name:'P2', start:{x:22, y:13}, dir:'LEFT', keys:{ArrowUp:'UP',ArrowDown:'DOWN',ArrowLeft:'LEFT',ArrowRight:'RIGHT'} },
  { id:2, color:'#ffc844', name:'P3', start:{x:13, y:22}, dir:'UP', keys:{i:'UP',k:'DOWN',j:'LEFT',l:'RIGHT',I:'UP',K:'DOWN',J:'LEFT',L:'RIGHT'} }
];

// ── State ──────────────────────────────────────
let canvas,ctx,cSize,cell;
let gameMode = 'menu'; // 'menu', 'sp', 'mp2', 'mp3'
let state; // 'playing', 'paused', 'dead', 'gameover', 'menu'
let hi=0, rafId, lastT, shk=0, glitching=false, glitchTimer;
let matCols, matLast=0;
let touchX, touchY, resizeTO;

// SP State
let snake, dir, nDir, dLock;
let foods, walls, parts, ftxts;
let score, level, eaten, combo, cTimer;
let pu, puEnd, puTimer, ghostUsed;

// MP State
let mpPlayers = [];
let mpFoods = [];
let mpWalls = [];
let mpParts = [];
let mpFtxts = [];
let mpCorpses = [];
let mpTimeLeft = 120;
let mpTimerId = null;
let mpLevel = 1;

// ── Audio ──────────────────────────────────────
let actx=null;
function initAudio(){
  if(actx)return;
  try{actx=new(window.AudioContext||window.webkitAudioContext)();}catch(e){}
}
function snd(t){
  if(!actx)return;
  const now=actx.currentTime;
  try{
    const o=actx.createOscillator(), g=actx.createGain();
    o.connect(g); g.connect(actx.destination);
    if(t==='eat'){
      o.type='square'; o.frequency.setValueAtTime(392,now); o.frequency.exponentialRampToValueAtTime(784,now+.07);
      g.gain.setValueAtTime(.06,now); g.gain.exponentialRampToValueAtTime(.001,now+.1);
      o.start(now); o.stop(now+.1);
    }else if(t==='mega'){
      o.type='square'; o.frequency.setValueAtTime(523,now); o.frequency.exponentialRampToValueAtTime(1047,now+.05); o.frequency.exponentialRampToValueAtTime(784,now+.13);
      g.gain.setValueAtTime(.08,now); g.gain.exponentialRampToValueAtTime(.001,now+.18);
      o.start(now); o.stop(now+.18);
    }else if(t==='pu'){
      o.type='sine';
      [440,554,659,880].forEach((f,i)=>{
        const oo=actx.createOscillator(),gg=actx.createGain(); oo.connect(gg); gg.connect(actx.destination);
        oo.type='sine'; const tt=now+i*.07; oo.frequency.setValueAtTime(f,tt);
        gg.gain.setValueAtTime(.07,tt); gg.gain.exponentialRampToValueAtTime(.001,tt+.12);
        oo.start(tt); oo.stop(tt+.12);
      }); return;
    }else if(t==='die'){
      o.type='sawtooth'; o.frequency.setValueAtTime(180,now); o.frequency.exponentialRampToValueAtTime(40,now+.45);
      g.gain.setValueAtTime(.12,now); g.gain.exponentialRampToValueAtTime(.001,now+.5);
      o.start(now); o.stop(now+.5);
    }else if(t==='lvl'){
      [523,659,784,1047].forEach((f,i)=>{
        const oo=actx.createOscillator(),gg=actx.createGain(); oo.connect(gg); gg.connect(actx.destination);
        oo.type='square'; const tt=now+i*.09; oo.frequency.setValueAtTime(f,tt);
        gg.gain.setValueAtTime(.055,tt); gg.gain.exponentialRampToValueAtTime(.001,tt+.16);
        oo.start(tt); oo.stop(tt+.16);
      }); return;
    }else if(t==='pause'){
      o.type='sine'; o.frequency.setValueAtTime(330,now); o.frequency.linearRampToValueAtTime(220,now+.12);
      g.gain.setValueAtTime(.06,now); g.gain.exponentialRampToValueAtTime(.001,now+.18);
      o.start(now); o.stop(now+.18);
    }
  }catch(e){}
}

// ── Canvas / Resize ────────────────────────────
function setupCanvas(){
  canvas=document.getElementById('gc');
  ctx=canvas.getContext('2d');
  doResize();
}

function doResize(){
  const isT='ontouchstart' in window;
  const hudH = document.getElementById(gameMode.startsWith('mp') ? 'mp-hud' : 'hud').offsetHeight || 40;
  const footH=document.getElementById('foot').offsetHeight||14;
  const dpH=(isT && !gameMode.startsWith('mp'))?166:0;
  const used=hudH+dpH+footH+48;
  const avW=window.innerWidth-14;
  const avH=window.innerHeight-used;
  const sz=Math.min(avW,avH,700);
  cell=Math.max(8,Math.floor(sz/GS));
  cSize=cell*GS;
  canvas.width=cSize; canvas.height=cSize;
  canvas.style.width=cSize+'px'; canvas.style.height=cSize+'px';
  initMat();
}

const MCHARS='0123456789ABCDEF><[]{}:/\\';
function initMat(){
  const cols=Math.floor(cSize/9);
  matCols=Array.from({length:cols},()=>({
    y:Math.random()*cSize, spd:.8+Math.random()*1.4, ch:'0', t:0, op:.02+Math.random()*.025,
  }));
}
function drawMat(ts){
  if(ts-matLast<100)return; matLast=ts;
  ctx.save(); ctx.font=`9px 'Share Tech Mono',monospace`;
  for(let i=0;i<matCols.length;i++){
    const c=matCols[i];
    if(++c.t>4){c.ch=MCHARS[Math.floor(Math.random()*MCHARS.length)];c.t=0;}
    ctx.fillStyle=`rgba(0,232,100,${c.op})`; ctx.fillText(c.ch,i*9,c.y);
    c.y+=c.spd; if(c.y>cSize)c.y=0;
  } ctx.restore();
}

function rr(x,y,w,h,r){
  if(r<=0){ctx.rect(x,y,w,h);return;}
  ctx.moveTo(x+r,y); ctx.lineTo(x+w-r,y); ctx.arcTo(x+w,y,x+w,y+r,r);
  ctx.lineTo(x+w,y+h-r); ctx.arcTo(x+w,y+h,x+w-r,y+h,r);
  ctx.lineTo(x+r,y+h); ctx.arcTo(x,y+h,x,y+h-r,r);
  ctx.lineTo(x,y+r); ctx.arcTo(x,y,x+r,y,r); ctx.closePath();
}
function pad7(n){return String(Math.floor(n)).padStart(7,'0');}
function clamp(v,mn,mx){return Math.max(mn,Math.min(mx,v));}

// ── Shared Spawning ────────────────────────────
function emptyCellArr(occArr){
  const s=new Set();
  occArr.forEach(arr=>arr.forEach(({x,y})=>s.add(x+','+y)));
  const free=[];
  for(let x=0;x<GS;x++)for(let y=0;y<GS;y++) if(!s.has(x+','+y))free.push({x,y});
  return free.length?free[Math.floor(Math.random()*free.length)]:null;
}

function pickTypeMode(){
  const keys=Object.keys(FT).filter(k=> !(FT[k].mpOnly && gameMode==='sp'));
  const total=keys.reduce((s,k)=>s+FT[k].w,0);
  let r=Math.random()*total;
  for(const k of keys){r-=FT[k].w;if(r<=0)return k;}
  return 'DATA';
}

function burstArr(gx,gy,color,n, partsArr){
  const cx=gx*cell+cell/2, cy=gy*cell+cell/2;
  for(let i=0;i<n;i++){
    const a=(Math.PI*2/n)*i+Math.random()*.6; const sp=1.2+Math.random()*2.8;
    partsArr.push({x:cx,y:cy,vx:Math.cos(a)*sp,vy:Math.sin(a)*sp, color,life:1,sz:1.5+Math.random()*2.2});
  }
  if(partsArr.length>200)partsArr.splice(0,partsArr.length-200);
}

// ── Initialization (Both Modes) ─────────────────
function startGame(mode){
  initAudio();
  gameMode = mode;
  GS = (mode === 'sp') ? 22 : 26;
  
  if(mode === 'sp'){
    document.getElementById('hud').style.display = 'flex';
    document.getElementById('mp-hud').style.display = 'none';
    if('ontouchstart' in window) document.getElementById('dpad').classList.add('show');
  } else {
    document.getElementById('hud').style.display = 'none';
    document.getElementById('mp-hud').style.display = 'flex';
    document.getElementById('dpad').classList.remove('show');
    document.getElementById('mp-c2').style.display = (mode==='mp3') ? 'flex' : 'none';
  }
  
  doResize();
  hideOv();
  state = 'playing';
  if(rafId) cancelAnimationFrame(rafId);
  clearTimeout(glitchTimer); schedGlitch();
  
  if(mode === 'sp') initSP();
  else initMP(mode);
  
  lastT = performance.now();
  rafId = requestAnimationFrame(loop);
}

function schedGlitch(){
  glitchTimer=setTimeout(()=>{
    if(state==='playing'){glitching=true;setTimeout(()=>{glitching=false;},80+Math.random()*200);}
    schedGlitch();
  },6000+Math.random()*10000);
}

// ═══════════════════════════════════════════════
// SINGLE PLAYER LOGIC
// ═══════════════════════════════════════════════
function initSP(){
  const m=Math.floor(GS/2);
  snake=[{x:m,y:m},{x:m-1,y:m},{x:m-2,y:m},{x:m-3,y:m}];
  dir={...DIRS.RIGHT}; nDir={...DIRS.RIGHT}; dLock=false;
  foods=[]; walls=[]; parts=[]; ftxts=[];
  score=0; level=1; eaten=0; combo=1;
  clearTimeout(cTimer); cTimer=null;
  pu=null; puEnd=0; clearTimeout(puTimer); puTimer=null;
  ghostUsed=false; shk=0;
  document.getElementById('puhud').style.display='none';
  spawnFoodSP(); spawnFoodSP();
  updateHUDSP();
}

function spawnFoodSP(){
  const p=emptyCellArr([snake, foods, walls]); if(!p)return;
  foods.push({...p,type:pickTypeMode(),age:0,phase:Math.random()*Math.PI*2});
}

function spawnWallSP(){
  if(walls.length>=MAX_FW)return;
  const p=emptyCellArr([snake, foods, walls]); if(!p)return;
  walls.push({...p,age:0});
}

function getSpeedSP(){
  let ms=BASE_MS*Math.pow(.88,level-1);
  if(pu==='OVERCLOCK')ms*=.58;
  return Math.max(MIN_MS,ms);
}

function tickSP(){
  dir={...nDir}; dLock=false;
  const h=snake[0];
  let nx=h.x+dir.x, ny=h.y+dir.y;

  if(nx<0||nx>=GS||ny<0||ny>=GS){
    if(pu==='SHIELD'){nx=(nx+GS)%GS; ny=(ny+GS)%GS;} else{dieSP();return;}
  }

  const fwI=walls.findIndex(w=>w.x===nx&&w.y===ny);
  if(fwI!==-1){
    if(pu==='SHIELD'){walls.splice(fwI,1); burstArr(nx,ny,'#3399ff',10, parts);} else{dieSP();return;}
  }

  const fi=foods.findIndex(f=>f.x===nx&&f.y===ny);
  const grow=fi!==-1;

  const body=grow?snake.slice(1):snake.slice(1,-1);
  if(body.some(s=>s.x===nx&&s.y===ny)){
    if(pu==='GHOST'&&!ghostUsed){ghostUsed=true; burstArr(nx,ny,'#c44dff',8, parts);} else{dieSP();return;}
  }

  const newHead={x:nx,y:ny};
  if(grow){ eatFoodSP(foods.splice(fi,1)[0],newHead); }

  snake.unshift(newHead);
  if(!grow)snake.pop();

  if(foods.length<2)spawnFoodSP();
  foods.forEach(f=>f.age++); walls.forEach(w=>w.age++);
}

function eatFoodSP(food,pos){
  const f=FT[food.type];
  const isPU=food.type==='SHIELD'||food.type==='OVERCLOCK'||food.type==='GHOST';
  if(!isPU){ clearTimeout(cTimer); cTimer=setTimeout(()=>{combo=1;updateHUDSP();},COMBO_TTL); }

  let pts=isPU?f.pts:(f.pts*level*Math.min(combo,12));
  if(pu==='OVERCLOCK')pts=Math.floor(pts*2);
  score+=pts;

  if(isPU){activatePUSP(food.type);snd('pu');}
  else if(food.type==='MEGA'){snd('mega');eaten++;}
  else{snd('eat');eaten++;}

  if(!isPU)combo++;
  ftxts.push({x:pos.x*cell+cell/2,y:pos.y*cell,text:'+'+pts,color:f.color,life:1,vy:-1.5,big:false});
  burstArr(pos.x,pos.y,f.color,food.type==='MEGA'?15:9, parts);

  const ce=document.getElementById('cel');
  ce.classList.remove('pop'); void ce.offsetWidth; ce.classList.add('pop');
  setTimeout(()=>ce.classList.remove('pop'),170);

  if(!isPU&&eaten>0&&eaten%LVL_EAT===0)levelUpSP();
  updateHUDSP();
}

function activatePUSP(type){
  pu=type; ghostUsed=false; puEnd=performance.now()+PU_DUR;
  clearTimeout(puTimer);
  puTimer=setTimeout(()=>{ pu=null; document.getElementById('puhud').style.display='none'; updateHUDSP(); },PU_DUR);
  document.getElementById('puname').textContent=FT[type].label;
  document.getElementById('puhud').style.display='';
  document.getElementById('pufill').style.background=FT[type].color;
  updateHUDSP();
}

function levelUpSP(){
  level++; snd('lvl'); glitching=true; setTimeout(()=>{glitching=false;},220);
  if(level>=3){ const n=clamp(2+Math.floor((level-2)/2),2,5); for(let i=0;i<n;i++)spawnWallSP(); }
  ftxts.push({x:cSize/2,y:cSize/2,text:'LEVEL '+level, color:'#00e87a',life:1,vy:-.7,big:true});
  updateHUDSP();
}

function dieSP(){
  state = 'dead'; 
  snd('die'); 
  shk = 16;
  
  // Καθαρισμός όλων των ενεργών timers του παιχνιδιού
  clearTimeout(cTimer); 
  clearTimeout(puTimer); 
  clearTimeout(glitchTimer);
  
  // Εφέ έκρηξης για το φίδι
  const deadSnake = [...snake];
  deadSnake.forEach(s => burstArr(s.x, s.y, '#ff2255', 4, parts));
  
  // Έλεγχος high score
  const isNew = score > hi;
  if(isNew){
    hi = score;
    try { localStorage.setItem('_dex_hi', hi); } catch(e) {}
  }

  // ΑΠΟΣΤΟΛΗ ΣΤΟΙΧΕΙΩΝ ΣΤΗΝ ΕΦΑΡΜΟΓΗ (React Native)
  if (window.ReactNativeWebView) {
    const scoreData = {
      type: 'SEND_SCORE',
      score: score, 
      game: 'Cyber Worm',
      isNewRecord: isNew
    };
    window.ReactNativeWebView.postMessage(JSON.stringify(scoreData));
  }

  // Εμφάνιση του Game Over screen μετά από λίγο
  setTimeout(() => showGOSP(isNew), 950);
}

function updateHUDSP(){
  document.getElementById('hlvl').textContent=String(level).padStart(2,'0');
  document.getElementById('hscr').textContent=pad7(score);
  document.getElementById('hbest').textContent=pad7(hi);
  const ce=document.getElementById('cel'); ce.textContent='x'+combo;
  ce.style.color=combo>=10?'#ff2255':combo>=6?'#ffc844':combo>=3?'#ff7700':'#00e87a';
  const cur=getSpeedSP(); const pct=clamp(1-(cur-MIN_MS)/(BASE_MS-MIN_MS),0,1);
  document.getElementById('speedfill').style.width=(10+pct*90)+'%';
  document.getElementById('lvlbar').style.width=((eaten%LVL_EAT)/LVL_EAT*100)+'%';
}

function loopSP(ts){
  const sp=getSpeedSP();
  if(ts-lastT>=sp){lastT=ts;tickSP();if(state!=='playing')return;}
  drawGame(ts, foods, walls, parts, ftxts, drawSPSnake);
  
  for(let i=parts.length-1;i>=0;i--){
    const p=parts[i]; p.x+=p.vx; p.y+=p.vy; p.vy+=.09; p.life-=.032;
    if(p.life<=0)parts.splice(i,1);
  }
  for(let i=ftxts.length-1;i>=0;i--){
    const t=ftxts[i]; t.y+=t.vy; t.life-=.022; if(t.life<=0)ftxts.splice(i,1);
  }
  if(pu&&puEnd){
    const pct=Math.max(0,(puEnd-ts)/PU_DUR);
    document.getElementById('pufill').style.width=(pct*100)+'%';
    document.getElementById('puhud').style.opacity= pct<.2?(Math.sin(ts/70)>.0?'1':'.25'):'1';
  }
}

// ═══════════════════════════════════════════════
// MULTIPLAYER LOGIC
// ═══════════════════════════════════════════════
function initMP(mode){
  mpPlayers = []; mpFoods = []; mpWalls = []; mpParts = []; mpFtxts = []; mpCorpses = [];
  mpTimeLeft = 120; mpLevel = 1;
  
  const pCount = mode==='mp3'?3:2;
  for(let i=0; i<pCount; i++){
    let cfg = MP_CFG[i];
    mpPlayers.push({
      id: cfg.id, color: cfg.color, name: cfg.name,
      keys: cfg.keys,
      start: {...cfg.start}, dir: {...DIRS[cfg.dir]}, nDir: {...DIRS[cfg.dir]}, dLock: false,
      snake: Array.from({length:4}, (_,j)=>({
        x: cfg.start.x - (DIRS[cfg.dir].x * j), y: cfg.start.y - (DIRS[cfg.dir].y * j)
      })),
      score: 0, lives: 3, alive: true, respawning: false, eliminated: false,
      pu: null, puEnd: 0, ghostUsed: false,
      virused: false, virusEnd: 0, invincible: false, invincEnd: 0
    });
  }
  
  spawnFoodMP(); spawnFoodMP(); spawnFoodMP();
  updateHUDMP();
  
  clearInterval(mpTimerId);
  mpTimerId = setInterval(()=>{
    if(state!=='playing') return;
    mpTimeLeft--;
    if(mpTimeLeft % 30 === 0 && mpLevel < 5) levelUpMP();
    updateHUDMP();
    if(mpTimeLeft <= 0) endMP(true);
  }, 1000);
}

function spawnFoodMP(){
  const occ = [mpWalls, mpFoods, mpCorpses, ...mpPlayers.filter(p=>p.alive).map(p=>p.snake)];
  const p = emptyCellArr(occ); if(!p)return;
  mpFoods.push({...p, type:pickTypeMode(), age:0, phase:Math.random()*Math.PI*2});
}

function spawnWallMP(){
  if(mpWalls.length>=MAX_FW)return;
  const occ = [mpWalls, mpFoods, mpCorpses, ...mpPlayers.map(p=>p.snake)];
  const p = emptyCellArr(occ); if(!p)return;
  // Don't spawn too close to start positions
  for(let cp of MP_CFG) { if(Math.abs(p.x-cp.start.x)<3 && Math.abs(p.y-cp.start.y)<3) return; }
  mpWalls.push({...p, age:0});
}

function levelUpMP(){
  mpLevel++; snd('lvl'); glitching=true; setTimeout(()=>{glitching=false;},220);
  mpFtxts.push({x:cSize/2,y:cSize/2,text:'SPEED UP', color:'#00e87a',life:1,vy:-.7,big:true});
  if(mpLevel>=3){ const n=Math.floor(mpLevel/1.5); for(let i=0;i<n;i++) spawnWallMP(); }
}

function getSpeedMP(){
  return Math.max(MIN_MS, 140 * Math.pow(.88, mpLevel-1));
}

function killMPPlayer(p, skipRespawnDelay=false){
  p.alive = false; snd('die'); shk=16;
  p.snake.forEach(s=>burstArr(s.x,s.y,p.color,4, mpParts));
  p.lives--;
  
  if(p.lives<=0){
    p.eliminated = true;
    checkMPEnd();
  } else {
    p.respawning = true;
    setTimeout(()=>{
      if(state!=='playing' || p.eliminated) return;
      let cfg = MP_CFG[p.id];
      p.snake = Array.from({length:4}, (_,j)=>({ x: cfg.start.x - (DIRS[cfg.dir].x * j), y: cfg.start.y - (DIRS[cfg.dir].y * j) }));
      p.dir = {...DIRS[cfg.dir]}; p.nDir = {...DIRS[cfg.dir]}; p.dLock = false;
      p.pu = null; p.virused = false; p.ghostUsed = false;
      p.alive = true; p.respawning = false;
      p.invincible = true; p.invincEnd = performance.now() + 2000;
      burstArr(cfg.start.x, cfg.start.y, p.color, 15, mpParts); snd('lvl');
      // clear walls near spawn
      mpWalls = mpWalls.filter(w => Math.abs(w.x-cfg.start.x)>2 || Math.abs(w.y-cfg.start.y)>2);
    }, skipRespawnDelay ? 0 : 2500);
  }
  updateHUDMP();
}

function tickMP(){
  const ts = performance.now();
  
  // Clean powerups & viruses
  mpPlayers.forEach(p => {
    if(p.pu && ts>p.puEnd) p.pu = null;
    if(p.virused && ts>p.virusEnd) p.virused = false;
    if(p.invincible && ts>p.invincEnd) p.invincible = false;
  });

  const moves = {};
  mpPlayers.filter(p=>p.alive).forEach(p => {
    p.dir = {...p.nDir}; p.dLock = false;
    moves[p.id] = { x: p.snake[0].x + p.dir.x, y: p.snake[0].y + p.dir.y };
  });

  // 1. Boundary & Walls
  Object.keys(moves).forEach(id => {
    let p = mpPlayers[id], m = moves[id];
    if(m.x<0||m.x>=GS||m.y<0||m.y>=GS){
      if(p.pu==='SHIELD'){ m.x=(m.x+GS)%GS; m.y=(m.y+GS)%GS; }
      else { delete moves[id]; killMPPlayer(p); }
    } else {
      const fwI = mpWalls.findIndex(w=>w.x===m.x && w.y===m.y);
      if(fwI!==-1){
        if(p.pu==='SHIELD'){ mpWalls.splice(fwI,1); burstArr(m.x,m.y,'#3399ff',10, mpParts); }
        else { delete moves[id]; killMPPlayer(p); }
      }
    }
  });

  // 2. Head-to-Head & Swaps
  const ids = Object.keys(moves);
  for(let i=0; i<ids.length; i++){
    for(let j=i+1; j<ids.length; j++){
      let id1=ids[i], id2=ids[j];
      let p1=mpPlayers[id1], p2=mpPlayers[id2];
      let m1=moves[id1], m2=moves[id2];
      if(!m1 || !m2) continue;
      
      // Same spot
      if(m1.x===m2.x && m1.y===m2.y){
        if(!p1.invincible) { delete moves[id1]; killMPPlayer(p1); }
        if(!p2.invincible) { delete moves[id2]; killMPPlayer(p2); }
      }
      // Swap (A moves to B's old head, B moves to A's old head)
      else if(m1.x===p2.snake[0].x && m1.y===p2.snake[0].y && m2.x===p1.snake[0].x && m2.y===p1.snake[0].y){
        if(!p1.invincible) { delete moves[id1]; killMPPlayer(p1); }
        if(!p2.invincible) { delete moves[id2]; killMPPlayer(p2); }
      }
    }
  }

  // 3. Bites (Head to Body) & Self
  Object.keys(moves).forEach(id => {
    let attacker = mpPlayers[id];
    let nx = moves[id].x, ny = moves[id].y;
    let bitSomeone = false;

    // Check others
    mpPlayers.filter(p=>p.alive && p.id != id && !p.invincible).forEach(victim => {
      let idx = victim.snake.findIndex((s, i) => i>0 && s.x===nx && s.y===ny);
      if(idx !== -1 && !bitSomeone){
        bitSomeone = true; attacker.grow = true;
        let dropped = victim.snake.splice(idx);
        dropped.forEach(seg => mpCorpses.push({...seg, ts: performance.now()}));
        let pts = dropped.length * 50;
        attacker.score += pts;
        burstArr(nx, ny, attacker.color, 12, mpParts);
        mpFtxts.push({x:nx*cell, y:ny*cell, text:'BITE +'+pts, color:attacker.color, life:1, vy:-1.5, big:false});
      }
    });

    // Check Self
    if(!bitSomeone){
      let body = attacker.grow ? attacker.snake.slice(1) : attacker.snake.slice(1,-1);
      if(body.some(s=>s.x===nx && s.y===ny)){
        if(attacker.pu==='GHOST' && !attacker.ghostUsed){ attacker.ghostUsed=true; burstArr(nx,ny,'#c44dff',8, mpParts); }
        else { delete moves[id]; killMPPlayer(attacker); return; }
      }
    }
  });

  // 4. Food & Corpses
  Object.keys(moves).forEach(id => {
    let p = mpPlayers[id]; let nx = moves[id].x, ny = moves[id].y;
    
    // Food
    const fi = mpFoods.findIndex(f=>f.x===nx && f.y===ny);
    if(fi!==-1){
      p.grow = true; let fd = mpFoods.splice(fi,1)[0]; eatFoodMP(p, fd);
    }
    // Corpses
    const ci = mpCorpses.findIndex(c=>c.x===nx && c.y===ny);
    if(ci!==-1){
      p.grow = true; mpCorpses.splice(ci,1);
      p.score += 50; snd('eat'); burstArr(nx, ny, p.color, 5, mpParts);
    }
  });

  // 5. Apply Moves
  Object.keys(moves).forEach(id => {
    let p = mpPlayers[id];
    p.snake.unshift({x: moves[id].x, y: moves[id].y});
    if(p.grow) p.grow = false; else p.snake.pop();
  });

  // Cleanup
  if(mpFoods.length < 3) spawnFoodMP();
  mpFoods.forEach(f=>f.age++); mpWalls.forEach(w=>w.age++);
  mpCorpses = mpCorpses.filter(c => ts - c.ts < 8000); // 8s decay
  updateHUDMP();
}

function eatFoodMP(p, food){
  const f = FT[food.type];
  const isPU = food.type==='SHIELD'||food.type==='OVERCLOCK'||food.type==='GHOST'||food.type==='VIRUS';
  
  let pts = (food.type==='MEGA') ? 100 : f.pts;
  if(p.pu==='OVERCLOCK') pts *= 2;
  p.score += pts;

  if(isPU) snd('pu'); else if(food.type==='MEGA') snd('mega'); else snd('eat');
  burstArr(food.x, food.y, f.color, food.type==='MEGA'?15:9, mpParts);
  mpFtxts.push({x:food.x*cell, y:food.y*cell, text:'+'+pts, color:f.color, life:1, vy:-1.5, big:false});

  if(isPU){
    if(food.type === 'VIRUS') {
      let opponents = mpPlayers.filter(o => o.alive && o.id !== p.id && !o.invincible);
      if(opponents.length > 0) {
        let target = opponents[Math.floor(Math.random()*opponents.length)];
        target.virused = true; target.virusEnd = performance.now() + 3000;
        mpFtxts.push({x:target.snake[0].x*cell, y:target.snake[0].y*cell, text:'VIRUSED!', color:'#ff2255', life:1, vy:-1, big:false});
      }
    } else {
      p.pu = food.type; p.ghostUsed = false; p.puEnd = performance.now() + PU_DUR;
    }
  }
}

function checkMPEnd(){
  let active = mpPlayers.filter(p => !p.eliminated);
  if(active.length <= 1) endMP(false);
}

function endMP(timeUp){
  state = 'gameover'; clearInterval(mpTimerId); snd('die'); shk=16;
  clearTimeout(glitchTimer);
  mpPlayers.sort((a,b) => b.score - a.score);
  let winner = mpPlayers[0];
  
  const ov = document.getElementById('ov'); ov.classList.remove('gone');
  ov.innerHTML = `
    <div class="otitle" style="color:${winner.color}; font-size:30px;">${winner.name} WINS!</div>
    <div class="osub">${timeUp ? 'TIME LIMIT REACHED' : 'LAST WORM STANDING'}</div>
    <div class="sgrid" style="grid-template-columns: 1fr;">
      ${mpPlayers.map(p => `<div class="si" style="flex-direction:row; justify-content:space-between; width:100%; border-bottom:1px solid rgba(255,255,255,.1); padding:5px 0; opacity:${p.eliminated?0.5:1}">
        <span class="sl" style="color:${p.color}; font-size:14px;">${p.name}</span>
        <span class="sv">${p.score}</span>
      </div>`).join('')}
    </div>
    <button class="obtn" id="rmbtn">[ REMATCH ]</button>
    <button class="obtn btn-cyan" id="mmbtn">[ MAIN MENU ]</button>
  `;
  document.getElementById('rmbtn').addEventListener('click', () => startGame(gameMode));
  document.getElementById('mmbtn').addEventListener('click', () => showMenu());
}

function updateHUDMP(){
  document.getElementById('mp-time').textContent = String(Math.floor(mpTimeLeft/60)).padStart(2,'0') + ':' + String(mpTimeLeft%60).padStart(2,'0');
  if(mpTimeLeft <= 10) document.getElementById('mp-time').style.color = '#ff2255';
  
  mpPlayers.forEach(p => {
    let c = document.getElementById('mp-c'+p.id);
    if(!c) return;
    if(p.eliminated) c.classList.add('eliminated'); else c.classList.remove('eliminated');
    document.getElementById('mp-s'+p.id).textContent = p.score;
    let lStr = ''; for(let i=0;i<3;i++) lStr += (i<p.lives)?'❤️':'🤍';
    document.getElementById('mp-l'+p.id).textContent = lStr;
    if(p.pu) c.style.boxShadow = `0 0 10px ${FT[p.pu].color} inset`;
    else c.style.boxShadow = 'none';
  });
}

function loopMP(ts){
  const sp=getSpeedMP();
  if(ts-lastT>=sp){lastT=ts;tickMP();if(state!=='playing')return;}
  drawGame(ts, mpFoods, mpWalls, mpParts, mpFtxts, drawMPSnakes);
  
  // Custom for MP Corpses
  ctx.shadowBlur=6; ctx.shadowColor='#00d4ff'; ctx.fillStyle='rgba(0,212,255,0.6)';
  mpCorpses.forEach(c => {
    let pct = 1 - (ts - c.ts)/8000;
    if(pct>0) {
      ctx.globalAlpha = pct;
      ctx.beginPath(); rr(c.x*cell+2, c.y*cell+2, cell-4, cell-4, 2); ctx.fill();
    }
  });
  ctx.globalAlpha=1; ctx.shadowBlur=0;
  
  for(let i=mpParts.length-1;i>=0;i--){
    const p=mpParts[i]; p.x+=p.vx; p.y+=p.vy; p.vy+=.09; p.life-=.032;
    if(p.life<=0)mpParts.splice(i,1);
  }
  for(let i=mpFtxts.length-1;i>=0;i--){
    const t=mpFtxts[i]; t.y+=t.vy; t.life-=.022; if(t.life<=0)mpFtxts.splice(i,1);
  }
}

// ── Shared Render ──────────────────────────────
function drawGrid(){
  ctx.strokeStyle='rgba(0,232,100,.038)'; ctx.lineWidth=.5;
  for(let i=0;i<=GS;i++){ const p=i*cell; ctx.beginPath();ctx.moveTo(p,0);ctx.lineTo(p,cSize);ctx.stroke(); ctx.beginPath();ctx.moveTo(0,p);ctx.lineTo(cSize,p);ctx.stroke(); }
}
function drawWallsArr(wArr){
  for(const {x,y} of wArr){
    const px=x*cell, py=y*cell, s=cell-1;
    ctx.fillStyle='#0d0205'; ctx.fillRect(px,py,s,s);
    ctx.strokeStyle='#ff2255'; ctx.lineWidth=1; ctx.strokeRect(px+.5,py+.5,s-1,s-1);
    ctx.fillStyle='rgba(255,34,85,.1)'; ctx.fillRect(px,py,s,s);
    ctx.strokeStyle='rgba(255,34,85,.4)'; ctx.lineWidth=.7;
    ctx.beginPath(); ctx.moveTo(px+3,py+3);ctx.lineTo(px+s-3,py+s-3); ctx.moveTo(px+s-3,py+3);ctx.lineTo(px+3,py+s-3); ctx.stroke();
  }
}
function drawFoodsArr(ts, fArr){
  for(const fd of fArr){
    const f=FT[fd.type]; const cx=fd.x*cell+cell/2, cy=fd.y*cell+cell/2;
    const pulse=(Math.sin(ts/260+fd.phase)+1)/2; const r=cell*.27+pulse*cell*.06;
    ctx.shadowBlur=7+pulse*7; ctx.shadowColor=f.color; ctx.fillStyle=f.color;
    ctx.beginPath();ctx.arc(cx,cy,r,0,Math.PI*2);ctx.fill(); ctx.shadowBlur=0;
    ctx.fillStyle='rgba(255,255,255,.3)'; ctx.beginPath();ctx.arc(cx-r*.3,cy-r*.32,r*.28,0,Math.PI*2);ctx.fill();
    if(fd.type!=='DATA'&&fd.type!=='MEGA'){
      ctx.strokeStyle=f.color+'60';ctx.lineWidth=.8; ctx.beginPath();ctx.arc(cx,cy,r+2+pulse*2,0,Math.PI*2);ctx.stroke();
    }
  }
}
function drawPartsArr(pArr){
  for(const p of pArr){ ctx.globalAlpha=p.life; ctx.fillStyle=p.color; ctx.shadowBlur=4; ctx.shadowColor=p.color; ctx.beginPath();ctx.arc(p.x,p.y,p.sz,0,Math.PI*2);ctx.fill(); }
  ctx.globalAlpha=1; ctx.shadowBlur=0;
}
function drawFtxtsArr(tArr){
  ctx.textAlign='center';ctx.textBaseline='middle';
  for(const t of tArr){
    ctx.globalAlpha=t.life; ctx.fillStyle=t.color;
    ctx.font=t.big ? `900 ${Math.floor(cell*1.05)}px 'Orbitron',sans-serif` : `${Math.floor(cell*.68)}px 'Share Tech Mono',monospace`;
    ctx.shadowBlur=t.big?14:5; ctx.shadowColor=t.color; ctx.fillText(t.text,t.x,t.y);
  }
  ctx.globalAlpha=1; ctx.shadowBlur=0; ctx.textAlign='left'; ctx.textBaseline='alphabetic';
}
function drawGlitch(){
  if(!glitching)return;
  for(let i=0;i<3;i++){
    const sy=Math.random()*cSize; ctx.fillStyle=`rgba(0,${190+Math.floor(Math.random()*65)},120,${.08+Math.random()*.08})`;
    ctx.fillRect(0,sy,cSize,2+Math.random()*7);
  }
  if(Math.random()>.5){ ctx.fillStyle='rgba(0,212,255,.05)'; ctx.fillRect(Math.random()*cSize*0.8,Math.random()*cSize,30+Math.random()*60,2+Math.random()*4); }
  ctx.fillStyle='rgba(255,34,85,.04)'; ctx.fillRect(Math.floor(Math.random()*cSize),0,3,cSize);
}

function drawGame(ts, fArr, wArr, pArr, tArr, drawSnakeFn){
  ctx.fillStyle='#030609';ctx.fillRect(0,0,cSize,cSize);
  const doShk=shk>.4;
  if(doShk){ ctx.save(); ctx.translate((Math.random()-.5)*shk*2,(Math.random()-.5)*shk*2); shk*=.8; if(shk<.4)shk=0; }
  drawMat(ts); drawGrid(); drawWallsArr(wArr); drawFoodsArr(ts, fArr);
  drawSnakeFn(ts);
  drawPartsArr(pArr);
  if(doShk)ctx.restore();
  drawFtxtsArr(tArr); drawGlitch();
}

// ── Specific Snakes Render ──────────────────────
function drawSPSnake(ts){
  const n=snake.length;
  for(let i=n-1;i>=0;i--){
    const {x,y}=snake[i]; const t=1-(i/n); const px=x*cell+1, py=y*cell+1, s=cell-2;
    if(i===0){
      const hc=pu==='SHIELD'?'#3399ff':pu==='GHOST'?'#c44dff':pu==='OVERCLOCK'?'#ff7700':'#00e87a';
      ctx.shadowBlur=13; ctx.shadowColor=hc; ctx.fillStyle=hc; ctx.beginPath(); rr(px,py,s,s,3); ctx.fill(); ctx.shadowBlur=0;
      const es=Math.max(1.5,cell*.1); ctx.fillStyle='#020405'; const ecx=px+s/2, ecy=py+s/2; let e1x,e1y,e2x,e2y;
      if(dir.x===1)     {e1x=ecx+s*.15;e1y=ecy-s*.15;e2x=ecx+s*.15;e2y=ecy+s*.15;}
      else if(dir.x===-1){e1x=ecx-s*.15;e1y=ecy-s*.15;e2x=ecx-s*.15;e2y=ecy+s*.15;}
      else if(dir.y===-1){e1x=ecx-s*.15;e1y=ecy-s*.15;e2x=ecx+s*.15;e2y=ecy-s*.15;}
      else               {e1x=ecx-s*.15;e1y=ecy+s*.15;e2x=ecx+s*.15;e2y=ecy+s*.15;}
      ctx.beginPath();ctx.arc(e1x,e1y,es,0,Math.PI*2);ctx.fill(); ctx.beginPath();ctx.arc(e2x,e2y,es,0,Math.PI*2);ctx.fill();
      ctx.fillStyle='rgba(255,255,255,.12)'; ctx.fillRect(px,py+((ts%700)/700)*s,s,1.5);
    } else {
      const a=clamp(.25+t*.75,0,1); let bc;
      if(pu==='GHOST') bc=`rgba(196,77,255,${a})`; else if(pu==='OVERCLOCK') bc=`rgba(255,${Math.floor(80+t*55)},0,${a})`;
      else if(pu==='SHIELD') bc=`rgba(${Math.floor(20+t*20)},${Math.floor(110+t*80)},255,${a})`;
      else bc=`rgba(0,${Math.floor(130+t*110)},${Math.floor(t*80)},${a})`;
      ctx.shadowBlur=t*6; ctx.shadowColor='rgba(0,232,122,.2)'; ctx.fillStyle=bc;
      const ins=Math.round((1-t)*2); ctx.beginPath(); rr(px+ins,py+ins,s-ins*2,s-ins*2,2); ctx.fill(); ctx.shadowBlur=0;
    }
  }
}

function drawMPSnakes(ts){
  mpPlayers.forEach(p => {
    if(!p.alive && !p.respawning) return;
    if(p.respawning) {
      // Draw respawn countdown text
      let txt = "RESPAWNING";
      ctx.fillStyle = p.color; ctx.font = `14px 'Orbitron',sans-serif`; ctx.textAlign='center';
      ctx.fillText(txt, p.start.x*cell, p.start.y*cell);
      ctx.textAlign='left';
      return;
    }
    
    // Invincibility flash
    if(p.invincible && Math.sin(ts/50) < 0) return;

    const n = p.snake.length;
    for(let i=n-1; i>=0; i--){
      const {x,y} = p.snake[i]; const t = 1-(i/n); const px = x*cell+1, py = y*cell+1, s = cell-2;
      if(i===0){
        let hc = p.color;
        if(p.virused) hc = '#ff2255'; // Virus tint
        else if(p.pu) hc = FT[p.pu].color;
        
        ctx.shadowBlur=10; ctx.shadowColor=hc; ctx.fillStyle=hc; ctx.beginPath(); rr(px,py,s,s,3); ctx.fill(); ctx.shadowBlur=0;
        
        if(cell>=12){
          ctx.fillStyle='rgba(0,0,0,0.7)'; ctx.font=`${Math.floor(cell*.5)}px 'Share Tech Mono',monospace`;
          ctx.textAlign='center'; ctx.textBaseline='middle'; ctx.fillText(p.name, px+s/2, py+s/2); ctx.textAlign='left'; ctx.textBaseline='alphabetic';
        }
      } else {
        ctx.fillStyle = p.color; ctx.globalAlpha = 0.3 + t*0.6;
        const ins=Math.round((1-t)*2); ctx.beginPath(); rr(px+ins,py+ins,s-ins*2,s-ins*2,2); ctx.fill();
        ctx.globalAlpha = 1;
      }
    }
  });
}

function loop(ts){
  if(gameMode === 'sp') loopSP(ts);
  else loopMP(ts);
  if(state==='playing') rafId = requestAnimationFrame(loop);
}

// ── Overlays ───────────────────────────────────
function hideOv(){document.getElementById('ov').classList.add('gone');}

function showMenu(){
  state='menu'; gameMode='menu';
  GS = 22; doResize();
  document.getElementById('hud').style.display = 'flex';
  document.getElementById('mp-hud').style.display = 'none';
  const ov=document.getElementById('ov'); ov.classList.remove('gone');
  const isMobile = 'ontouchstart' in window;
  ov.innerHTML=`
    <div class="otitle glitch" data-text="CYBER WORM">CYBER<span> WORM</span></div>
    <div class="legend">
      <div class="li"><div class="ld" style="background:#00d4ff"></div>DATA</div>
      <div class="li"><div class="ld" style="background:#ffc844"></div>MEGA</div>
      <div class="li"><div class="ld" style="background:#3399ff"></div>SHIELD</div>
      <div class="li"><div class="ld" style="background:#ff7700"></div>OVERCLOCK</div>
      <div class="li"><div class="ld" style="background:#c44dff"></div>GHOST</div>
      ${!isMobile ? '<div class="li"><div class="ld" style="background:#ff2255"></div>VIRUS (MP)</div>' : ''}
    </div>
    <button class="obtn" id="btn-sp">[ 1 PLAYER ]</button>
    ${!isMobile ? '<button class="obtn btn-cyan" id="btn-mp2">[ 2 PLAYERS ]</button>' : ''}
    ${!isMobile ? '<button class="obtn btn-gold" id="btn-mp3">[ 3 PLAYERS ]</button>' : ''}
    <div style="margin-top:15px;font-size:9px;color:var(--tdim);letter-spacing:1px; line-height: 1.5;">
      ${isMobile ? 'SWIPE OR D-PAD FOR DIRECTION' : 'SP: WASD/ARROWS/SWIPE<br/>MP (KBD ONLY): P1(WASD) · P2(ARROWS) · P3(IJKL)'}
    </div>`;
  document.getElementById('btn-sp').addEventListener('click',()=>startGame('sp'));
  if(!isMobile){
    document.getElementById('btn-mp2').addEventListener('click',()=>startGame('mp2'));
    document.getElementById('btn-mp3').addEventListener('click',()=>startGame('mp3'));
  }
  idleLoop();
}

function showGOSP(isNew){
  const ov = document.getElementById('ov'); ov.classList.remove('gone');
  ov.innerHTML = `
    <div class="otitle" style="color:#ff2255;">PROCESS.KILLED</div>
    <div class="osub">EXECUTION TERMINATED</div>
    ${isNew ? '<div class="nr">◈ NEW HIGH SCORE ◈</div>' : ''}
    <div class="sgrid">
      <div class="si"><div class="sl">SCORE</div><div class="sv">${Math.floor(score)}</div></div>
      <div class="si"><div class="sl">LEVEL</div><div class="sv">${level}</div></div>
      <div class="si"><div class="sl">LENGTH</div><div class="sv">${snake.length}</div></div>
      <div class="si"><div class="sl">BEST</div><div class="sv">${Math.floor(hi)}</div></div>
    </div>
    <button class="obtn" id="rmbtn">[ REBOOT ]</button>
    <button class="obtn btn-cyan" id="mmbtn">[ MAIN MENU ]</button>`;
  document.getElementById('rmbtn').addEventListener('click', () => startGame('sp'));
  document.getElementById('mmbtn').addEventListener('click', () => showMenu());
}

function showPause(){
  const ov=document.getElementById('ov'); ov.classList.remove('gone');
  ov.innerHTML=`
    <div class="otitle" style="color:#00d4ff;font-size:clamp(20px,5vw,34px);">SUSPENDED</div>
    <div class="osub">// PROCESS PAUSED //</div>
    <button class="obtn" id="sbtn">[ RESUME ]</button>`;
  document.getElementById('sbtn').addEventListener('click',()=>doResume());
}

function doPause(){
  if(state!=='playing')return;
  state='paused'; cancelAnimationFrame(rafId); snd('pause'); showPause();
}
function doResume(){
  if(state!=='paused')return;
  hideOv(); state='playing'; lastT=performance.now(); rafId=requestAnimationFrame(loop); snd('pause');
}

let idleRafId=0;
function idleLoop(){
  if(state!=='menu'){cancelAnimationFrame(idleRafId);return;}
  ctx.fillStyle='#030609';ctx.fillRect(0,0,cSize,cSize); drawMat(performance.now()); drawGrid();
  idleRafId=requestAnimationFrame(idleLoop);
}

// ── Input ──────────────────────────────────────
function changeDirSP(d){
  if(dLock)return; const t=DIRS[d]; if(!t)return;
  if(dir.x+t.x===0&&dir.y+t.y===0)return; nDir={...t}; dLock=true;
}

window.addEventListener('keydown',e=>{
  const noDefault=['ArrowUp','ArrowDown','ArrowLeft','ArrowRight',' '];
  if(noDefault.includes(e.key))e.preventDefault();
  if(e.key==='p'||e.key==='P'||e.key===' '){ if(state==='playing')doPause(); else if(state==='paused')doResume(); return; }
  if(state!=='playing')return;

  if(gameMode === 'sp'){
    const map={ArrowUp:'UP',ArrowDown:'DOWN',ArrowLeft:'LEFT',ArrowRight:'RIGHT', w:'UP',s:'DOWN',a:'LEFT',d:'RIGHT', W:'UP',S:'DOWN',A:'LEFT',D:'RIGHT'};
    if(map[e.key]) changeDirSP(map[e.key]);
  } else {
    // MP Keys
    mpPlayers.forEach(p => {
      if(!p.alive || p.dLock) return;
      let d = p.keys[e.key];
      if(d){
        if(p.virused) { d = d==='UP'?'DOWN':d==='DOWN'?'UP':d==='LEFT'?'RIGHT':'LEFT'; } // Virus inversion
        let t = DIRS[d];
        if(p.dir.x+t.x===0 && p.dir.y+t.y===0) return;
        p.nDir = {...t}; p.dLock = true;
      }
    });
  }
});

// Touch (SP only)
window.addEventListener('touchstart',e=>{
  if(gameMode!=='sp' || e.target.classList.contains('db'))return;
  touchX=e.touches[0].clientX; touchY=e.touches[0].clientY;
},{passive:true});
window.addEventListener('touchend',e=>{
  if(gameMode!=='sp' || e.target.classList.contains('db') || touchX===undefined)return;
  const dx=e.changedTouches[0].clientX-touchX, dy=e.changedTouches[0].clientY-touchY;
  const adx=Math.abs(dx),ady=Math.abs(dy); if(Math.max(adx,ady)<22)return;
  if(state==='playing') changeDirSP(adx>ady?(dx>0?'RIGHT':'LEFT'):(dy>0?'DOWN':'UP'));
},{passive:true});

function bindDpad(id,d){
  const btn=document.getElementById(id);
  btn.addEventListener('touchstart',e=>{ e.preventDefault();initAudio(); if(state==='playing' && gameMode==='sp')changeDirSP(d); },{passive:false});
  btn.addEventListener('mousedown',()=>{initAudio();if(state==='playing' && gameMode==='sp')changeDirSP(d);});
}
bindDpad('du','UP');bindDpad('dd','DOWN');bindDpad('dl','LEFT');bindDpad('dr','RIGHT');
document.getElementById('dc').addEventListener('click',()=>{ initAudio(); if(state==='playing')doPause(); else if(state==='paused')doResume(); });

window.addEventListener('resize',()=>{ clearTimeout(resizeTO); resizeTO=setTimeout(()=>{ doResize(); if(state==='menu')idleLoop(); },150); });

function boot(){
  try{hi=parseInt(localStorage.getItem('_dex_hi'))||0;}catch(e){hi=0;}
  setupCanvas(); showMenu();
}
if(document.fonts&&document.fonts.ready) document.fonts.ready.then(boot); else window.addEventListener('load',boot);
</script>
