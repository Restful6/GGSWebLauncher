<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  :root {
    --x-color: #ff4da6;
    --o-color: #00e676;
    --accent:  #00cfff;
    --bg:      #0d0d1a;
    --surface: rgba(255,255,255,0.04);
    --border:  rgba(0,207,255,0.22);
  }

  body {
    min-height: 100vh;
    background: var(--bg);
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    font-family: 'Orbitron', sans-serif;
    color: #fff;
    overflow: hidden;
    position: relative;
  }

  /* Subtle static radial glow — no animation, zero GPU cost */
  body::before {
    content: '';
    position: fixed;
    inset: 0;
    background:
      radial-gradient(ellipse 60% 50% at 25% 15%, rgba(0,207,255,0.07) 0%, transparent 70%),
      radial-gradient(ellipse 50% 40% at 75% 85%, rgba(180,0,255,0.05) 0%, transparent 70%);
    pointer-events: none;
    z-index: 0;
  }

  #particles {
    position: fixed;
    inset: 0;
    pointer-events: none;
    z-index: 0;
    opacity: 0.45;
  }

  .container {
    position: relative;
    z-index: 1;
    display: flex;
    flex-direction: column;
    align-items: center;
    width: 100%;
    max-width: 420px;
    padding: 16px 20px;
  }

  /* ── HEADER ── */
  h1 {
    font-size: clamp(1.9rem, 7vw, 3rem);
    letter-spacing: 4px;
    color: var(--accent);
    text-shadow: 0 0 14px rgba(0,207,255,0.35);
    margin-bottom: 4px;
  }

  .subtitle {
    font-family: 'Exo 2', sans-serif;
    font-size: 0.7rem;
    letter-spacing: 4px;
    color: rgba(0,207,255,0.38);
    margin-bottom: 22px;
    text-transform: uppercase;
  }

  /* ── SCOREBOARD ── */
  .scoreboard {
    display: grid;
    grid-template-columns: 1fr 1fr 1fr;
    border: 1px solid var(--border);
    border-radius: 10px;
    overflow: hidden;
    width: 100%;
    margin-bottom: 18px;
    background: rgba(0,0,0,0.25);
  }

  .score-item {
    display: flex;
    flex-direction: column;
    align-items: center;
    padding: 10px 6px 8px;
  }

  .score-item + .score-item { border-left: 1px solid var(--border); }

  .score-label {
    font-family: 'Exo 2', sans-serif;
    font-size: 0.6rem;
    letter-spacing: 2px;
    color: rgba(255,255,255,0.35);
    text-transform: uppercase;
    margin-bottom: 3px;
  }

  .score-val {
    font-size: 1.7rem;
    font-weight: 700;
    line-height: 1;
  }

  .score-val.x    { color: var(--x-color); }
  .score-val.draw { color: rgba(255,255,255,0.4); }
  .score-val.o    { color: var(--o-color); }

  /* ── BUTTONS ── */
  .btn {
    background: var(--surface);
    border: 1.5px solid var(--border);
    color: var(--accent);
    padding: 10px 20px;
    font-family: 'Orbitron', sans-serif;
    font-size: 0.78rem;
    cursor: pointer;
    border-radius: 8px;
    letter-spacing: 1px;
    transition: background 0.18s, border-color 0.18s, transform 0.12s, color 0.18s;
    white-space: nowrap;
  }

  .btn:hover  { background: rgba(0,207,255,0.14); border-color: var(--accent); }
  .btn:active { transform: scale(0.96); }

  .btn.active {
    background: rgba(0,207,255,0.18);
    border-color: var(--accent);
    box-shadow: 0 0 8px rgba(0,207,255,0.2);
  }

  .btn.primary {
    font-size: 0.92rem;
    padding: 13px 40px;
    border-color: var(--accent);
  }

  .btn.primary:hover { background: var(--accent); color: #000; }

  .btn.ghost {
    border-color: rgba(255,255,255,0.14);
    color: rgba(255,255,255,0.4);
    font-size: 0.72rem;
    padding: 8px 16px;
  }

  .btn.ghost:hover { border-color: rgba(255,255,255,0.4); color: rgba(255,255,255,0.8); background: rgba(255,255,255,0.05); }

  /* ── MENU ── */
  #menu {
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 10px;
    width: 100%;
  }

  .section-label {
    font-family: 'Exo 2', sans-serif;
    font-size: 0.62rem;
    color: rgba(255,255,255,0.3);
    letter-spacing: 3px;
    text-transform: uppercase;
    margin-top: 4px;
  }

  .btn-row {
    display: flex;
    gap: 10px;
    flex-wrap: wrap;
    justify-content: center;
  }

  .powered {
    margin-top: 18px;
    font-family: 'Exo 2', sans-serif;
    font-size: 0.7rem;
    color: rgba(0,207,255,0.25);
    letter-spacing: 3px;
    text-transform: uppercase;
  }

  .powered span { color: rgba(0,230,118,0.4); }

  /* ── GAME ── */
  #game {
    display: none;
    flex-direction: column;
    align-items: center;
    width: 100%;
  }

  .status {
    font-size: clamp(0.85rem, 3.5vw, 1.1rem);
    min-height: 2em;
    display: flex;
    align-items: center;
    justify-content: center;
    margin-bottom: 14px;
    color: rgba(255,255,255,0.75);
    letter-spacing: 1px;
    text-align: center;
    transition: color 0.2s;
  }

  .mark-x { color: var(--x-color); }
  .mark-o { color: var(--o-color); }

  /* ── BOARD ── */
  .board {
    display: grid;
    grid-template-columns: repeat(3, 1fr);
    gap: 9px;
    width: min(340px, 90vw);
  }

  .cell {
    aspect-ratio: 1;
    background: var(--surface);
    border: 1.5px solid var(--border);
    border-radius: 12px;
    font-size: clamp(2.2rem, 9vw, 3.6rem);
    display: flex;
    align-items: center;
    justify-content: center;
    cursor: pointer;
    position: relative;
    overflow: hidden;
    transition: background 0.15s, border-color 0.15s;
    -webkit-tap-highlight-color: transparent;
    user-select: none;
  }

  .cell:not(.taken):hover { background: rgba(0,207,255,0.08); border-color: rgba(0,207,255,0.45); }
  .cell:not(.taken):active { transform: scale(0.94); }
  .cell.taken { cursor: default; }

  /* hover ghost mark */
  .cell:not(.taken).hint-x:hover::after { content: 'X'; color: rgba(255,77,166,0.22); position: absolute; font-size: inherit; pointer-events: none; }
  .cell:not(.taken).hint-o:hover::after { content: 'O'; color: rgba(0,230,118,0.22); position: absolute; font-size: inherit; pointer-events: none; }

  .cell .mark {
    animation: popIn 0.22s cubic-bezier(0.34, 1.56, 0.64, 1) both;
    display: block;
  }

  @keyframes popIn {
    from { transform: scale(0) rotate(-12deg); opacity: 0; }
    to   { transform: scale(1) rotate(0deg);   opacity: 1; }
  }

  .cell.x .mark { color: var(--x-color); }
  .cell.o .mark { color: var(--o-color); }

  /* winner highlight */
  .cell.winner {
    animation: winPulse 0.4s ease both;
  }
  .cell.winner.x { background: rgba(255,77,166,0.14); border-color: rgba(255,77,166,0.7); }
  .cell.winner.o { background: rgba(0,230,118,0.14); border-color: rgba(0,230,118,0.7); }

  @keyframes winPulse {
    0%   { transform: scale(1);    }
    45%  { transform: scale(1.08); }
    100% { transform: scale(1);    }
  }

  /* win line overlay */
  .win-line {
    position: absolute;
    pointer-events: none;
    z-index: 2;
    inset: 0;
  }

  .win-line line {
    stroke-dasharray: 500;
    stroke-dashoffset: 500;
    animation: drawLine 0.4s 0.15s ease forwards;
  }

  @keyframes drawLine {
    to { stroke-dashoffset: 0; }
  }

  /* game controls */
  .game-controls {
    display: flex;
    gap: 10px;
    margin-top: 16px;
    flex-wrap: wrap;
    justify-content: center;
  }

  /* ── FLASH ── */
  #winFlash {
    position: fixed;
    inset: 0;
    pointer-events: none;
    z-index: 10;
    opacity: 0;
  }

  @keyframes flashAnim {
    0%   { opacity: 0.22; }
    100% { opacity: 0;    }
  }

  .board-wrap { position: relative; width: min(340px, 90vw); }
</style>

<body>

<div id="winFlash"></div>
<canvas id="particles"></canvas>

<div class="container">
  <h1 style="margin-bottom: 0; white-space: nowrap;">TIC TAC TOE</h1>
  <div class="subtitle">By Greek Games Studios</div>

  <!-- ═══════════ MENU ═══════════ -->
  <div id="menu">
    <div class="scoreboard">
      <div class="score-item">
        <span class="score-label" id="menuLabelX">Player X</span>
        <span class="score-val x" id="menuScoreX">0</span>
      </div>
      <div class="score-item">
        <span class="score-label">Draws</span>
        <span class="score-val draw" id="menuScoreDraw">0</span>
      </div>
      <div class="score-item">
        <span class="score-label" id="menuLabelO">Player O</span>
        <span class="score-val o" id="menuScoreO">0</span>
      </div>
    </div>

    <div class="section-label">Mode</div>
    <div class="btn-row">
      <button class="btn active" id="btn1P" onclick="setMode(1)">1 PLAYER</button>
      <button class="btn"        id="btn2P" onclick="setMode(2)">2 PLAYERS</button>
    </div>

    <div id="diffRow" style="display:contents">
      <div class="section-label">AI Difficulty</div>
      <div class="btn-row">
        <button class="btn" id="btnEasy" onclick="setDiff('easy')">EASY</button>
        <button class="btn active" id="btnMed" onclick="setDiff('medium')">MEDIUM</button>
        <button class="btn" id="btnHard" onclick="setDiff('hard')">HARD</button>
      </div>
    </div>

    <button class="btn primary" onclick="startGame()" style="margin-top:10px">START GAME</button>
    <button class="btn ghost" onclick="resetScores()">Reset Scores</button>
    <div class="powered">Powered by <span>Greek Games Studios</span></div>
  </div>

  <!-- ═══════════ GAME ═══════════ -->
  <div id="game">
    <div class="scoreboard">
      <div class="score-item">
        <span class="score-label" id="gameLabelX">Player X</span>
        <span class="score-val x" id="gameScoreX">0</span>
      </div>
      <div class="score-item">
        <span class="score-label">Draws</span>
        <span class="score-val draw" id="gameScoreDraw">0</span>
      </div>
      <div class="score-item">
        <span class="score-label" id="gameLabelO">Player O</span>
        <span class="score-val o" id="gameScoreO">0</span>
      </div>
    </div>

    <div class="status" id="status">Player <span class="mark-x">X</span>'s turn</div>

    <div class="board-wrap">
      <div class="board" id="board"></div>
      <svg class="win-line" id="winLine" viewBox="0 0 340 340" style="display:none">
        <line id="winLineEl" stroke="rgba(255,255,255,0.55)" stroke-width="5" stroke-linecap="round"/>
      </svg>
    </div>

    <div class="game-controls">
      <button class="btn" onclick="rematch()">REMATCH</button>
      <button class="btn ghost" onclick="goMenu()">MENU</button>
    </div>
  </div>
</div>

<script>
/* ═══════════════════════════════════════════════
   AUDIO — Web Audio API, no external deps
═══════════════════════════════════════════════ */
let _ac = null;
const ac = () => { if (!_ac) _ac = new (window.AudioContext || window.webkitAudioContext)(); return _ac; };

function tone(freq, type = 'sine', dur = 0.12, vol = 0.12, delay = 0) {
  try {
    const a = ac();
    const osc  = a.createOscillator();
    const gain = a.createGain();
    osc.connect(gain); gain.connect(a.destination);
    osc.type = type;
    osc.frequency.value = freq;
    gain.gain.setValueAtTime(0, a.currentTime + delay);
    gain.gain.linearRampToValueAtTime(vol, a.currentTime + delay + 0.01);
    gain.gain.exponentialRampToValueAtTime(0.0001, a.currentTime + delay + dur);
    osc.start(a.currentTime + delay);
    osc.stop(a.currentTime + delay + dur + 0.05);
  } catch(_) {}
}

const sndPlace = () => tone(380, 'sine', 0.1, 0.1);
const sndWin   = () => { [523,659,784,1047].forEach((f,i) => tone(f,'sine',0.18,0.12,i*0.1)); };
const sndDraw  = () => { tone(260,'triangle',0.12,0.1,0); tone(220,'triangle',0.18,0.08,0.12); };
const sndAI    = () => tone(300, 'square', 0.08, 0.06);

/* ═══════════════════════════════════════════════
   PARTICLES — lightweight, fixed pool
═══════════════════════════════════════════════ */
const cvs = document.getElementById('particles');
const ptx = cvs.getContext('2d');

function resizeCvs() { cvs.width = window.innerWidth; cvs.height = window.innerHeight; }
resizeCvs();
window.addEventListener('resize', resizeCvs, { passive: true });

const POOL = 55;
const px = new Float32Array(POOL);
const py = new Float32Array(POOL);
const pvx= new Float32Array(POOL);
const pvy= new Float32Array(POOL);
const pr = new Float32Array(POOL);
const pl = new Float32Array(POOL); // life

function resetParticle(i) {
  px[i]  = Math.random() * cvs.width;
  py[i]  = Math.random() * cvs.height;
  pvx[i] = (Math.random() - 0.5) * 0.35;
  pvy[i] = (Math.random() - 0.5) * 0.35;
  pr[i]  = Math.random() * 1.2 + 0.4;
  pl[i]  = Math.random() * 0.6 + 0.4;
}

for (let i = 0; i < POOL; i++) resetParticle(i);

function drawParticles() {
  ptx.clearRect(0, 0, cvs.width, cvs.height);
  ptx.fillStyle = '#00cfff';
  for (let i = 0; i < POOL; i++) {
    px[i] += pvx[i]; py[i] += pvy[i]; pl[i] -= 0.0018;
    if (pl[i] <= 0) resetParticle(i);
    ptx.globalAlpha = pl[i] * 0.55;
    ptx.beginPath();
    ptx.arc(px[i], py[i], pr[i], 0, 6.2832);
    ptx.fill();
  }
  ptx.globalAlpha = 1;
  requestAnimationFrame(drawParticles);
}
drawParticles();

/* ═══════════════════════════════════════════════
   GAME STATE
═══════════════════════════════════════════════ */
let board       = Array(9).fill('');
let currPlayer  = 'X';
let gameActive  = false;
let aiLock      = false;   // prevents double-moves during AI delay
let gameMode    = 1;       // 1 | 2
let diff        = 'medium';// easy | medium | hard
const tally     = { X: 0, O: 0, draw: 0 };

const WIN_COMBOS = [
  [0,1,2],[3,4,5],[6,7,8],
  [0,3,6],[1,4,7],[2,5,8],
  [0,4,8],[2,4,6]
];

// SVG win-line cell centres (for 340px board, 9px gap, cells ~107px)
// centre of cell i = margin + i*(cellSize+gap) + cellSize/2
// cell size = (340 - 2*gap) / 3 ≈ 107.33, gap=9
const CELL_SIZE = (340 - 2 * 9) / 3; // ~107.3
function cellCentre(i) {
  const col = i % 3, row = Math.floor(i / 3);
  const x = col * (CELL_SIZE + 9) + CELL_SIZE / 2;
  const y = row * (CELL_SIZE + 9) + CELL_SIZE / 2;
  return { x, y };
}

/* ═══════════════════════════════════════════════
   UI HELPERS
═══════════════════════════════════════════════ */
const $  = id => document.getElementById(id);
const statusEl = $('status');
const boardEl  = $('board');
const menuDiv  = $('menu');
const gameDiv  = $('game');

function setStatus(html) { statusEl.innerHTML = html; }
function mX(p) { return `<span class="mark-${p.toLowerCase()}">${p}</span>`; }

function syncScores() {
  const oName = gameMode === 1 ? 'AI' : 'Player O';
  ['menu','game'].forEach(prefix => {
    $(prefix + 'ScoreX').textContent    = tally.X;
    $(prefix + 'ScoreO').textContent    = tally.O;
    $(prefix + 'ScoreDraw').textContent = tally.draw;
    $(prefix + 'LabelO').textContent    = oName;
  });
}

/* ═══════════════════════════════════════════════
   SETTINGS
═══════════════════════════════════════════════ */
function setMode(m) {
  gameMode = m;
  $('btn1P').classList.toggle('active', m === 1);
  $('btn2P').classList.toggle('active', m === 2);
  $('diffRow').style.display = m === 1 ? 'contents' : 'none';
  syncScores();
}

function setDiff(d) {
  diff = d;
  ['Easy','Med','Hard'].forEach(x => $('btn' + x).classList.remove('active'));
  ({ easy:'Easy', medium:'Med', hard:'Hard' })[d] && $('btn' + ({ easy:'Easy', medium:'Med', hard:'Hard' })[d]).classList.add('active');
}

function resetScores() { tally.X = tally.O = tally.draw = 0; syncScores(); }

/* ═══════════════════════════════════════════════
   BOARD RENDER
═══════════════════════════════════════════════ */
function buildBoard() {
  boardEl.innerHTML = '';
  for (let i = 0; i < 9; i++) {
    const cell = document.createElement('div');
    cell.className = 'cell';
    cell.dataset.i = i;

    if (board[i]) {
      const m = document.createElement('span');
      m.className = 'mark';
      m.textContent = board[i];
      cell.appendChild(m);
      cell.classList.add(board[i].toLowerCase(), 'taken');
    } else {
      cell.addEventListener('click', onCellClick);
      if (!aiLock) cell.classList.add('hint-' + currPlayer.toLowerCase());
    }
    boardEl.appendChild(cell);
  }
}

function stampCell(idx, player) {
  const cell = boardEl.children[idx];
  cell.classList.remove('hint-x', 'hint-o');
  cell.classList.add(player.toLowerCase(), 'taken');
  cell.removeEventListener('click', onCellClick);
  const m = document.createElement('span');
  m.className = 'mark';
  m.textContent = player;
  cell.appendChild(m);
}

function refreshHints() {
  const canClick = !aiLock && gameActive;
  const hint = canClick ? 'hint-' + currPlayer.toLowerCase() : null;
  for (const cell of boardEl.children) {
    cell.classList.remove('hint-x', 'hint-o');
    if (!cell.classList.contains('taken')) {
      if (hint) cell.classList.add(hint);
      // Always re-attach listener (removeEventListener is safe if not attached)
      cell.removeEventListener('click', onCellClick);
      if (canClick) cell.addEventListener('click', onCellClick);
    }
  }
}

/* ═══════════════════════════════════════════════
   FLOW
═══════════════════════════════════════════════ */
function startGame() {
  board = Array(9).fill('');
  currPlayer = 'X';
  gameActive = true;
  aiLock = false;
  menuDiv.style.display = 'none';
  gameDiv.style.display = 'flex';
  $('winLine').style.display = 'none';
  syncScores();
  buildBoard();
  setStatus(`Player ${mX('X')}'s turn`);
}

function rematch() {
  board = Array(9).fill('');
  currPlayer = 'X';
  gameActive = true;
  aiLock = false;
  $('winLine').style.display = 'none';
  buildBoard();
  setStatus(`Player ${mX('X')}'s turn`);
}

function goMenu() {
  gameDiv.style.display = 'none';
  menuDiv.style.display = 'flex';
  syncScores();
}

/* ═══════════════════════════════════════════════
   MOVE HANDLING
═══════════════════════════════════════════════ */
function onCellClick(e) {
  if (aiLock || !gameActive) return;
  doMove(parseInt(e.currentTarget.dataset.i), currPlayer);
}

function doMove(idx, player) {
  board[idx] = player;
  stampCell(idx, player);
  sndPlace();

  const combo = winCombo(player);
  if (combo) { endRound(player, combo); return; }
  if (!board.includes('')) { endRound(null); return; }

  currPlayer = currPlayer === 'X' ? 'O' : 'X';

  if (gameMode === 1 && currPlayer === 'O') {
    aiLock = true;
    refreshHints();
    setStatus('AI is thinking…');
    // Disable remaining cells while AI thinks
    for (const cell of boardEl.children) cell.removeEventListener('click', onCellClick);
    setTimeout(triggerAI, 480);
  } else {
    refreshHints();
    setStatus(`Player ${mX(currPlayer)}'s turn`);
  }
}

/* ═══════════════════════════════════════════════
   ROUND END
═══════════════════════════════════════════════ */
// ── SCORE REPORTING TO APP ──
function sendScoreToApp(score, isNewRecord) {
  if (window.ReactNativeWebView) {
    window.ReactNativeWebView.postMessage(JSON.stringify({
      type: 'SEND_SCORE',
      score: score,
      game: 'Tic Tac Toe',
      isNewRecord: isNewRecord,
    }));
  }
}

function endRound(winner, combo) {
  gameActive = false;
  aiLock = false;

  // Send score after each round (wins count as score)
    if (gameMode === 1) {
      sendScoreToApp(tally.X, false);
    }

    if (winner) {
    // highlight winning cells with stagger
    combo.forEach((i, d) => setTimeout(() => boardEl.children[i].classList.add('winner', winner.toLowerCase()), d * 80));
    // draw svg win line
    setTimeout(() => drawWinLine(combo, winner), 0);
    tally[winner]++;
    syncScores();
    playWinFlash(winner);
    sndWin();
    const name = (gameMode === 1 && winner === 'O') ? 'AI' : `Player ${winner}`;
    setStatus(`${name} ${mX(winner)} wins!`);
  } else {
    tally.draw++;
    syncScores();
    sndDraw();
    setStatus("It's a draw!");
  }

  // Re-enable clicks (do nothing — cells are taken or game ended)
}

function drawWinLine(combo, winner) {
  const a = cellCentre(combo[0]);
  const b = cellCentre(combo[2]);
  const el = $('winLineEl');
  el.setAttribute('x1', a.x); el.setAttribute('y1', a.y);
  el.setAttribute('x2', b.x); el.setAttribute('y2', b.y);
  el.setAttribute('stroke', winner === 'X' ? 'rgba(255,77,166,0.7)' : 'rgba(0,230,118,0.7)');
  // Reset animation
  const svg = $('winLine');
  svg.style.display = 'block';
  el.style.animation = 'none';
  void el.getBoundingClientRect(); // reflow
  el.style.animation = '';
}

function playWinFlash(winner) {
  const f = $('winFlash');
  f.style.background = winner === 'X' ? 'rgba(255,77,166,0.14)' : 'rgba(0,230,118,0.14)';
  f.style.animation = 'none';
  void f.getBoundingClientRect();
  f.style.animation = 'flashAnim 0.55s ease forwards';
}

/* ═══════════════════════════════════════════════
   WIN CHECK
═══════════════════════════════════════════════ */
function winCombo(player) {
  for (const c of WIN_COMBOS) if (c.every(i => board[i] === player)) return c;
  return null;
}

function checkResult() {
  for (const [a,b,c] of WIN_COMBOS) {
    if (board[a] && board[a] === board[b] && board[a] === board[c]) return board[a];
  }
  return board.includes('') ? null : 'tie';
}

/* ═══════════════════════════════════════════════
   AI
═══════════════════════════════════════════════ */
function triggerAI() {
  if (!gameActive) { aiLock = false; return; }
  const move = calcAI();
  aiLock = false;
  if (move == null) return;
  sndAI();
  doMove(move, 'O');
}

function calcAI() {
  const empty = board.map((v,i) => v===''?i:-1).filter(i=>i!==-1);
  if (!empty.length) return null;

  if (diff === 'easy') {
    // Block obvious win ~25% of the time, otherwise random
    if (Math.random() < 0.25) return findThreat('X') ?? rnd(empty);
    return rnd(empty);
  }

  if (diff === 'medium') {
    const win   = findThreat('O'); if (win   != null) return win;     // always grab win
    const block = findThreat('X'); if (block != null && Math.random() < 0.75) return block; // usually block
    if (empty.includes(4)) return 4;   // prefer centre
    if (Math.random() < 0.55) return minimaxBest();                   // sometimes play smart
    return rnd(empty);
  }

  // hard — perfect play with alpha-beta
  return minimaxBest();
}

const rnd = arr => arr[Math.floor(Math.random() * arr.length)];

function findThreat(p) {
  for (const [a,b,c] of WIN_COMBOS) {
    const vals = [board[a], board[b], board[c]];
    if (vals.filter(v=>v===p).length === 2 && vals.includes('')) {
      return [a,b,c][vals.indexOf('')];
    }
  }
  return null;
}

function minimaxBest() {
  let best = -Infinity, move = null;
  for (let i = 0; i < 9; i++) {
    if (board[i] === '') {
      board[i] = 'O';
      const s = minimax(0, false, -Infinity, Infinity);
      board[i] = '';
      if (s > best) { best = s; move = i; }
    }
  }
  return move;
}

// Alpha-beta minimax — fast enough for tic-tac-toe
function minimax(depth, isMax, alpha, beta) {
  const r = checkResult();
  if (r === 'O') return 10 - depth;
  if (r === 'X') return depth - 10;
  if (r === 'tie') return 0;

  if (isMax) {
    let best = -Infinity;
    for (let i = 0; i < 9; i++) if (board[i] === '') {
      board[i] = 'O';
      best = Math.max(best, minimax(depth+1, false, alpha, beta));
      board[i] = '';
      alpha = Math.max(alpha, best);
      if (beta <= alpha) break;
    }
    return best;
  } else {
    let best = Infinity;
    for (let i = 0; i < 9; i++) if (board[i] === '') {
      board[i] = 'X';
      best = Math.min(best, minimax(depth+1, true, alpha, beta));
      board[i] = '';
      beta = Math.min(beta, best);
      if (beta <= alpha) break;
    }
    return best;
  }
}

/* ═══════════════════════════════════════════════
   INIT
═══════════════════════════════════════════════ */
setMode(1);
setDiff('medium');
syncScores();
</script>
