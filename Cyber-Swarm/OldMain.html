    <style>
:root {
            --bg:      #06070d;
            --panel:   rgba(6,7,15,0.94);
            --border:  rgba(70,110,180,0.25);
            --accent:  #4fc3f7;
            --accent2: #ce93d8;
            --gold:    #ffd54f;
            --green:   #a5d6a7;
            --red:     #ef9a9a;
            --text:    #b0bec5;
            --muted:   #455a64;
        }
        *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
        html, body {
            width: 100%; height: 100%;
            background: #03040a;
            color: var(--text);
            font-family: 'Courier New', Courier, monospace;
            overflow: hidden;
            user-select: none;
            touch-action: none;
            display: flex;
            justify-content: center;
            align-items: center;

        #game-wrap {
            position: relative;
            width: 900px;
            height: 620px;
            border: 1px solid rgba(70,110,180,0.18);
            border-radius: 4px;
            overflow: hidden;
            box-shadow: 0 0 60px rgba(0,0,0,0.8), 0 0 0 1px rgba(255,255,255,0.03);
            flex-shrink: 0;
        }

        @media (max-width: 960px), (max-height: 680px) {
            html, body { display: block; }
            #game-wrap {
                width: 100vw; height: 100vh;
                border: none; border-radius: 0;
                box-shadow: none;
            }
        }

        canvas { display: block; width: 100%; height: 100%; }

        #ui-layer {
            position: absolute; inset: 0;
            pointer-events: none;
            display: flex; flex-direction: column;
            justify-content: center; align-items: center;
        }

        .screen {
            display: none; flex-direction: column; align-items: center;
            background: var(--panel);
            border: 1px solid var(--border);

<body>

<div id="game-wrap">
<canvas id="gameCanvas"></canvas>

<div id="ui-layer">

    <div id="hud">
        <div class="hud-col">
            <span class="hud-lbl">Score</span>
            <span class="hud-val" id="scoreVal">0</span>
            <span id="comboVal"></span>
        </div>
        <div class="hud-col">
            <span class="hud-lbl">Wave</span>
            <span class="hud-val" id="waveVal">1</span>
        </div>
        <div class="hud-col">
            <span class="hud-lbl">Best</span>
            <span class="hud-val" id="hiScoreVal">0</span>
        </div>
        <div class="hud-col">
            <span class="hud-lbl">Lives</span>
            <div id="livesIcons"></div>
        </div>
    </div>

    <!-- START -->
    <div id="startScreen" class="screen active">
        <div class="tag">Greek Games Studios</div>
        <h1>Cyber Swarm</h1>
        <div class="sub">Space Defense System</div>
        <div class="hint">
            P1: WASD + Space &nbsp;·&nbsp; P2: Arrows + Enter<br>
            Bomb: B (P1) / M (P2) &nbsp;·&nbsp; P / Esc: Pause<br>
            Mobile: Drag to move & fire
        </div>
        <div class="divider"></div>
        <button class="btn primary" onclick="startGame(1)">Solo Mission</button>
        <button class="btn" id="btn-coop" onclick="startGame(2)">Co-op Mode</button>
    </div>

    <!-- GAME OVER -->
    <div id="gameOverScreen" class="screen">
        <div class="tag">Mission Failed</div>
        <h1>Game Over</h1>
        <div class="divider"></div>
        <span class="hud-lbl">Final Score</span>
        <div class="score-big" id="finalScore">0</div>
        <div class="record-msg" id="newRecord">New Record</div>
        <div class="divider"></div>
        <button class="btn primary" onclick="startGame(lastNumPlayers)">Try Again</button>
        <button class="btn"         onclick="resetToMenu()">Main Menu</button>
    </div>

    <!-- PAUSE -->
    <div id="pauseScreen" class="screen">
        <h1>Paused</h1>
        <div class="divider"></div>
        <button class="btn primary" onclick="togglePause()">Resume</button>
        <button class="btn"         onclick="resetToMenu()">Main Menu</button>
    </div>

    <div id="wave-banner"></div>
</div>

</div><!-- #game-wrap -->

<script>

const canvas = document.getElementById('gameCanvas');
const ctx = canvas.getContext('2d', { alpha: false });

let WIDTH, HEIGHT;

// UI refs
const hud = document.getElementById('hud');
const startScreen = document.getElementById('startScreen');
const gameOverScreen = document.getElementById('gameOverScreen');
const pauseScreen = document.getElementById('pauseScreen');
const scoreEl = document.getElementById('scoreVal');
const waveEl = document.getElementById('waveVal');
const comboEl = document.getElementById('comboVal');
const hiScoreEl = document.getElementById('hiScoreVal');
const livesEl = document.getElementById('livesIcons');
const waveBanner = document.getElementById('wave-banner');

// State
let gameState = 'MENU';
let animationId;
let lastTime = 0;
let keys = {};
let lastNumPlayers = 1;

// Objects
let players = [], enemies = [], bullets = [], particles = [], powerups = [], floats = [];
let stars = [];

// Globals
let score = 0;
let highScore = parseInt(localStorage.getItem('cyberSwarmHi')) || 0;
let wave = 1;
let combo = 0, comboTimer = 0;
let isBossWave = false;

// Shake
let shakeTime = 0, shakeAmt = 0;

// Mobile drag state
let dragActive = false;
let dragTargetX = 0;

// Audio
const AudioCtx = window.AudioContext || window.webkitAudioContext;
const actx = new AudioCtx();

function playSound(type) {
    if (actx.state === 'suspended') actx.resume();
    const osc = actx.createOscillator();
    const gain = actx.createGain();
    osc.connect(gain);
    gain.connect(actx.destination);
    const t = actx.currentTime;

    switch (type) {
        case 'shoot': osc.type='square'; osc.frequency.setValueAtTime(280,t); osc.frequency.exponentialRampToValueAtTime(70,t+0.08); gain.gain.setValueAtTime(0.035,t); gain.gain.exponentialRampToValueAtTime(0.001,t+0.08); break;
        case 'hit': osc.type='sawtooth'; osc.frequency.setValueAtTime(130,t); osc.frequency.exponentialRampToValueAtTime(35,t+0.14); gain.gain.setValueAtTime(0.07,t); gain.gain.exponentialRampToValueAtTime(0.001,t+0.14); break;
        case 'powerup': osc.type='sine'; osc.frequency.setValueAtTime(520,t); osc.frequency.linearRampToValueAtTime(960,t+0.22); gain.gain.setValueAtTime(0.07,t); gain.gain.linearRampToValueAtTime(0,t+0.22); break;
        case 'boss_shoot': osc.type='square'; osc.frequency.setValueAtTime(55,t); osc.frequency.exponentialRampToValueAtTime(28,t+0.22); gain.gain.setValueAtTime(0.1,t); gain.gain.linearRampToValueAtTime(0,t+0.22); break;
        case 'boss_hit': osc.type='square'; osc.frequency.setValueAtTime(90,t); gain.gain.setValueAtTime(0.12,t); gain.gain.linearRampToValueAtTime(0,t+0.18); break;
        case 'player_hit': osc.type='sawtooth'; osc.frequency.setValueAtTime(220,t); osc.frequency.exponentialRampToValueAtTime(55,t+0.28); gain.gain.setValueAtTime(0.09,t); gain.gain.exponentialRampToValueAtTime(0.001,t+0.28); break;
        case 'death': osc.type='sawtooth'; osc.frequency.setValueAtTime(320,t); osc.frequency.exponentialRampToValueAtTime(18,t+0.75); gain.gain.setValueAtTime(0.13,t); gain.gain.exponentialRampToValueAtTime(0.001,t+0.75); break;
        case 'bomb': osc.type='sawtooth'; osc.frequency.setValueAtTime(480,t); osc.frequency.exponentialRampToValueAtTime(22,t+0.6); gain.gain.setValueAtTime(0.18,t); gain.gain.exponentialRampToValueAtTime(0.001,t+0.6); break;
    }
    osc.start(t); osc.stop(t + 1);
}

// Resize & stars
const gameWrap = document.getElementById('game-wrap');
function resize() {
    WIDTH = gameWrap.clientWidth;
    HEIGHT = gameWrap.clientHeight;
    canvas.width = WIDTH;
    canvas.height = HEIGHT;
    initStars();
}
window.addEventListener('resize', resize);
resize();
hiScoreEl.textContent = highScore.toLocaleString();

function initStars() {
    stars = [];
    const n = Math.floor((WIDTH * HEIGHT) / 5500);
    for (let i = 0; i < n; i++) {
        stars.push({ x: Math.random()*WIDTH, y: Math.random()*HEIGHT, sz: Math.random()*1.4+0.3, sp: Math.random()*18+4, a: Math.random()*0.45+0.08 });
    }
}

function drawBackground(dt) {
    ctx.fillStyle = '#06070d';
    ctx.fillRect(0, 0, WIDTH, HEIGHT);
    ctx.fillStyle = '#fff';
    for (const s of stars) {
        s.y += s.sp * dt;
        if (s.y > HEIGHT) { s.y = -2; s.x = Math.random()*WIDTH; }
        ctx.globalAlpha = s.a;
        ctx.fillRect(s.x, s.y, s.sz, s.sz);
    }
    ctx.globalAlpha = 1;
}

function shake(amount, duration) {
    shakeAmt = Math.max(shakeAmt, amount);
    shakeTime = Math.max(shakeTime, duration);
}

let bannerTO = null;
function showBanner(text) {
    waveBanner.textContent = text;
    waveBanner.style.opacity = '1';
    clearTimeout(bannerTO);
    bannerTO = setTimeout(() => waveBanner.style.opacity = '0', 1600);
}

function renderLives() {
    livesEl.innerHTML = '';
    const hp = players[0] ? players[0].hp : 0;
    for (let i = 0; i < 3; i++) {
        const d = document.createElement('div');
        d.style.cssText = `width:9px;height:9px;border-radius:50%;background:${i < hp ? '#4fc3f7' : '#151e2a'};box-shadow:${i < hp ? '0 0 4px #4fc3f7' : 'none'}`;
        livesEl.appendChild(d);
    }
}

function updateHUD() {
    scoreEl.textContent = score.toLocaleString();
    waveEl.textContent = wave;
    hiScoreEl.textContent = highScore.toLocaleString();
    comboEl.textContent = combo > 1 ? `×${combo} COMBO` : '';
}

// ============================================================
// CLASSES
// ============================================================

class Player {
    constructor(id, color) {
        this.id    = id;
        this.color = color;
        this.w = 28; this.h = 26;
        this.x = id === 1 ? WIDTH / 3 : (WIDTH / 3) * 2;
        this.y = HEIGHT - 72;
        this.speed    = 340;
        this.cooldown = 0;
        this.fireRate = 0.14;
        this.shield    = 0;
        this.tripleShot = 0;
        this.bombs     = 0;
        this.hp        = 3;
        this.invincible  = 0;
        this.flashTimer  = 0;
        this.thrustTimer = 0;
    }

    update(dt) {
        // Mobile drag (παίκτης 1 μόνο όταν είναι solo)
        if (this.id === 1 && dragActive && players.length === 1) {
            // Άμεση τοποθέτηση στη θέση του δακτύλου
            const hw = this.w / 2;
            this.x = Math.max(hw, Math.min(WIDTH - hw, dragTargetX));
        } else {
            // Κανονική κίνηση με πληκτρολόγιο
            const solo = players.length === 1;
            if (this.id === 1) {
                const left  = keys['KeyA'] || (solo && keys['ArrowLeft']);
                const right = keys['KeyD'] || (solo && keys['ArrowRight']);
                if (left)  this.x -= this.speed * dt;
                if (right) this.x += this.speed * dt;
                if ((keys['Space'] || keys['KeyW']) && this.cooldown <= 0) this.shoot();
            } else {
                if (keys['ArrowLeft'])  this.x -= this.speed * dt;
                if (keys['ArrowRight']) this.x += this.speed * dt;
                if ((keys['Enter'] || keys['ArrowUp']) && this.cooldown <= 0) this.shoot();
            }
            const hw = this.w / 2;
            if (this.x < hw)         this.x = hw;
            if (this.x > WIDTH - hw) this.x = WIDTH - hw;
        }

        if (this.cooldown    > 0) this.cooldown    -= dt;
        if (this.shield      > 0) this.shield      -= dt;
        if (this.tripleShot  > 0) this.tripleShot  -= dt;
        if (this.invincible  > 0) this.invincible  -= dt;
        if (this.flashTimer  > 0) this.flashTimer  -= dt;
        if (this.thrustTimer > 0) this.thrustTimer -= dt;

        // Αυτόματη βολή κατά το drag
        if (this.id === 1 && dragActive && players.length === 1 && this.cooldown <= 0) {
            this.shoot();
        }
    }

    shoot() {
        playSound('shoot');
        this.cooldown    = this.fireRate;
        this.thrustTimer = 0.07;
        if (this.tripleShot > 0) {
            bullets.push(new Bullet(this.x - 10, this.y - 10, -540, this.color, true, -45));
            bullets.push(new Bullet(this.x,      this.y - 15, -540, this.color, true,   0));
            bullets.push(new Bullet(this.x + 10, this.y - 10, -540, this.color, true,  45));
        } else {
            bullets.push(new Bullet(this.x, this.y - 15, -540, this.color, true, 0));
        }
    }

    takeDamage() {
        if (this.invincible > 0 || this.shield > 0) return false;
        this.hp--;
        this.invincible  = 2.2;
        this.flashTimer  = 2.2;
        playSound('player_hit');
        shake(8, 0.28);
        spawnParticles(this.x, this.y, this.color, 22);
        renderLives();
        if (this.hp <= 0) { playSound('death'); return true; }
        return false;
    }

    useBomb() {
        if (this.bombs <= 0) return;
        this.bombs--;
        playSound('bomb');
        shake(18, 0.55);
        for (const e of enemies) {
            spawnParticles(e.x, e.y, e.color, e instanceof Boss ? 60 : 16);
            score += e instanceof Boss ? 500 : 50;
        }
        enemies = [];
        if (score > highScore) highScore = score;
        updateHUD();
    }

    draw() {
        if (this.invincible > 0 && Math.floor(this.flashTimer * 9) % 2 === 0) return;

        ctx.save();
        ctx.translate(this.x, this.y);

        if (this.shield > 0) {
            ctx.strokeStyle = `rgba(79,195,247,${0.35 + Math.sin(Date.now()*0.006)*0.15})`;
            ctx.lineWidth = 1.5;
            ctx.beginPath();
            ctx.arc(0, 0, 23, 0, Math.PI * 2);
            ctx.stroke();
        }

        const c = this.color;
        ctx.shadowBlur  = 7;
        ctx.shadowColor = c;
        ctx.fillStyle   = c;

        ctx.beginPath();
        ctx.moveTo( 0, -14);
        ctx.lineTo( 7,   3);
        ctx.lineTo( 4,   9);
        ctx.lineTo( 0,   6);
        ctx.lineTo(-4,   9);
        ctx.lineTo(-7,   3);
        ctx.closePath();
        ctx.fill();

        ctx.beginPath();
        ctx.moveTo(-7, 3);
        ctx.lineTo(-17, 13);
        ctx.lineTo(-11,  9);
        ctx.lineTo( -4,  9);
        ctx.closePath();
        ctx.fill();

        ctx.beginPath();
        ctx.moveTo( 7, 3);
        ctx.lineTo(17, 13);
        ctx.lineTo(11,  9);
        ctx.lineTo( 4,  9);
        ctx.closePath();
        ctx.fill();

        const thrustAlpha = this.thrustTimer > 0 ? 0.9 : 0.45 + Math.random() * 0.2;
        ctx.fillStyle   = `rgba(255,180,60,${thrustAlpha})`;
        ctx.shadowColor = '#ff8020';
        ctx.fillRect(-3, 9, 6, 5 + (this.thrustTimer > 0 ? 3 : 0));

        ctx.restore();
    }
}

// ─────────────────────────────────────────────────────────────
class Enemy {
    constructor(x, y, hp, type) {
        this.x = x; this.y = y;
        this.w = 26; this.h = 22;
        this.hp = hp; this.maxHp = hp;
        this.type = type;
        this.color = type === 0 ? '#00f0ff' : type === 1 ? '#ff00cc' : '#aaff00';
        this.speedX = (Math.random() > 0.5 ? 1 : -1) * (42 + Math.random() * 38 + wave * 8);
        this.speedY = 18 + wave * 4;
        this.sinOff = Math.random() * Math.PI * 2;
        this.shootCD = 1.5 + Math.random() * 3.5;
        this.pulse = Math.random() * Math.PI * 2;
    }

    update(dt) {
        this.x += this.speedX * dt;
        this.y += this.speedY * dt;
        if (this.type === 1) this.x += Math.sin(Date.now() * 0.005 + this.sinOff) * 2.2;
        this.pulse += dt * 8;

        if (this.x < this.w/2) { this.x = this.w/2; this.speedX *= -1; }
        if (this.x > WIDTH - this.w/2) { this.x = WIDTH - this.w/2; this.speedX *= -1; }

        this.shootCD -= dt;
        if (this.shootCD <= 0) {
            this.shootCD = 2.0 + Math.random() * 3.0;
            if (Math.random() < 0.28 + wave * 0.022) {
                bullets.push(new Bullet(this.x, this.y + this.h/2, 210 + wave*14, this.color, false, 0));
            }
        }
    }

    draw() {
        ctx.save();
        ctx.translate(this.x, this.y);
        ctx.shadowBlur = 12;
        ctx.shadowColor = this.color;

        const t = Date.now() * 0.008;

        if (this.type === 0) {
            ctx.fillStyle = '#0a0e1f';
            ctx.beginPath();
            for (let i = 0; i < 8; i++) {
                const a = i * 0.785 + t * 0.3;
                ctx.lineTo(Math.cos(a)*11, Math.sin(a)*11);
            }
            ctx.closePath(); ctx.fill();
            ctx.strokeStyle = this.color;
            ctx.lineWidth = 2.5;
            ctx.stroke();
            ctx.shadowBlur = 6;
            ctx.lineWidth = 1;
            for (let i = 0; i < 3; i++) {
                ctx.beginPath();
                ctx.moveTo(-7, -7 + i*6);
                ctx.lineTo(7, -7 + i*6);
                ctx.stroke();
            }
        } else if (this.type === 1) {
            ctx.fillStyle = this.color;
            ctx.beginPath();
            ctx.moveTo(0, -13);
            ctx.lineTo(11, 10);
            ctx.lineTo(-11, 10);
            ctx.closePath();
            ctx.fill();
            ctx.shadowBlur = 18;
            ctx.strokeStyle = this.color;
            ctx.lineWidth = 2;
            ctx.beginPath();
            ctx.moveTo(-11, 8); ctx.lineTo(-18, 14);
            ctx.moveTo(11, 8); ctx.lineTo(18, 14);
            ctx.stroke();
        } else {
            ctx.fillStyle = '#0a0e1f';
            ctx.fillRect(-12, -10, 24, 18);
            ctx.fillStyle = this.color;
            ctx.fillRect(-12, -10, 24, 4);
            ctx.shadowBlur = 8;
            ctx.fillRect(-9, -6, 18, 12);
            ctx.shadowBlur = 0;
            ctx.fillStyle = '#000';
            for (let i = -1; i <= 1; i++) ctx.fillRect(i*5, -8, 2, 14);
        }

        ctx.restore();
    }
}

// ─────────────────────────────────────────────────────────────
class Boss {
    constructor() {
        this.w = 160; this.h = 68;
        this.x = WIDTH / 2; this.y = -100;
        this.hp = 90 + wave * 42;
        this.maxHp = this.hp;
        this.color = '#ff0088';
        this.state = 'enter';
        this.timer = 0;
        this.phase = 1;
        this.pulse = 0;
    }

    update(dt) {
        if (this.state === 'enter') {
            this.y += 92 * dt;
            if (this.y >= 110) { this.y = 110; this.state = 'attack'; }
            return;
        }
        this.x += Math.sin(Date.now() * 0.0018) * 135 * dt;
        this.x = Math.max(this.w/2, Math.min(WIDTH - this.w/2, this.x));
        this.timer += dt;
        this.pulse += dt * 10;

        if (this.phase === 1 && this.hp < this.maxHp * 0.5) {
            this.phase = 2;
            shake(15, 0.6);
        }

        const fireRate = this.phase === 2 ? 0.85 : 1.65;
        if (this.timer >= fireRate) {
            this.timer = 0;
            playSound('boss_shoot');
            const spread = this.phase === 2 ? 4 : 2;
            for (let i = -spread; i <= spread; i++) {
                bullets.push(new Bullet(this.x + i*26, this.y + this.h/2 + 8, 240 + wave*12, '#ff0088', false, i*32));
            }
        }
    }

    draw() {
        ctx.save();
        ctx.translate(this.x, this.y);
        const p = Math.sin(this.pulse) * 0.5 + 0.5;

        ctx.shadowBlur = this.phase === 2 ? 28 : 14;
        ctx.shadowColor = this.color;

        ctx.fillStyle = '#0a0e1f';
        ctx.fillRect(-this.w/2, -this.h/2, this.w, this.h);
        ctx.strokeStyle = this.color;
        ctx.lineWidth = 6;
        ctx.strokeRect(-this.w/2 + 4, -this.h/2 + 4, this.w - 8, this.h - 8);

        ctx.shadowBlur = 20;
        ctx.lineWidth = 3;
        for (let i = 1; i <= 3; i++) {
            ctx.globalAlpha = 0.6 - i*0.15;
            ctx.beginPath();
            ctx.ellipse(0, 8, this.w/2 - i*18, 12, 0, 0, Math.PI*2);
            ctx.stroke();
        }
        ctx.globalAlpha = 1;

        ctx.shadowBlur = 30;
        ctx.fillStyle = this.color;
        ctx.beginPath();
        ctx.arc(0, 8, 18 + p*6, 0, Math.PI*2);
        ctx.fill();

        ctx.shadowBlur = 0;
        ctx.fillStyle = '#000';
        ctx.beginPath();
        ctx.arc(0, 8, 9, 0, Math.PI*2);
        ctx.fill();

        ctx.fillStyle = this.phase === 2 ? '#fff' : '#ff0088';
        ctx.shadowBlur = this.phase === 2 ? 15 : 8;
        ctx.fillRect(-48, -18, 14, 9);
        ctx.fillRect(34, -18, 14, 9);

        const bw = this.w + 50;
        ctx.shadowBlur = 0;
        ctx.fillStyle = '#151e2a';
        ctx.fillRect(-bw/2, -this.h/2 - 22, bw, 8);
        ctx.fillStyle = this.hp > this.maxHp*0.5 ? this.color : '#ff1744';
        ctx.fillRect(-bw/2, -this.h/2 - 22, bw * (this.hp / this.maxHp), 8);

        ctx.restore();
    }
}

// ─────────────────────────────────────────────────────────────
class Bullet {
    constructor(x, y, speedY, color, isPlayer, speedX = 0) {
        this.x = x; this.y = y;
        this.speedY   = speedY;
        this.speedX   = speedX;
        this.color    = color;
        this.isPlayer = isPlayer;
        this.w = isPlayer ? 3 : 6;
        this.h = isPlayer ? 13 : 7;
    }

    update(dt) {
        this.y += this.speedY * dt;
        this.x += this.speedX * dt;
    }

    draw() {
        ctx.fillStyle   = this.color;
        ctx.shadowBlur  = 4;
        ctx.shadowColor = this.color;

        if (this.isPlayer) {
            ctx.fillRect(this.x - 1, this.y - this.h / 2, 2, this.h);
        } else {
            ctx.save();
            ctx.translate(this.x, this.y);
            ctx.beginPath();
            ctx.moveTo( 0, -this.h / 2);
            ctx.lineTo( this.w / 2, 0);
            ctx.lineTo( 0,  this.h / 2);
            ctx.lineTo(-this.w / 2, 0);
            ctx.closePath();
            ctx.fill();
            ctx.restore();
        }
    }
}

// ─────────────────────────────────────────────────────────────
class Particle {
    constructor(x, y, color) {
        this.x = x; this.y = y;
        this.vx   = (Math.random() - 0.5) * 230;
        this.vy   = (Math.random() - 0.5) * 230;
        this.life = 1.0;
        this.color = color;
        this.size  = Math.random() * 3 + 1;
    }

    update(dt) {
        this.x  += this.vx * dt;
        this.y  += this.vy * dt;
        this.vy += 35 * dt;
        this.life -= dt * 2.0;
    }

    draw() {
        ctx.globalAlpha = Math.max(this.life, 0);
        ctx.fillStyle   = this.color;
        ctx.fillRect(this.x, this.y, this.size, this.size);
        ctx.globalAlpha = 1;
    }
}

// ─────────────────────────────────────────────────────────────
class PowerUp {
    constructor(x, y, type) {
        this.x = x; this.y = y;
        this.type  = type;
        this.color = type === 0 ? '#a5d6a7' : type === 1 ? '#4fc3f7' : '#ffd54f';
        this.label = type === 0 ? 'TRP' : type === 1 ? 'SHD' : 'BMB';
        this.w = 22; this.h = 18;
        this.t = 0;
    }

    update(dt) { this.y += 75 * dt; this.t += dt; }

    draw() {
        ctx.save();
        ctx.translate(this.x, this.y);
        ctx.globalAlpha   = 0.85 + Math.sin(this.t * 4) * 0.15;
        ctx.fillStyle     = this.color;
        ctx.shadowBlur    = 6;
        ctx.shadowColor   = this.color;
        ctx.fillRect(-this.w / 2, -this.h / 2, this.w, this.h);
        ctx.fillStyle  = '#06070d';
        ctx.shadowBlur = 0;
        ctx.font = '7px monospace';
        ctx.textAlign    = 'center';
        ctx.textBaseline = 'middle';
        ctx.fillText(this.label, 0, 0);
        ctx.globalAlpha = 1;
        ctx.restore();
    }
}

// ─────────────────────────────────────────────────────────────
class FloatText {
    constructor(x, y, text, color) {
        this.x = x; this.y = y;
        this.text  = text;
        this.color = color;
        this.life  = 1.0;
        this.vy    = -55;
    }

    update(dt) {
        this.y    += this.vy * dt;
        this.life -= dt * 1.4;
    }

    draw() {
        ctx.globalAlpha  = Math.max(this.life, 0);
        ctx.fillStyle    = this.color;
        ctx.font         = 'bold 12px monospace';
        ctx.textAlign    = 'center';
        ctx.textBaseline = 'middle';
        ctx.fillText(this.text, this.x, this.y);
        ctx.globalAlpha = 1;
    }
}

// ============================================================
// HELPERS
// ============================================================

function AABB(a, b) {
    return a.x - a.w / 2 < b.x + b.w / 2 &&
           a.x + a.w / 2 > b.x - b.w / 2 &&
           a.y - a.h / 2 < b.y + b.h / 2 &&
           a.y + a.h / 2 > b.y - b.h / 2;
}

function spawnParticles(x, y, color, n = 12) {
    for (let i = 0; i < n; i++) particles.push(new Particle(x, y, color));
}

// ============================================================
// WAVE SPAWNING
// ============================================================

function spawnWave() {
    enemies    = [];
    isBossWave = (wave % 5 === 0);

    if (isBossWave) {
        enemies.push(new Boss());
        showBanner(`⚠ BOSS WAVE ${wave} ⚠`);
    } else {
        const rows    = Math.min(2 + Math.floor(wave / 2), 5);
        const cols    = Math.min(5 + Math.floor(wave / 2), 9);
        const spacing = 46;
        const startX  = WIDTH / 2 - ((cols - 1) * spacing) / 2;

        for (let r = 0; r < rows; r++) {
            for (let c = 0; c < cols; c++) {
                let type = 0;
                if (r === 0)          type = 2;
                if (r === rows - 1)   type = 1;
                const hp = type === 2 ? 2 + wave : 1;
                enemies.push(new Enemy(
                    startX + c * spacing,
                    -130 - r * spacing,
                    hp, type
                ));
            }
        }
        showBanner(`WAVE ${wave}`);
    }
    updateHUD();
}

// ============================================================
// MAIN LOOP
// ============================================================

function update(dt) {
    if (gameState !== 'PLAYING') return;

    if (comboTimer > 0) {
        comboTimer -= dt;
        if (comboTimer <= 0) { combo = 0; updateHUD(); }
    }

    if (shakeTime > 0) shakeTime -= dt;

    players.forEach(p => p.update(dt));

    for (let i = bullets.length - 1; i >= 0; i--) {
        const b = bullets[i];
        b.update(dt);

        if (b.y < -70 || b.y > HEIGHT + 70 || b.x < -70 || b.x > WIDTH + 70) {
            bullets.splice(i, 1); continue;
        }

        if (b.isPlayer) {
            let hit = false;
            for (let j = enemies.length - 1; j >= 0; j--) {
                const e = enemies[j];
                if (!AABB(b, e)) continue;
                hit = true;
                e.hp--;
                spawnParticles(b.x, b.y, b.color, 4);

                if (e.hp <= 0) {
                    const isBoss = e instanceof Boss;
                    playSound(isBoss ? 'boss_hit' : 'hit');
                    spawnParticles(e.x, e.y, e.color, isBoss ? 65 : 16);
                    shake(isBoss ? 14 : 3, isBoss ? 0.4 : 0.1);

                    combo++;
                    comboTimer = 2.5;
                    const pts = (isBoss ? 1000 : 100) * combo;
                    score += pts;
                    if (score > highScore) {
                        highScore = score;
                        localStorage.setItem('pixelInvadersHi', highScore);
                    }
                    floats.push(new FloatText(e.x, e.y - 10, `+${pts}`, '#ffd54f'));
                    updateHUD();

                    if (!isBoss) {
                        const r = Math.random();
                        if      (r < 0.04) powerups.push(new PowerUp(e.x, e.y, 2));
                        else if (r < 0.10) powerups.push(new PowerUp(e.x, e.y, 0));
                        else if (r < 0.17) powerups.push(new PowerUp(e.x, e.y, 1));
                    }
                    enemies.splice(j, 1);
                }
                break;
            }
            if (hit) { bullets.splice(i, 1); continue; }

        } else {
            let removed = false;
            for (const p of players) {
                if (!AABB(b, p)) continue;
                removed = true;
                if (p.takeDamage()) { gameOver(); return; }
                break;
            }
            if (removed) { bullets.splice(i, 1); continue; }
        }
    }

    for (let i = enemies.length - 1; i >= 0; i--) {
        const e = enemies[i];
        e.update(dt);

        if (!(e instanceof Boss) && e.y > HEIGHT + 25) {
            gameOver(); return;
        }

        for (const p of players) {
            if (AABB(e, p)) {
                spawnParticles(e.x, e.y, e.color, 16);
                enemies.splice(i, 1);
                if (p.takeDamage()) { gameOver(); return; }
                break;
            }
        }
    }

    if (enemies.length === 0) {
        wave++;
        spawnWave();
    }

    for (let i = powerups.length - 1; i >= 0; i--) {
        const pu = powerups[i];
        pu.update(dt);
        if (pu.y > HEIGHT + 25) { powerups.splice(i, 1); continue; }

        let collected = false;
        for (const p of players) {
            if (!AABB(pu, p)) continue;
            playSound('powerup');
            if      (pu.type === 0) { p.tripleShot = 6.0; floats.push(new FloatText(p.x, p.y - 20, 'TRIPLE SHOT', pu.color)); }
            else if (pu.type === 1) { p.shield     = 6.0; floats.push(new FloatText(p.x, p.y - 20, 'SHIELD UP',   pu.color)); }
            else if (pu.type === 2) { p.bombs++;           floats.push(new FloatText(p.x, p.y - 20, 'BOMB +1',     pu.color)); }
            collected = true;
            break;
        }
        if (collected) powerups.splice(i, 1);
    }

    for (let i = particles.length - 1; i >= 0; i--) {
        particles[i].update(dt);
        if (particles[i].life <= 0) particles.splice(i, 1);
    }
    for (let i = floats.length - 1; i >= 0; i--) {
        floats[i].update(dt);
        if (floats[i].life <= 0) floats.splice(i, 1);
    }
}

function draw(dt) {
    drawBackground(dt);

    if (shakeTime > 0) {
        ctx.save();
        ctx.translate(
            (Math.random() - 0.5) * shakeAmt,
            (Math.random() - 0.5) * shakeAmt
        );
    }

    if (gameState === 'PLAYING' || gameState === 'PAUSED') {
        particles.forEach(p  => p.draw());
        powerups.forEach(pu  => pu.draw());
        bullets.forEach(b    => b.draw());
        enemies.forEach(e    => e.draw());
        players.forEach(p    => p.draw());
        floats.forEach(ft    => ft.draw());
    }

    if (shakeTime > 0) ctx.restore();
}

function loop(timestamp) {
    let dt = (timestamp - lastTime) / 1000;
    if (dt > 0.1) dt = 0.1;
    lastTime = timestamp;

    update(dt);
    draw(dt);

    animationId = requestAnimationFrame(loop);
}

// ============================================================
// GAME STATE
// ============================================================

function startGame(numPlayers) {
    if (actx.state === 'suspended') actx.resume();
    lastNumPlayers = numPlayers;

    [startScreen, gameOverScreen, pauseScreen].forEach(s => s.classList.remove('active'));
    hud.classList.add('active');

    players = [];
    players.push(new Player(1, '#4fc3f7'));
    if (numPlayers === 2) players.push(new Player(2, '#ce93d8'));

    score = 0; wave = 1; combo = 0; comboTimer = 0;
    enemies = []; bullets = []; particles = []; powerups = []; floats = [];

    dragActive = false; // reset drag

    updateHUD();
    renderLives();
    spawnWave();

    gameState = 'PLAYING';
    lastTime  = performance.now();
    cancelAnimationFrame(animationId);
    loop(lastTime);
}

function sendScoreToApp(score, isNewRecord) {
  if (window.ReactNativeWebView) {
    window.ReactNativeWebView.postMessage(JSON.stringify({
      type: 'SEND_SCORE',
      score: score,
      game: 'Cyber Swarm',
      isNewRecord: isNewRecord,
    }));
  }
}

function gameOver() {
    if (gameState === 'GAMEOVER') return;
    gameState = 'GAMEOVER';
    sendScoreToApp(score, score > 0 && score >= highScore);

    const newRecord = score > 0 && score >= highScore;
    document.getElementById('finalScore').textContent = score.toLocaleString();
    document.getElementById('newRecord').style.display = newRecord ? 'block' : 'none';

    gameOverScreen.classList.add('active');
    hud.classList.remove('active');
    shake(22, 0.65);
    dragActive = false;
}

function resetToMenu() {
    gameState = 'MENU';
    [gameOverScreen, pauseScreen].forEach(s => s.classList.remove('active'));
    startScreen.classList.add('active');
    hud.classList.remove('active');
    enemies = []; bullets = []; particles = []; powerups = []; floats = [];
    dragActive = false;
}

function togglePause() {
    if (gameState === 'PLAYING') {
        gameState = 'PAUSED';
        pauseScreen.classList.add('active');
        dragActive = false;
    } else if (gameState === 'PAUSED') {
        gameState = 'PLAYING';
        pauseScreen.classList.remove('active');
        lastTime = performance.now();
    }
}

// ============================================================
// INPUT
// ============================================================

window.addEventListener('keydown', e => {
    keys[e.code] = true;
    if (e.code === 'Escape' || e.code === 'KeyP') togglePause();
    if (e.code === 'KeyB' && gameState === 'PLAYING') players[0]?.useBomb();
    if (e.code === 'KeyM' && gameState === 'PLAYING') players[1]?.useBomb();
});
window.addEventListener('keyup', e => { keys[e.code] = false; });

// ── Mobile Drag (ένα δάχτυλο) ──
canvas.addEventListener('touchstart', (e) => {
    e.preventDefault();
    if (gameState !== 'PLAYING' || players.length !== 1) return;
    const touch = e.touches[0];
    if (!touch) return;
    dragActive = true;
    dragTargetX = touch.clientX - canvas.getBoundingClientRect().left;
    // Ενεργοποίηση βολής μέσω keys για συμβατότητα (η βολή γίνεται και απευθείας στο update)
    keys['Space'] = true;
}, { passive: false });

canvas.addEventListener('touchmove', (e) => {
    e.preventDefault();
    if (!dragActive) return;
    const touch = e.touches[0];
    if (!touch) return;
    dragTargetX = touch.clientX - canvas.getBoundingClientRect().left;
}, { passive: false });

canvas.addEventListener('touchend', (e) => {
    e.preventDefault();
    dragActive = false;
    keys['Space'] = false;
}, { passive: false });

canvas.addEventListener('touchcancel', (e) => {
    e.preventDefault();
    dragActive = false;
    keys['Space'] = false;
}, { passive: false });

// ── Εκκίνηση ──
animationId = requestAnimationFrame(loop);
</script>
</body>
