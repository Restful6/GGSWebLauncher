<h1>ULTIMATE PONG</h1>

<div class="game-wrapper" id="gameWrapper">

    <div class="score-container">
        <div id="player-score">0</div>
        <div id="ai-score">0</div>
    </div>

    <canvas id="pongCanvas"></canvas>

    <!-- ── MENUS ── -->
    <div id="main-menu" class="menu-overlay">
        <h2>MAIN MENU</h2>
        <button id="onePlayerButton"  class="menu-button">1 PLAYER</button>
        <button id="twoPlayerButton"  class="menu-button">2 PLAYERS</button>
        <button id="settingsButton"   class="menu-button">SETTINGS</button>
        <div class="controls-info">
            1P: W/S · ARROWS · or TOUCH<br>
            2P: P1 (W/S) | P2 (ARROWS)<br>
            P / ESC: PAUSE
        </div>
        <div class="footer">Powered by Greek Games Studios</div>
    </div>

    <div id="settings-menu" class="menu-overlay">
        <h2>SETTINGS</h2>
        <div class="setting-group" id="difficulty-group">
            <label>DIFFICULTY (AI)</label>
            <button data-value="easy"   class="setting-btn"        data-group="difficulty">EASY</button>
            <button data-value="normal" class="setting-btn active"  data-group="difficulty">NORMAL</button>
            <button data-value="hard"   class="setting-btn"        data-group="difficulty">HARD</button>
        </div>
        <div class="setting-group">
            <label>WINNING SCORE</label>
            <button data-value="3"  class="setting-btn"       data-group="score">3</button>
            <button data-value="5"  class="setting-btn active" data-group="score">5</button>
            <button data-value="10" class="setting-btn"       data-group="score">10</button>
        </div>
        <div class="setting-group">
            <label>SOUND</label>
            <button data-value="on"  class="setting-btn active" data-group="sound">ON</button>
            <button data-value="off" class="setting-btn"        data-group="sound">OFF</button>
        </div>
        <button id="settingsBackButton" class="menu-button" style="margin-top:22px">BACK</button>
    </div>

    <div id="pause-menu" class="menu-overlay">
        <h2>PAUSED</h2>
        <button id="resumeButton" class="menu-button">RESUME</button>
        <button id="quitButton"   class="menu-button">MAIN MENU</button>
    </div>

    <div id="game-over-menu" class="menu-overlay">
        <h2 id="winner-message">GAME OVER</h2>
        <button id="playAgainButton"     class="menu-button">PLAY AGAIN</button>
        <button id="gameOverMenuButton"  class="menu-button">MAIN MENU</button>
    </div>

</div><!-- .game-wrapper -->

<script>
'use strict';

// ─────────────────────────────────────────────────
// DOM
// ─────────────────────────────────────────────────
const canvas       = document.getElementById('pongCanvas');
const ctx          = canvas.getContext('2d', { alpha: false });
const gameWrapper  = document.getElementById('gameWrapper');
const p1ScoreEl    = document.getElementById('player-score');
const p2ScoreEl    = document.getElementById('ai-score');
const mainMenu     = document.getElementById('main-menu');
const settingsMenu = document.getElementById('settings-menu');
const pauseMenu    = document.getElementById('pause-menu');
const gameOverMenu = document.getElementById('game-over-menu');
const winnerMsg    = document.getElementById('winner-message');

// ─────────────────────────────────────────────────
// Settings
// ─────────────────────────────────────────────────
const settings = {
    gameMode:     '1P',
    difficulty:   'normal',
    winningScore: 5,
    soundEnabled: true
};

// Per-difficulty AI lerp speed + random error magnitude
const AI_CFG = {
    easy:   { speed: 0.048, error: 95 },
    normal: { speed: 0.092, error: 34 },
    hard:   { speed: 0.138, error:  5 }
};

// ─────────────────────────────────────────────────
// Canvas constants  (fixed logical resolution)
// ─────────────────────────────────────────────────
const CW = 1200, CH = 700;

const C1 = '#0ff';   // P1 cyan
const C2 = '#f05';   // P2 hot-pink

// ─────────────────────────────────────────────────
// Game-state
// ─────────────────────────────────────────────────
let gameState   = 'main-menu';
let keysPressed = {};
let lastTime    = 0;
let accumulator = 0;
const STEP      = 1000 / 60;   // fixed 60 fps physics tick

// Rally counter (hits without scoring)
let rally = 0;

// Screen-shake
let shakeMag = 0;

// ── Countdown (3-2-1-GO)  ─────────────────────
// Layout: [178..29] = numbers 3→1, [28..1] = "GO!"
const CD_NUM_TICKS = 50;   // ticks per number
const CD_GO_TICKS  = 28;   // ticks for "GO!"
const CD_TOTAL     = 3 * CD_NUM_TICKS + CD_GO_TICKS;   // 178
let   cdTimer      = 0;
let   cdPrevNum    = -1;   // to detect transitions and play beeps

// ── Floating score texts ──────────────────────
const floatTexts = [];     // { x, y, text, color, life, maxLife }

// ─────────────────────────────────────────────────
// Audio
// ─────────────────────────────────────────────────
let audioCtx = null;
function getACtx() {
    if (!audioCtx) audioCtx = new (window.AudioContext || window.webkitAudioContext)();
    return audioCtx;
}

function playSound(type) {
    if (!settings.soundEnabled) return;
    try {
        const ac   = getACtx();
        const osc  = ac.createOscillator();
        const gain = ac.createGain();
        osc.connect(gain);
        gain.connect(ac.destination);
        const t = ac.currentTime;

        switch (type) {
            case 'paddle':
                osc.type = 'square';
                osc.frequency.setValueAtTime(220, t);
                gain.gain.setValueAtTime(0.055, t);
                gain.gain.exponentialRampToValueAtTime(0.001, t + 0.09);
                osc.start(t); osc.stop(t + 0.09);
                break;
            case 'power':           // edge-hit "smash"
                osc.type = 'sawtooth';
                osc.frequency.setValueAtTime(260, t);
                osc.frequency.linearRampToValueAtTime(520, t + 0.11);
                gain.gain.setValueAtTime(0.075, t);
                gain.gain.exponentialRampToValueAtTime(0.001, t + 0.14);
                osc.start(t); osc.stop(t + 0.14);
                break;
            case 'wall':
                osc.type = 'sine';
                osc.frequency.setValueAtTime(290, t);
                gain.gain.setValueAtTime(0.045, t);
                gain.gain.exponentialRampToValueAtTime(0.001, t + 0.07);
                osc.start(t); osc.stop(t + 0.07);
                break;
            case 'score':
                osc.type = 'triangle';
                osc.frequency.setValueAtTime(600, t);
                osc.frequency.linearRampToValueAtTime(280, t + 0.22);
                gain.gain.setValueAtTime(0.09, t);
                gain.gain.linearRampToValueAtTime(0, t + 0.22);
                osc.start(t); osc.stop(t + 0.22);
                break;
            case 'countdown':       // 3-2-1 beep
                osc.type = 'square';
                osc.frequency.setValueAtTime(440, t);
                gain.gain.setValueAtTime(0.045, t);
                gain.gain.exponentialRampToValueAtTime(0.001, t + 0.08);
                osc.start(t); osc.stop(t + 0.08);
                break;
            case 'go':              // GO! higher beep
                osc.type = 'square';
                osc.frequency.setValueAtTime(880, t);
                gain.gain.setValueAtTime(0.06, t);
                gain.gain.exponentialRampToValueAtTime(0.001, t + 0.13);
                osc.start(t); osc.stop(t + 0.13);
                break;
        }
    } catch(e) { /* audio is non-critical */ }
}

// ─────────────────────────────────────────────────
// Particle object pool  (avoids GC pressure)
// ─────────────────────────────────────────────────
const POOL = 320;
const pool = Array.from({ length: POOL }, () => ({
    x:0, y:0, color:C1, r:1, dx:0, dy:0, life:0, maxLife:40, active:false
}));

function spawnP(x, y, color, spd) {
    for (let i = 0; i < pool.length; i++) {
        const p = pool[i];
        if (p.active) continue;
        const ang = Math.random() * Math.PI * 2;
        const v   = (Math.random() * 0.7 + 0.3) * spd;
        p.x = x;  p.y = y;  p.color = color;
        p.r = Math.random() * 3 + 0.8;
        p.dx = Math.cos(ang) * v;
        p.dy = Math.sin(ang) * v;
        p.maxLife = 28 + Math.random() * 22 | 0;
        p.life    = p.maxLife;
        p.active  = true;
        return;
    }
}

function burst(x, y, color, n, spd) {
    for (let i = 0; i < n; i++) spawnP(x, y, color, spd);
}

function updateParticles() {
    for (let i = 0; i < pool.length; i++) {
        const p = pool[i];
        if (!p.active) continue;
        p.x  += p.dx;
        p.y  += p.dy;
        p.dx *= 0.94;   // friction – particles decelerate
        p.dy *= 0.94;
        if (--p.life <= 0) p.active = false;
    }
}

function drawParticles() {
    ctx.save();
    ctx.shadowBlur = 5;
    for (let i = 0; i < pool.length; i++) {
        const p = pool[i];
        if (!p.active) continue;
        ctx.globalAlpha = p.life / p.maxLife;
        ctx.shadowColor = p.color;
        ctx.fillStyle   = p.color;
        ctx.beginPath();
        ctx.arc(p.x, p.y, p.r, 0, Math.PI * 2);
        ctx.fill();
    }
    ctx.globalAlpha = 1;
    ctx.shadowBlur  = 0;
    ctx.restore();
}

// ─────────────────────────────────────────────────
// Ball trail
// ─────────────────────────────────────────────────
const TRAIL_LEN = 10;
const trail     = [];

// ─────────────────────────────────────────────────
// Floating score texts
// ─────────────────────────────────────────────────
function spawnFloat(x, y, text, color) {
    floatTexts.push({ x, y, text, color, life: 58, maxLife: 58 });
}

function updateFloats() {
    for (let i = floatTexts.length - 1; i >= 0; i--) {
        floatTexts[i].y -= 1.4;
        if (--floatTexts[i].life <= 0) floatTexts.splice(i, 1);
    }
}

function drawFloats() {
    if (!floatTexts.length) return;
    ctx.save();
    ctx.textAlign    = 'center';
    ctx.textBaseline = 'middle';
    ctx.font         = "bold 38px 'Press Start 2P'";
    for (const f of floatTexts) {
        ctx.globalAlpha = Math.min(1, f.life / f.maxLife * 2.2);
        ctx.fillStyle   = f.color;
        ctx.shadowColor = f.color;
        ctx.shadowBlur  = 10;
        ctx.fillText(f.text, f.x, f.y);
    }
    ctx.globalAlpha = 1;
    ctx.shadowBlur  = 0;
    ctx.restore();
}

// ─────────────────────────────────────────────────
// Paddle
// ─────────────────────────────────────────────────
class Paddle {
    constructor(x, y, w, h, color) {
        this.x = x; this.y = y;
        this.w = w; this.h = h;
        this.color = color;
        this.speed = 12;
        this.score = 0;
        this.vy    = 0;     // velocity last frame – used for spin
    }

    move(dir) {
        const d = (dir === 'up' ? -1 : 1) * this.speed;
        this.vy  = d;
        this.y  += d;
        this.clamp();
    }

    moveTo(targetCenterY) {
        const prev = this.y;
        this.y     = targetCenterY - this.h / 2;
        this.clamp();
        this.vy    = this.y - prev;
    }

    clamp() {
        if (this.y < 0)         { this.y = 0;         this.vy = 0; }
        if (this.y + this.h > CH) { this.y = CH - this.h; this.vy = 0; }
    }

    draw() {
        ctx.shadowColor = this.color;
        ctx.shadowBlur  = 7;
        ctx.fillStyle   = this.color;
        ctx.fillRect(this.x, this.y, this.w, this.h);
        ctx.shadowBlur  = 0;
    }
}

// ─────────────────────────────────────────────────
// Ball
// ─────────────────────────────────────────────────
class Ball {
    constructor() {
        this.r         = 11;
        this.baseSpeed = 8;
        this.maxSpeed  = 18;    // ← cap prevents tunnelling at high speed
        this.reset();
    }

    reset() {
        this.x     = CW / 2;
        this.y     = CH / 2;
        this.speed = this.baseSpeed;
        const angle = (Math.random() - 0.5) * (Math.PI / 3.5);
        const dir   = Math.random() > 0.5 ? 1 : -1;
        this.dx = dir * this.speed * Math.cos(angle);
        this.dy =       this.speed * Math.sin(angle);
        trail.length = 0;
    }

    move() {
        // Push current position to trail BEFORE moving
        trail.push({ x: this.x, y: this.y });
        if (trail.length > TRAIL_LEN) trail.shift();

        this.x += this.dx;
        this.y += this.dy;

        // Wall bounce
        if (this.y + this.r >= CH) {
            this.y  = CH - this.r;
            this.dy = -Math.abs(this.dy);
            playSound('wall');
            burst(this.x, CH, '#fff', 7, 4);
        } else if (this.y - this.r <= 0) {
            this.y  = this.r;
            this.dy =  Math.abs(this.dy);
            playSound('wall');
            burst(this.x, 0, '#fff', 7, 4);
        }
    }

    draw() {
        // Trail  (fading ghost behind ball)
        for (let i = 0; i < trail.length; i++) {
            const prog = i / trail.length;
            ctx.globalAlpha = prog * 0.3;
            ctx.fillStyle   = C1;
            ctx.beginPath();
            ctx.arc(trail[i].x, trail[i].y, this.r * prog * 0.75, 0, Math.PI * 2);
            ctx.fill();
        }
        ctx.globalAlpha = 1;

        // Ball – glow intensifies with speed
        const heat = (this.speed - this.baseSpeed) / (this.maxSpeed - this.baseSpeed);
        ctx.shadowColor = C1;
        ctx.shadowBlur  = Math.round(5 + heat * 14);
        ctx.fillStyle   = C1;
        ctx.beginPath();
        ctx.arc(this.x, this.y, this.r, 0, Math.PI * 2);
        ctx.fill();
        ctx.shadowBlur = 0;
    }
}

// ─────────────────────────────────────────────────
// Create game objects
// ─────────────────────────────────────────────────
const P1   = new Paddle(20,       CH/2 - 70, 22, 140, C1);
const P2   = new Paddle(CW - 42,  CH/2 - 70, 22, 140, C2);
const ball = new Ball();

// ─────────────────────────────────────────────────
// Canvas resize  (CSS scaling, fixed logical res)
// ─────────────────────────────────────────────────
function resizeCanvas() {
    canvas.width  = CW;
    canvas.height = CH;
    const scale = Math.min(window.innerWidth * 0.96 / CW, window.innerHeight * 0.78 / CH);
    const dW    = Math.round(CW * scale);
    const dH    = Math.round(CH * scale);
    canvas.style.width      = dW + 'px';
    canvas.style.height     = dH + 'px';
    gameWrapper.style.width = dW + 'px';
}
resizeCanvas();
let resizeTimer;
window.addEventListener('resize', () => { clearTimeout(resizeTimer); resizeTimer = setTimeout(resizeCanvas, 100); });

// ─────────────────────────────────────────────────
// Draw helpers
// ─────────────────────────────────────────────────
function drawNet() {
    ctx.strokeStyle = C1;
    ctx.lineWidth   = 3;
    ctx.shadowColor = C1;
    ctx.shadowBlur  = 4;
    ctx.setLineDash([10, 14]);
    ctx.beginPath();
    ctx.moveTo(CW / 2, 0);
    ctx.lineTo(CW / 2, CH);
    ctx.stroke();
    ctx.setLineDash([]);
    ctx.shadowBlur = 0;
}

function drawRallyBadge() {
    if (rally < 3) return;
    // Color ramps from teal → yellow → orange as rally builds
    let col;
    if      (rally >= 12) col = '#f80';
    else if (rally >=  7) col = '#ff0';
    else if (rally >=  3) col = '#8ff';
    const label = `RALLY ×${rally}`;
    ctx.save();
    ctx.globalAlpha  = 0.6;
    ctx.fillStyle    = col;
    ctx.font         = "13px 'Press Start 2P'";
    ctx.textAlign    = 'center';
    ctx.textBaseline = 'top';
    ctx.fillText(label, CW / 2, 8);
    ctx.restore();
}

function drawCountdown() {
    if (gameState !== 'countdown') return;

    const inGO   = cdTimer <= CD_GO_TICKS;
    let text, progress;

    if (inGO) {
        text     = 'GO!';
        progress = cdTimer / CD_GO_TICKS;          // 1→0
    } else {
        const t  = cdTimer - CD_GO_TICKS;          // 150→1
        text     = String(Math.ceil(t / CD_NUM_TICKS));
        const tp = ((t - 1) % CD_NUM_TICKS) + 1;  // 50→1 within phase
        progress = tp / CD_NUM_TICKS;
    }

    // Starts large, shrinks + fades out
    const size = Math.round(82 + progress * 38);

    ctx.save();
    ctx.globalAlpha  = Math.max(0.05, progress * 0.95 + 0.05);
    ctx.font         = `${size}px 'Press Start 2P'`;
    ctx.textAlign    = 'center';
    ctx.textBaseline = 'middle';
    ctx.fillStyle    = inGO ? '#fff' : C1;
    ctx.shadowColor  = inGO ? '#fff' : C1;
    ctx.shadowBlur   = 18;
    ctx.fillText(text, CW / 2, CH / 2);
    ctx.restore();
}

// ─────────────────────────────────────────────────
// Collision
// ─────────────────────────────────────────────────
function overlaps(b, p) {
    return b.x + b.r > p.x && b.x - b.r < p.x + p.w &&
           b.y + b.r > p.y && b.y - b.r < p.y + p.h;
}

/**
 * Resolve ball hitting paddle.
 * dirOut: +1 = ball bounces right (hit P1), -1 = bounces left (hit P2)
 */
function hitPaddle(paddle, dirOut) {
    // Normalized hit position on paddle face: -1 (top) … 0 (center) … +1 (bottom)
    const hit     = (ball.y - (paddle.y + paddle.h / 2)) / (paddle.h / 2);
    const clamped = Math.max(-1, Math.min(1, hit));

    // Max ~52° deflection; edge hits go sharper
    const angle    = clamped * (Math.PI / 3.4);
    const isPower  = Math.abs(clamped) > 0.72;   // outer-28% = power zone

    // Push ball fully outside paddle to prevent sticking / re-hit
    ball.x = paddle.x + (dirOut > 0 ? paddle.w + ball.r + 1 : -ball.r - 1);

    // Speed ramp (capped)
    ball.speed = Math.min(ball.speed + (isPower ? 0.65 : 0.28), ball.maxSpeed);

    ball.dx = dirOut * ball.speed * Math.cos(angle);
    ball.dy =         ball.speed * Math.sin(angle)
            + paddle.vy * 0.13;   // spin: add a fraction of paddle velocity

    // Re-normalise so total speed stays exact (dy spin could overshoot)
    const mag = Math.hypot(ball.dx, ball.dy);
    if (mag > 0) { ball.dx = ball.dx / mag * ball.speed; ball.dy = ball.dy / mag * ball.speed; }

    rally++;

    if (isPower) {
        playSound('power');
        burst(ball.x, ball.y, paddle.color, 22, 8);
        burst(ball.x, ball.y, '#fff',        8, 4);
    } else {
        playSound('paddle');
        burst(ball.x, ball.y, paddle.color, 10, 5);
    }
}

// ─────────────────────────────────────────────────
// Score / DOM
// ─────────────────────────────────────────────────
function flashScore(el) {
    el.classList.remove('score-pop');
    void el.offsetWidth;          // trigger reflow to restart animation
    el.classList.add('score-pop');
}

function updateScoreDOM() {
    p1ScoreEl.textContent = P1.score;
    p2ScoreEl.textContent = P2.score;
}

/** Returns true if someone won (sets gameOver state). */
// ── SCORE REPORTING TO APP ──
function sendScoreToApp(score, isNewRecord) {
  if (window.ReactNativeWebView) {
    window.ReactNativeWebView.postMessage(JSON.stringify({
      type: 'SEND_SCORE',
      score: score,
      game: 'Ultimate Pong',
      isNewRecord: isNewRecord,
    }));
  }
}

function checkWin() {
    let winner = null;
    if (P1.score >= settings.winningScore) winner = 'PLAYER 1 WINS!';
    else if (P2.score >= settings.winningScore)
        winner = settings.gameMode === '1P' ? 'COMPUTER WINS!' : 'PLAYER 2 WINS!';

    if (winner) {
        // Send score to app
        sendScoreToApp(P1.score, false);

        gameState = 'gameOver';
        winnerMsg.textContent = winner;
        gameOverMenu.style.display = 'flex';
        // Big celebration burst
        burst(CW / 2, CH / 2, C1, 35, 10);
        burst(CW / 2, CH / 2, '#fff', 15, 6);
    }
    return !!winner;
}

// ─────────────────────────────────────────────────
// Input
// ─────────────────────────────────────────────────
function handleInput() {
    if (keysPressed['KeyW'])     P1.move('up');
    if (keysPressed['KeyS'])     P1.move('down');

    if (settings.gameMode === '1P') {
        if (keysPressed['ArrowUp'])   P1.move('up');
        if (keysPressed['ArrowDown']) P1.move('down');
    } else {
        if (keysPressed['ArrowUp'])   P2.move('up');
        if (keysPressed['ArrowDown']) P2.move('down');
    }
}

// ─────────────────────────────────────────────────
// AI
// ─────────────────────────────────────────────────
// Drifting error target (updated periodically) makes AI feel organic
let aiError      = 0;
let aiErrorTimer = 0;

function updateAI() {
    const cfg = AI_CFG[settings.difficulty];

    aiErrorTimer--;
    if (aiErrorTimer <= 0) {
        aiError      = (Math.random() - 0.5) * cfg.error;
        aiErrorTimer = 28 + Math.random() * 38 | 0;
    }

    const prevY  = P2.y;
    const target = ball.y + aiError - P2.h / 2;
    P2.y        += (target - P2.y) * cfg.speed;
    P2.clamp();
    P2.vy = P2.y - prevY;
}

// ─────────────────────────────────────────────────
// Update  (fixed-timestep physics)
// ─────────────────────────────────────────────────
function update() {

    // ── Countdown phase ──────────────────────────
    if (gameState === 'countdown') {
        // Detect number-phase transition for beep sounds
        const prevTimer = cdTimer;
        cdTimer--;

        const currNum = cdTimer > CD_GO_TICKS
            ? Math.ceil((cdTimer - CD_GO_TICKS) / CD_NUM_TICKS)
            : 0;
        if (currNum !== cdPrevNum) {
            if   (currNum === 0) playSound('go');
            else                 playSound('countdown');
            cdPrevNum = currNum;
        }

        if (cdTimer <= 0) gameState = 'play';
        return;
    }

    if (gameState !== 'play') return;

    // ── Input + ball movement ────────────────────
    handleInput();
    ball.move();

    // ── AI (1P only) ─────────────────────────────
    if (settings.gameMode === '1P') updateAI();

    // ── Collision: direction-based (BUG FIX) ─────
    // Only check the paddle the ball is currently heading toward.
    if (ball.dx < 0 && overlaps(ball, P1)) {
        hitPaddle(P1, 1);
    } else if (ball.dx > 0 && overlaps(ball, P2)) {
        hitPaddle(P2, -1);
    }

    // ── Screen shake decay ────────────────────────
    if (shakeMag > 0.4) {
        canvas.style.transform = `translate(${(Math.random()-.5)*shakeMag}px,${(Math.random()-.5)*shakeMag}px)`;
        shakeMag *= 0.72;
    } else if (shakeMag > 0) {
        canvas.style.transform = '';
        shakeMag = 0;
    }

    // ── Scoring ───────────────────────────────────
    if (ball.x - ball.r < 0) {
        // P2 / AI scores
        P2.score++;
        playSound('score');
        burst(CW * 0.08, ball.y, C2, 28, 9);
        spawnFloat(CW * 0.75, CH * 0.42, '+1', C2);
        flashScore(p2ScoreEl);
        shakeMag = 9;
        rally    = 0;
        updateScoreDOM();
        if (!checkWin()) startCountdown();

    } else if (ball.x + ball.r > CW) {
        // P1 scores
        P1.score++;
        playSound('score');
        burst(CW * 0.92, ball.y, C1, 28, 9);
        spawnFloat(CW * 0.25, CH * 0.42, '+1', C1);
        flashScore(p1ScoreEl);
        shakeMag = 9;
        rally    = 0;
        updateScoreDOM();
        if (!checkWin()) startCountdown();
    }

    // ── Sub-systems ──────────────────────────────
    updateParticles();
    updateFloats();
}

// ─────────────────────────────────────────────────
// Render
// ─────────────────────────────────────────────────
function render() {
    // Clear (alpha:false ctx → fillRect is fastest clear)
    ctx.fillStyle = '#02020a';
    ctx.fillRect(0, 0, CW, CH);

    drawNet();
    drawRallyBadge();

    P1.draw();
    P2.draw();

    // Ball only when game is active
    if (gameState !== 'main-menu' && gameState !== 'settings') {
        ball.draw();
    }

    // Particles + floats during gameplay states
    if (gameState === 'play' || gameState === 'countdown' ||
        gameState === 'pause' || gameState === 'gameOver') {
        drawParticles();
        drawFloats();
    }

    drawCountdown();
}

// ─────────────────────────────────────────────────
// Fixed-timestep game loop
// ─────────────────────────────────────────────────
function gameLoop(ts) {
    requestAnimationFrame(gameLoop);

    if (!lastTime) lastTime = ts;
    let dt = ts - lastTime;
    lastTime = ts;
    if (dt > 100) dt = 100;   // clamp after tab-switch

    accumulator += dt;
    while (accumulator >= STEP) {
        update();
        accumulator -= STEP;
    }

    render();
}

// ─────────────────────────────────────────────────
// Countdown + startGame helpers
// ─────────────────────────────────────────────────
function startCountdown() {
    cdTimer   = CD_TOTAL;
    cdPrevNum = Math.ceil(CD_TOTAL - CD_GO_TICKS) / CD_NUM_TICKS | 0;   // 3
    cdPrevNum = -1;    // reset so first transition fires immediately
    ball.reset();
    trail.length = 0;
    gameState    = 'countdown';
}

function startGame() {
    P1.score = 0;  P2.score = 0;
    P1.y     = CH / 2 - P1.h / 2;
    P2.y     = CH / 2 - P2.h / 2;
    rally    = 0;
    shakeMag = 0;
    canvas.style.transform = '';
    floatTexts.length = 0;
    pool.forEach(p => p.active = false);
    updateScoreDOM();
    showMenu(null);

    if (audioCtx && audioCtx.state === 'suspended') audioCtx.resume();
    startCountdown();
}

// ─────────────────────────────────────────────────
// Menu helpers
// ─────────────────────────────────────────────────
function showMenu(id) {
    [mainMenu, settingsMenu, pauseMenu, gameOverMenu].forEach(m => m.style.display = 'none');
    if (id) document.getElementById(id).style.display = 'flex';
    if (id === 'main-menu') pool.forEach(p => p.active = false);
}

// ─────────────────────────────────────────────────
// Event listeners
// ─────────────────────────────────────────────────
document.getElementById('onePlayerButton').addEventListener('click', () => {
    settings.gameMode = '1P';
    document.getElementById('difficulty-group').style.display = 'block';
    startGame();
});
document.getElementById('twoPlayerButton').addEventListener('click', () => {
    settings.gameMode = '2P';
    document.getElementById('difficulty-group').style.display = 'none';
    startGame();
});
document.getElementById('settingsButton').addEventListener('click', () => {
    gameState = 'settings';
    showMenu('settings-menu');
});
document.getElementById('settingsBackButton').addEventListener('click', () => {
    gameState = 'main-menu';
    showMenu('main-menu');
});
document.getElementById('resumeButton').addEventListener('click', () => {
    gameState = 'play';
    showMenu(null);
});
document.getElementById('quitButton').addEventListener('click', () => {
    gameState = 'main-menu';
    showMenu('main-menu');
});
document.getElementById('playAgainButton').addEventListener('click', startGame);
document.getElementById('gameOverMenuButton').addEventListener('click', () => {
    gameState = 'main-menu';
    showMenu('main-menu');
});

// Setting buttons
document.querySelectorAll('.setting-btn').forEach(btn => {
    btn.addEventListener('click', () => {
        const { group, value } = btn.dataset;
        if (group === 'difficulty') settings.difficulty    = value;
        if (group === 'score')      settings.winningScore  = parseInt(value);
        if (group === 'sound')      settings.soundEnabled  = value === 'on';
        document.querySelectorAll(`.setting-btn[data-group="${group}"]`)
            .forEach(b => b.classList.remove('active'));
        btn.classList.add('active');
    });
});

// Keyboard
window.addEventListener('keydown', e => {
    if (['ArrowUp','ArrowDown','KeyW','KeyS','Space'].includes(e.code)) e.preventDefault();
    keysPressed[e.code] = true;

    if (e.code === 'KeyP' || e.code === 'Escape') {
        if      (gameState === 'play')  { gameState = 'pause'; showMenu('pause-menu'); }
        else if (gameState === 'pause') { gameState = 'play';  showMenu(null); }
    }
});
window.addEventListener('keyup', e => { keysPressed[e.code] = false; });

// Touch
function handleTouch(e) {
    e.preventDefault();
    if (gameState !== 'play' && gameState !== 'countdown') return;
    const rect   = canvas.getBoundingClientRect();
    const scaleX = CW / rect.width;
    const scaleY = CH / rect.height;
    for (let i = 0; i < e.touches.length; i++) {
        const t  = e.touches[i];
        const tx = (t.clientX - rect.left) * scaleX;
        const ty = (t.clientY - rect.top)  * scaleY;
        if (settings.gameMode === '1P') {
            P1.moveTo(ty);
        } else {
            if (tx < CW / 2) P1.moveTo(ty);
            else             P2.moveTo(ty);
        }
    }
}
canvas.addEventListener('touchstart', handleTouch, { passive: false });
canvas.addEventListener('touchmove',  handleTouch, { passive: false });

// Reset timing on tab-switch so dt doesn't spike
document.addEventListener('visibilitychange', () => {
    if (document.hidden) { lastTime = 0; accumulator = 0; }
});

// ─────────────────────────────────────────────────
// Boot
// ─────────────────────────────────────────────────
requestAnimationFrame(gameLoop);
</script>
</body>
