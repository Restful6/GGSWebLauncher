    <style>
        :root {
            /* Arcade cabinet palette — warm amber phosphor on dark glass */
            --amber:   #e8a020;
            --amber-d: #b97318;
            --amber-l: #f5c96a;
            --cream:   #f0e8d0;
            --green:   #7ab648;
            --red:     #c94030;
            --bg:      #0d0c09;
            --cbg:     #080807;
            --panel:   rgba(10,9,6,0.93);
            --border:  #3a3220;
        }

        *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
        html, body { width: 100%; height: 100%; overflow: hidden; }

        body {
            background: var(--bg);
            color: var(--cream);
            font-family: 'Press Start 2P', monospace;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            /* Subtle radial vignette on the body itself */
            background-image: radial-gradient(ellipse at 50% 40%, #1a1710 0%, #0d0c09 70%);
        }

        h1 {
            font-size: clamp(0.85rem, 3.5vw, 2rem);
            color: var(--amber);
            margin-bottom: 6px;
            letter-spacing: 0.06em;
            /* Single tight glow — warm, not electric */
            text-shadow: 0 0 12px rgba(232,160,32,0.5);
        }

        /* ── GAME WRAPPER + CRT OVERLAY ── */
        .game-wrapper {
            position: relative;
        }

        /* CRT scanlines + vignette — pure CSS, zero JS cost */
        .game-wrapper::after {
            content: '';
            position: absolute;
            inset: 0;
            pointer-events: none;
            z-index: 5;
            /* Scanlines via repeating-linear-gradient */
            background:
                repeating-linear-gradient(
                    to bottom,
                    transparent 0px,
                    transparent 3px,
                    rgba(0,0,0,0.18) 3px,
                    rgba(0,0,0,0.18) 4px
                ),
                /* Vignette */
                radial-gradient(ellipse at 50% 50%, transparent 55%, rgba(0,0,0,0.55) 100%);
        }

        /* ── SCORES ── */
        .score-container {
            display: flex;
            justify-content: space-between;
            width: 100%;
            font-size: clamp(1.3rem, 4.5vw, 2.6rem);
            padding: 0 6%;
            contain: layout style;
        }

        #player-score {
            color: var(--amber);
            text-shadow: 0 0 8px rgba(232,160,32,0.4);
            transition: transform 0.15s;
        }
        #ai-score {
            color: var(--red);
            text-shadow: 0 0 8px rgba(201,64,48,0.4);
            transition: transform 0.15s;
        }

        .score-pop {
            animation: scorePop 0.28s ease-out forwards;
        }
        @keyframes scorePop {
            0%   { transform: scale(1.7); }
            100% { transform: scale(1);   }
        }

        canvas {
            background: var(--cbg);
            /* Warm amber border — like a phosphor monitor bezel */
            border: 2px solid var(--border);
            outline: 1px solid rgba(232,160,32,0.12);
            display: block;
            image-rendering: pixelated;
        }

        /* ── MENUS ── */
        .menu-overlay {
            position: absolute;
            top: 0; left: 0;
            width: 100%; height: 100%;
            background: var(--panel);
            border: 2px solid var(--border);
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            text-align: center;
            z-index: 10;
        }

        #settings-menu, #pause-menu, #game-over-menu { display: none; }

        .menu-overlay h2 {
            font-size: clamp(0.85rem, 2.6vw, 1.7rem);
            color: var(--amber);
            margin-bottom: 22px;
            letter-spacing: 0.08em;
            text-shadow: 0 0 10px rgba(232,160,32,0.35);
        }

        .controls-info {
            font-size: clamp(0.38rem, 1vw, 0.62rem);
            line-height: 2.1;
            max-width: 86%;
            margin-top: 14px;
            opacity: 0.45;
            color: var(--cream);
        }

        /* Buttons — rectangular, stamp-like, no rounded corners */
        .menu-button, .setting-group button {
            background: transparent;
            color: var(--amber);
            border: 1px solid var(--amber-d);
            font-family: 'Press Start 2P', monospace;
            font-size: clamp(0.5rem, 1.3vw, 0.85rem);
            padding: clamp(8px,1.4vw,13px) clamp(14px,2.8vw,26px);
            cursor: pointer;
            transition: background 0.12s, color 0.12s;
            margin: 6px;
            width: clamp(160px,36vw,240px);
            letter-spacing: 0.05em;
        }

        .menu-button:hover, .setting-group button:hover {
            background: var(--amber);
            color: var(--bg);
        }

        .setting-group { margin: 9px 0; }
        .setting-group label {
            display: block;
            margin-bottom: 8px;
            font-size: clamp(0.4rem, 1vw, 0.75rem);
            color: var(--cream);

        .setting-group button {
            font-size: clamp(0.4rem, 1vw, 0.72rem);
            width: auto;
            padding: clamp(5px,.9vw,9px) clamp(9px,1.4vw,13px);

        /* ── MOBILE THUMB OFFSET INDICATOR ── */

            opacity: 0.5;
            pointer-events: none;
            z-index: 6;

        @media (pointer: coarse) {
            #touch-hint { display: block; }

<h1>ULTIMATE PONG</h1>

<div class="game-wrapper" id="gameWrapper">

    </div>

    <canvas id="pongCanvas"></canvas>

    <!-- ── MENUS ── -->
    <div id="main-menu" class="menu-overlay">
        <h2>MAIN MENU</h2>
        <button id="onePlayerButton"  class="menu-button">1 PLAYER</button>

            1P: W/S · ARROWS · or TOUCH<br>
            2P: P1 (W/S) | P2 (ARROWS)<br>
            P / ESC: PAUSE
        </div>
        <div class="footer">Powered by Greek Games Studios</div>
    </div>

    <div id="settings-menu" class="menu-overlay">
        <h2>SETTINGS</h2>
        <div class="setting-group" id="difficulty-group">
            <label>DIFFICULTY (AI)</label>
            <button data-value="easy"   class="setting-btn"        data-group="difficulty">EASY</button>
            <button data-value="normal" class="setting-btn active"  data-group="difficulty">NORMAL</button>
            <button data-value="hard"   class="setting-btn"        data-group="difficulty">HARD</button>
        </div>
        <div class="setting-group">
            <label>WINNING SCORE</label>
            <button data-value="3"  class="setting-btn"       data-group="score">3</button>
            <button data-value="5"  class="setting-btn active" data-group="score">5</button>
            <button data-value="10" class="setting-btn"       data-group="score">10</button>
        </div>
        <div class="setting-group">
            <label>SOUND</label>
            <button data-value="on"  class="setting-btn active" data-group="sound">ON</button>
            <button data-value="off" class="setting-btn"        data-group="sound">OFF</button>

        <h2 id="winner-message">GAME OVER</h2>

        <button id="gameOverMenuButton"  class="menu-button">MAIN MENU</button>
    </div>

</div><!-- .game-wrapper -->

<script>
'use strict';

// ─────────────────────────────────────────────────
// DOM
// ─────────────────────────────────────────────────
const canvas       = document.getElementById('pongCanvas');
const ctx          = canvas.getContext('2d', { alpha: false });
const gameWrapper  = document.getElementById('gameWrapper');
const p1ScoreEl    = document.getElementById('player-score');
const p2ScoreEl    = document.getElementById('ai-score');
const mainMenu     = document.getElementById('main-menu');
const settingsMenu = document.getElementById('settings-menu');
const pauseMenu    = document.getElementById('pause-menu');
const gameOverMenu = document.getElementById('game-over-menu');
const winnerMsg    = document.getElementById('winner-message');

// ─────────────────────────────────────────────────
// Palette (canvas draw colours — match CSS vars)
// ─────────────────────────────────────────────────
const C_AMBER  = '#e8a020';   // P1
const C_RED    = '#c94030';   // P2 / AI
const C_CREAM  = '#f0e8d0';   // ball / net
const C_DIM    = '#3a3220';   // net / grid
const C_GREEN  = '#7ab648';   // GO! / rally accent

// ─────────────────────────────────────────────────
// Settings
// ─────────────────────────────────────────────────
const settings = {
    gameMode:     '1P',
    difficulty:   'normal',
    winningScore: 5,
    soundEnabled: true
};

const AI_CFG = {
    easy:   { speed: 0.048, error: 95 },
    normal: { speed: 0.092, error: 34 },
    hard:   { speed: 0.138, error:  5 }
};

// ─────────────────────────────────────────────────
// Canvas constants (fixed logical resolution)
// ─────────────────────────────────────────────────
const CW = 1200, CH = 700;

// ─────────────────────────────────────────────────
// Game-state
// ─────────────────────────────────────────────────
let gameState   = 'main-menu';
let keysPressed = {};
let lastTime    = 0;
let accumulator = 0;
const STEP      = 1000 / 60;

let rally   = 0;
let shakeMag = 0;

// Countdown
const CD_NUM_TICKS = 50;
const CD_GO_TICKS  = 28;
const CD_TOTAL     = 3 * CD_NUM_TICKS + CD_GO_TICKS;
let   cdTimer      = 0;
let   cdPrevNum    = -1;

// Floating score texts
const floatTexts = [];

// ─────────────────────────────────────────────────
// Mobile touch: detect coarse pointer
// ─────────────────────────────────────────────────
const isCoarse = window.matchMedia('(pointer: coarse)').matches;
// How many canvas-logical-pixels above the finger the paddle centre tracks
const THUMB_OFFSET = 130;

// ─────────────────────────────────────────────────
// Audio
// ─────────────────────────────────────────────────
let audioCtx = null;
function getACtx() {
    if (!audioCtx) audioCtx = new (window.AudioContext || window.webkitAudioContext)();
    return audioCtx;
}

function playSound(type) {
    if (!settings.soundEnabled) return;
    try {
        const ac   = getACtx();
        const osc  = ac.createOscillator();
        const gain = ac.createGain();
        osc.connect(gain);
        gain.connect(ac.destination);
        const t = ac.currentTime;

        switch (type) {
            case 'paddle':
                osc.type = 'square';
                osc.frequency.setValueAtTime(220, t);
                gain.gain.setValueAtTime(0.055, t);
                gain.gain.exponentialRampToValueAtTime(0.001, t + 0.09);
                osc.start(t); osc.stop(t + 0.09);
                break;
            case 'power':
                osc.type = 'sawtooth';
                osc.frequency.setValueAtTime(260, t);
                osc.frequency.linearRampToValueAtTime(520, t + 0.11);
                gain.gain.setValueAtTime(0.075, t);
                gain.gain.exponentialRampToValueAtTime(0.001, t + 0.14);
                osc.start(t); osc.stop(t + 0.14);
                break;
            case 'wall':
                osc.type = 'sine';
                osc.frequency.setValueAtTime(290, t);
                gain.gain.setValueAtTime(0.045, t);
                gain.gain.exponentialRampToValueAtTime(0.001, t + 0.07);
                osc.start(t); osc.stop(t + 0.07);
                break;
            case 'score':
                osc.type = 'triangle';
                osc.frequency.setValueAtTime(600, t);
                osc.frequency.linearRampToValueAtTime(280, t + 0.22);
                gain.gain.setValueAtTime(0.09, t);
                gain.gain.linearRampToValueAtTime(0, t + 0.22);
                osc.start(t); osc.stop(t + 0.22);
                break;
            case 'countdown':
                osc.type = 'square';
                osc.frequency.setValueAtTime(440, t);
                gain.gain.setValueAtTime(0.045, t);
                gain.gain.exponentialRampToValueAtTime(0.001, t + 0.08);
                osc.start(t); osc.stop(t + 0.08);
                break;
            case 'go':
                osc.type = 'square';
                osc.frequency.setValueAtTime(880, t);
                gain.gain.setValueAtTime(0.06, t);
                gain.gain.exponentialRampToValueAtTime(0.001, t + 0.13);
                osc.start(t); osc.stop(t + 0.13);
                break;
        }
    } catch(e) { /* audio non-critical */ }
}

// ─────────────────────────────────────────────────
// Particle pool
// ─────────────────────────────────────────────────
const POOL = 320;
const pool = Array.from({ length: POOL }, () => ({
    x:0, y:0, color:C_AMBER, r:1, dx:0, dy:0, life:0, maxLife:40, active:false
}));

function spawnP(x, y, color, spd) {
    for (let i = 0; i < pool.length; i++) {
        const p = pool[i];
        if (p.active) continue;
        const ang = Math.random() * Math.PI * 2;
        const v   = (Math.random() * 0.7 + 0.3) * spd;
        p.x = x;  p.y = y;  p.color = color;
        p.r = Math.random() * 2.5 + 0.7;
        p.dx = Math.cos(ang) * v;
        p.dy = Math.sin(ang) * v;
        p.maxLife = 28 + Math.random() * 22 | 0;
        p.life    = p.maxLife;
        p.active  = true;
        return;
    }
}

function burst(x, y, color, n, spd) {
    for (let i = 0; i < n; i++) spawnP(x, y, color, spd);
}

function updateParticles() {
    for (let i = 0; i < pool.length; i++) {
        const p = pool[i];
        if (!p.active) continue;
        p.x  += p.dx;
        p.y  += p.dy;
        p.dx *= 0.93;
        p.dy *= 0.93;
        if (--p.life <= 0) p.active = false;
    }
}

function drawParticles() {
    ctx.save();
    for (let i = 0; i < pool.length; i++) {
        const p = pool[i];
        if (!p.active) continue;
        ctx.globalAlpha = p.life / p.maxLife;
        ctx.fillStyle   = p.color;
        ctx.beginPath();
        ctx.arc(p.x, p.y, p.r, 0, Math.PI * 2);
        ctx.fill();
    }
    ctx.globalAlpha = 1;
    ctx.restore();
}

// ─────────────────────────────────────────────────
// Ball trail
// ─────────────────────────────────────────────────
const TRAIL_LEN = 10;
const trail     = [];

// ─────────────────────────────────────────────────
// Floating score texts
// ─────────────────────────────────────────────────
function spawnFloat(x, y, text, color) {
    floatTexts.push({ x, y, text, color, life: 58, maxLife: 58 });
}

function updateFloats() {
    for (let i = floatTexts.length - 1; i >= 0; i--) {
        floatTexts[i].y -= 1.3;
        if (--floatTexts[i].life <= 0) floatTexts.splice(i, 1);
    }
}

function drawFloats() {
    if (!floatTexts.length) return;
    ctx.save();
    ctx.textAlign    = 'center';
    ctx.textBaseline = 'middle';
    ctx.font         = "bold 34px 'Press Start 2P'";
    for (const f of floatTexts) {
        ctx.globalAlpha = Math.min(1, f.life / f.maxLife * 2.2);
        ctx.fillStyle   = f.color;
        ctx.fillText(f.text, f.x, f.y);
    }
    ctx.globalAlpha = 1;
    ctx.restore();
}

// ─────────────────────────────────────────────────
// Paddle
// ─────────────────────────────────────────────────
class Paddle {
    constructor(x, y, w, h, color) {
        this.x = x; this.y = y;
        this.w = w; this.h = h;
        this.color = color;
        this.speed = 12;
        this.score = 0;
        this.vy    = 0;
    }

    move(dir) {
        const d = (dir === 'up' ? -1 : 1) * this.speed;
        this.vy  = d;
        this.y  += d;
        this.clamp();
    }

    moveTo(targetCenterY) {
        const prev = this.y;
        this.y     = targetCenterY - this.h / 2;
        this.clamp();
        this.vy    = this.y - prev;
    }

    clamp() {
        if (this.y < 0)           { this.y = 0;           this.vy = 0; }
        if (this.y + this.h > CH) { this.y = CH - this.h; this.vy = 0; }
    }

    draw() {
        // Subtle inner highlight on left edge of each paddle
        const isP1 = this.x < CW / 2;

        ctx.fillStyle = this.color;
        ctx.fillRect(this.x, this.y, this.w, this.h);

        // Thin highlight stripe — gives physical depth
        ctx.fillStyle = 'rgba(255,255,255,0.15)';
        if (isP1) {
            ctx.fillRect(this.x, this.y, 3, this.h);
        } else {
            ctx.fillRect(this.x + this.w - 3, this.y, 3, this.h);
        }
    }
}

// ─────────────────────────────────────────────────
// Ball
// ─────────────────────────────────────────────────
class Ball {
    constructor() {
        this.r         = 11;
        this.baseSpeed = 8;
        this.maxSpeed  = 18;
        this.reset();
    }

    reset() {
        this.x     = CW / 2;
        this.y     = CH / 2;
        this.speed = this.baseSpeed;
        const angle = (Math.random() - 0.5) * (Math.PI / 3.5);
        const dir   = Math.random() > 0.5 ? 1 : -1;
        this.dx = dir * this.speed * Math.cos(angle);
        this.dy =       this.speed * Math.sin(angle);
        trail.length = 0;
    }

    move() {
        trail.push({ x: this.x, y: this.y });
        if (trail.length > TRAIL_LEN) trail.shift();

        this.x += this.dx;
        this.y += this.dy;

        if (this.y + this.r >= CH) {
            this.y  = CH - this.r;
            this.dy = -Math.abs(this.dy);
            playSound('wall');
            burst(this.x, CH, C_CREAM, 6, 3.5);
        } else if (this.y - this.r <= 0) {
            this.y  = this.r;
            this.dy =  Math.abs(this.dy);
            playSound('wall');
            burst(this.x, 0, C_CREAM, 6, 3.5);
        }
    }

    draw() {
        // Fading trail — amber ghost
        for (let i = 0; i < trail.length; i++) {
            const prog = i / trail.length;
            ctx.globalAlpha = prog * 0.22;
            ctx.fillStyle   = C_AMBER;
            ctx.beginPath();
            ctx.arc(trail[i].x, trail[i].y, this.r * prog * 0.7, 0, Math.PI * 2);
            ctx.fill();
        }
        ctx.globalAlpha = 1;

        // Ball body — solid warm white/cream dot
        ctx.fillStyle = C_CREAM;
        ctx.beginPath();
        ctx.arc(this.x, this.y, this.r, 0, Math.PI * 2);
        ctx.fill();

        // Tiny specular highlight (top-left)
        ctx.fillStyle = 'rgba(255,255,255,0.55)';
        ctx.beginPath();
        ctx.arc(this.x - 3, this.y - 3, this.r * 0.32, 0, Math.PI * 2);
        ctx.fill();
    }
}

// ─────────────────────────────────────────────────
// Create game objects
// ─────────────────────────────────────────────────
const P1   = new Paddle(20,       CH/2 - 70, 22, 140, C_AMBER);
const P2   = new Paddle(CW - 42,  CH/2 - 70, 22, 140, C_RED);
const ball = new Ball();

// ─────────────────────────────────────────────────
// Canvas resize
// ─────────────────────────────────────────────────
function resizeCanvas() {
    canvas.width  = CW;
    canvas.height = CH;
    const scale = Math.min(window.innerWidth * 0.96 / CW, window.innerHeight * 0.78 / CH);
    const dW    = Math.round(CW * scale);
    const dH    = Math.round(CH * scale);
    canvas.style.width      = dW + 'px';
    canvas.style.height     = dH + 'px';
    gameWrapper.style.width = dW + 'px';
}
resizeCanvas();
let resizeTimer;
window.addEventListener('resize', () => { clearTimeout(resizeTimer); resizeTimer = setTimeout(resizeCanvas, 100); });

// ─────────────────────────────────────────────────
// Draw helpers
// ─────────────────────────────────────────────────
function drawNet() {
    // Centre dashes — dim amber, physically printed feel
    ctx.strokeStyle = C_DIM;
    ctx.lineWidth   = 3;
    ctx.setLineDash([10, 14]);
    ctx.beginPath();
    ctx.moveTo(CW / 2, 0);
    ctx.lineTo(CW / 2, CH);
    ctx.stroke();
    ctx.setLineDash([]);

    // Court boundary lines top + bottom
    ctx.strokeStyle = 'rgba(58,50,32,0.6)';
    ctx.lineWidth   = 2;
    ctx.beginPath();
    ctx.moveTo(0, 1); ctx.lineTo(CW, 1);
    ctx.moveTo(0, CH - 1); ctx.lineTo(CW, CH - 1);
    ctx.stroke();
}

function drawRallyBadge() {
    if (rally < 3) return;
    let col;
    if      (rally >= 12) col = C_RED;
    else if (rally >=  7) col = C_AMBER;
    else if (rally >=  3) col = C_GREEN;
    ctx.save();
    ctx.globalAlpha  = 0.55;
    ctx.fillStyle    = col;
    ctx.font         = "12px 'Press Start 2P'";
    ctx.textAlign    = 'center';
    ctx.textBaseline = 'top';
    ctx.fillText(`RALLY ×${rally}`, CW / 2, 8);
    ctx.restore();
}

function drawCountdown() {
    if (gameState !== 'countdown') return;

    const inGO = cdTimer <= CD_GO_TICKS;
    let text, progress;

    if (inGO) {
        text     = 'GO!';
        progress = cdTimer / CD_GO_TICKS;
    } else {
        const t  = cdTimer - CD_GO_TICKS;
        text     = String(Math.ceil(t / CD_NUM_TICKS));
        const tp = ((t - 1) % CD_NUM_TICKS) + 1;
        progress = tp / CD_NUM_TICKS;
    }

    const size = Math.round(82 + progress * 36);

    ctx.save();
    ctx.globalAlpha  = Math.max(0.05, progress * 0.9 + 0.08);
    ctx.font         = `${size}px 'Press Start 2P'`;
    ctx.textAlign    = 'center';
    ctx.textBaseline = 'middle';
    ctx.fillStyle    = inGO ? C_GREEN : C_AMBER;
    ctx.fillText(text, CW / 2, CH / 2);
    ctx.restore();
}

// ─────────────────────────────────────────────────
// Collision
// ─────────────────────────────────────────────────
function overlaps(b, p) {
    return b.x + b.r > p.x && b.x - b.r < p.x + p.w &&
           b.y + b.r > p.y && b.y - b.r < p.y + p.h;
}

function hitPaddle(paddle, dirOut) {
    const hit     = (ball.y - (paddle.y + paddle.h / 2)) / (paddle.h / 2);
    const clamped = Math.max(-1, Math.min(1, hit));
    const angle   = clamped * (Math.PI / 3.4);
    const isPower = Math.abs(clamped) > 0.72;

    ball.x = paddle.x + (dirOut > 0 ? paddle.w + ball.r + 1 : -ball.r - 1);

    ball.speed = Math.min(ball.speed + (isPower ? 0.65 : 0.28), ball.maxSpeed);

    ball.dx = dirOut * ball.speed * Math.cos(angle);
    ball.dy =         ball.speed * Math.sin(angle)
            + paddle.vy * 0.13;

    const mag = Math.hypot(ball.dx, ball.dy);
    if (mag > 0) { ball.dx = ball.dx / mag * ball.speed; ball.dy = ball.dy / mag * ball.speed; }

    rally++;

    if (isPower) {
        playSound('power');
        burst(ball.x, ball.y, paddle.color, 20, 7);
        burst(ball.x, ball.y, C_CREAM,       6, 3);
    } else {
        playSound('paddle');
        burst(ball.x, ball.y, paddle.color,  9, 4.5);
    }
}

// ─────────────────────────────────────────────────
// Score / DOM
// ─────────────────────────────────────────────────
function flashScore(el) {
    el.classList.remove('score-pop');
    void el.offsetWidth;
    el.classList.add('score-pop');
}

function updateScoreDOM() {
    p1ScoreEl.textContent = P1.score;
    p2ScoreEl.textContent = P2.score;
}

// ── SCORE REPORTING TO APP ──
function sendScoreToApp(score, isNewRecord) {
  if (window.ReactNativeWebView) {
    window.ReactNativeWebView.postMessage(JSON.stringify({
      type: 'SEND_SCORE',
      score: score,
      game: 'Ultimate Pong',
      isNewRecord: isNewRecord,
    }));
  }
}

function checkWin() {
    let winner = null;
    if (P1.score >= settings.winningScore) winner = 'PLAYER 1 WINS!';
    else if (P2.score >= settings.winningScore)
        winner = settings.gameMode === '1P' ? 'COMPUTER WINS!' : 'PLAYER 2 WINS!';

    if (winner) {
        sendScoreToApp(P1.score, false);

        gameState = 'gameOver';
        winnerMsg.textContent = winner;
        gameOverMenu.style.display = 'flex';
        burst(CW / 2, CH / 2, C_AMBER, 30, 9);
        burst(CW / 2, CH / 2, C_CREAM, 12, 5);
    }
    return !!winner;
}

// ─────────────────────────────────────────────────
// Input
// ─────────────────────────────────────────────────
function handleInput() {
    if (keysPressed['KeyW'])     P1.move('up');
    if (keysPressed['KeyS'])     P1.move('down');

    if (settings.gameMode === '1P') {
        if (keysPressed['ArrowUp'])   P1.move('up');
        if (keysPressed['ArrowDown']) P1.move('down');
    } else {
        if (keysPressed['ArrowUp'])   P2.move('up');
        if (keysPressed['ArrowDown']) P2.move('down');
    }
}

// ─────────────────────────────────────────────────
// AI
// ─────────────────────────────────────────────────
let aiError      = 0;
let aiErrorTimer = 0;

function updateAI() {
    const cfg = AI_CFG[settings.difficulty];

    aiErrorTimer--;
    if (aiErrorTimer <= 0) {
        aiError      = (Math.random() - 0.5) * cfg.error;
        aiErrorTimer = 28 + Math.random() * 38 | 0;
    }

    const prevY  = P2.y;
    const target = ball.y + aiError - P2.h / 2;
    P2.y        += (target - P2.y) * cfg.speed;
    P2.clamp();
    P2.vy = P2.y - prevY;
}

// ─────────────────────────────────────────────────
// Update (fixed-timestep)
// ─────────────────────────────────────────────────
function update() {

    if (gameState === 'countdown') {
        cdTimer--;

        const currNum = cdTimer > CD_GO_TICKS
            ? Math.ceil((cdTimer - CD_GO_TICKS) / CD_NUM_TICKS)
            : 0;
        if (currNum !== cdPrevNum) {
            if   (currNum === 0) playSound('go');
            else                 playSound('countdown');
            cdPrevNum = currNum;
        }

        if (cdTimer <= 0) gameState = 'play';
        return;
    }

    if (gameState !== 'play') return;

    handleInput();
    ball.move();

    if (settings.gameMode === '1P') updateAI();

    if (ball.dx < 0 && overlaps(ball, P1)) {
        hitPaddle(P1, 1);
    } else if (ball.dx > 0 && overlaps(ball, P2)) {
        hitPaddle(P2, -1);
    }

    // Screen shake decay
    if (shakeMag > 0.4) {
        canvas.style.transform = `translate(${(Math.random()-.5)*shakeMag}px,${(Math.random()-.5)*shakeMag}px)`;
        shakeMag *= 0.72;
    } else if (shakeMag > 0) {
        canvas.style.transform = '';
        shakeMag = 0;
    }

    // Scoring
    if (ball.x - ball.r < 0) {
        P2.score++;
        playSound('score');
        burst(CW * 0.08, ball.y, C_RED,  24, 8);
        spawnFloat(CW * 0.75, CH * 0.42, '+1', C_RED);
        flashScore(p2ScoreEl);
        shakeMag = 9;
        rally    = 0;
        updateScoreDOM();
        if (!checkWin()) startCountdown();

    } else if (ball.x + ball.r > CW) {
        P1.score++;
        playSound('score');
        burst(CW * 0.92, ball.y, C_AMBER, 24, 8);
        spawnFloat(CW * 0.25, CH * 0.42, '+1', C_AMBER);
        flashScore(p1ScoreEl);
        shakeMag = 9;
        rally    = 0;
        updateScoreDOM();
        if (!checkWin()) startCountdown();
    }

    updateParticles();
    updateFloats();
}

// ─────────────────────────────────────────────────
// Render
// ─────────────────────────────────────────────────
function render() {
    ctx.fillStyle = '#080807';
    ctx.fillRect(0, 0, CW, CH);

    drawNet();
    drawRallyBadge();

    P1.draw();
    P2.draw();

    if (gameState !== 'main-menu' && gameState !== 'settings') {
        ball.draw();
    }

    if (gameState === 'play' || gameState === 'countdown' ||
        gameState === 'pause' || gameState === 'gameOver') {
        drawParticles();
        drawFloats();
    }

    drawCountdown();
}

// ─────────────────────────────────────────────────
// Game loop
// ─────────────────────────────────────────────────
function gameLoop(ts) {
    requestAnimationFrame(gameLoop);

    if (!lastTime) lastTime = ts;
    let dt = ts - lastTime;
    lastTime = ts;
    if (dt > 100) dt = 100;

    accumulator += dt;
    while (accumulator >= STEP) {
        update();
        accumulator -= STEP;
    }

    render();
}

// ─────────────────────────────────────────────────
// Countdown + startGame helpers
// ─────────────────────────────────────────────────
function startCountdown() {
    cdTimer   = CD_TOTAL;
    cdPrevNum = -1;
    ball.reset();
    trail.length = 0;
    gameState    = 'countdown';
}

function startGame() {
    P1.score = 0;  P2.score = 0;
    P1.y     = CH / 2 - P1.h / 2;
    P2.y     = CH / 2 - P2.h / 2;
    rally    = 0;
    shakeMag = 0;
    canvas.style.transform = '';
    floatTexts.length = 0;
    pool.forEach(p => p.active = false);
    updateScoreDOM();
    showMenu(null);

    if (audioCtx && audioCtx.state === 'suspended') audioCtx.resume();
    startCountdown();
}

// ─────────────────────────────────────────────────
// Menu helpers
// ─────────────────────────────────────────────────
function showMenu(id) {
    [mainMenu, settingsMenu, pauseMenu, gameOverMenu].forEach(m => m.style.display = 'none');
    if (id) document.getElementById(id).style.display = 'flex';
    if (id === 'main-menu') pool.forEach(p => p.active = false);
}

// ─────────────────────────────────────────────────
// Event listeners
// ─────────────────────────────────────────────────
document.getElementById('onePlayerButton').addEventListener('click', () => {
    settings.gameMode = '1P';
    document.getElementById('difficulty-group').style.display = 'block';
    startGame();
});
document.getElementById('twoPlayerButton').addEventListener('click', () => {
    settings.gameMode = '2P';
    document.getElementById('difficulty-group').style.display = 'none';
    startGame();
});
document.getElementById('settingsButton').addEventListener('click', () => {
    gameState = 'settings';
    showMenu('settings-menu');
});
document.getElementById('settingsBackButton').addEventListener('click', () => {
    gameState = 'main-menu';
    showMenu('main-menu');
});
document.getElementById('resumeButton').addEventListener('click', () => {
    gameState = 'play';
    showMenu(null);
});
document.getElementById('quitButton').addEventListener('click', () => {
    gameState = 'main-menu';
    showMenu('main-menu');
});
document.getElementById('playAgainButton').addEventListener('click', startGame);
document.getElementById('gameOverMenuButton').addEventListener('click', () => {
    gameState = 'main-menu';
    showMenu('main-menu');
});

document.querySelectorAll('.setting-btn').forEach(btn => {
    btn.addEventListener('click', () => {
        const { group, value } = btn.dataset;
        if (group === 'difficulty') settings.difficulty    = value;
        if (group === 'score')      settings.winningScore  = parseInt(value);
        if (group === 'sound')      settings.soundEnabled  = value === 'on';
        document.querySelectorAll(`.setting-btn[data-group="${group}"]`)
            .forEach(b => b.classList.remove('active'));
        btn.classList.add('active');
    });
});

// Keyboard
window.addEventListener('keydown', e => {
    if (['ArrowUp','ArrowDown','KeyW','KeyS','Space'].includes(e.code)) e.preventDefault();
    keysPressed[e.code] = true;

    if (e.code === 'KeyP' || e.code === 'Escape') {
        if      (gameState === 'play')  { gameState = 'pause'; showMenu('pause-menu'); }
        else if (gameState === 'pause') { gameState = 'play';  showMenu(null); }
    }
});
window.addEventListener('keyup', e => { keysPressed[e.code] = false; });

// ─────────────────────────────────────────────────
// Touch — paddle tracks ABOVE the thumb to stay visible
// ─────────────────────────────────────────────────
function handleTouch(e) {
    e.preventDefault();
    if (gameState !== 'play' && gameState !== 'countdown') return;
    const rect   = canvas.getBoundingClientRect();
    const scaleX = CW / rect.width;
    const scaleY = CH / rect.height;
    for (let i = 0; i < e.touches.length; i++) {
        const t  = e.touches[i];
        const tx = (t.clientX - rect.left) * scaleX;
        // Apply thumb offset: paddle centre is THUMB_OFFSET px above finger
        const ty = (t.clientY - rect.top)  * scaleY - THUMB_OFFSET;
        if (settings.gameMode === '1P') {
            P1.moveTo(ty);
        } else {
            if (tx < CW / 2) P1.moveTo(ty);
            else             P2.moveTo(ty);
        }
    }
}
canvas.addEventListener('touchstart', handleTouch, { passive: false });
canvas.addEventListener('touchmove',  handleTouch, { passive: false });

// Reset timing on tab-switch
document.addEventListener('visibilitychange', () => {
    if (document.hidden) { lastTime = 0; accumulator = 0; }
});

// ─────────────────────────────────────────────────
// Boot
// ─────────────────────────────────────────────────
requestAnimationFrame(gameLoop);
</script>
</body>
