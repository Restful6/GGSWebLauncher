<style>
*, *::before, *::after { margin:0; padding:0; box-sizing:border-box; }

body {
    background: #1a2e1a;
    color: #f0e8c8;
    font-family: 'Orbitron', sans-serif;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    min-height: 100vh;
    overflow: hidden;
    user-select: none;
    -webkit-user-select: none;
    /* Subtle dot texture on body bg */
    background-image: radial-gradient(circle, #243824 1px, transparent 1px);
    background-size: 20px 20px;
}

#game-container {
    position: relative;

    aspect-ratio: 4 / 3;
}

canvas {
    display: block;
    width: 100%;
    height: 100%;
    border-radius: 6px;
    border: 4px solid #3a2800;
    cursor: crosshair;
    /* Arcade cabinet bezel feel */
    box-shadow:
        0 0 0 2px #7a5a10,
        0 0 0 6px #3a2800,
        0 12px 48px rgba(0,0,0,0.75),
        inset 0 0 0 1px #5a4000;
}

/* ===== OVERLAYS ===== */
.overlay {
    position: absolute;
    inset: 0;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    gap: 14px;
    background: rgba(8, 18, 8, 0.96);
    border-radius: 4px;

    /* Scanline overlay effect */
    background-image:
        repeating-linear-gradient(
            0deg,
            transparent,
            transparent 3px,
            rgba(0,0,0,0.08) 3px,
            rgba(0,0,0,0.08) 4px

}
.overlay.hidden { display: none; }

.overlay h1 {

.btn {

/* Scorecard */
.scorecard {

/* ===== HUD ===== */
#hud {
    position: absolute;

}

}

/* Skip button */
#skip-btn {
    position: absolute;
    bottom: 10px;
    right: 11px;
    display: none;
    z-index: 6;

    font-family: 'Press Start 2P', monospace;

    transition: transform 0.08s, border-bottom-width 0.08s;
}
#skip-btn:hover { background: #400a0a; color: #ff8080; }
#skip-btn:active { transform: translateY(2px); border-bottom-width: 2px; }

/* Power bar */
#pbar {
    position: absolute;
    bottom: 13px;
    left: 50%;
    transform: translateX(-50%);

    pointer-events: none;
    opacity: 0;
    transition: opacity 0.12s;
    z-index: 5;
}
#pbar.show { opacity: 1; }
#pbar-label {
    font-family: 'Press Start 2P', monospace;

}
#pbar-track {

}
#pbar-fill {
    height: 100%;
    width: 0%;

}

/* Toast */
#toast {

    padding: 11px 20px;
    border-radius: 3px;
    pointer-events: none;
    opacity: 0;
    transition: opacity 0.25s;
    z-index: 9;
    white-space: nowrap;
    border: 3px solid currentColor;
    box-shadow: 4px 4px 0 rgba(0,0,0,0.6);
    background: rgba(8,14,8,0.95) !important;
    text-shadow: 2px 2px 0 rgba(0,0,0,0.7);
}
#toast.show { opacity: 1; }

footer {
    margin-top: 9px;
    font-family: 'Press Start 2P', monospace;
    font-size: 0.42em;
    color: #2e4a2e;
    letter-spacing: 2px;
}
</style>

<script>
// ============================================================
//  SETUP
// ============================================================
const canvas = document.getElementById('game-canvas');
const ctx    = canvas.getContext('2d', { alpha: false });
canvas.width  = 800;
canvas.height = 600;
const W = 800, H = 600;

// DOM refs
const HUD      = document.getElementById('hud');
const skipBtn  = document.getElementById('skip-btn');
const pbar     = document.getElementById('pbar');
const pbarFill = document.getElementById('pbar-fill');
const toastEl  = document.getElementById('toast');
const mStart   = document.getElementById('m-start');
const mLC      = document.getElementById('m-lc');
const mGO      = document.getElementById('m-go');

document.getElementById('btn-start').onclick   = startGame;
document.getElementById('btn-next').onclick    = goNextHole;
document.getElementById('btn-restart').onclick = restartGame;
skipBtn.onclick = skipHole;

// ============================================================
//  CONSTANTS
// ============================================================
const FRICTION    = 0.984;
const SAND_FRIC   = 0.905;
const MAX_POWER   = 14;
const MIN_VEL     = 0.08;
const TOTAL_HOLES = 9;
const MAX_DRAG    = 155;
const AIM_R       = 75;

const PARS      = [2, 2, 3, 3, 3, 4, 3, 4, 4];
const TOTAL_PAR = 28;

// ============================================================
//  STATE
// ============================================================
let gameState = 'menu';
let rafId     = null;

let ball = { x:100, y:300, radius:10, vx:0, vy:0, teleCD:0, boostCD:0 };
let hole = { x:700, y:300, radius:14 };
let obstacles  = [];
let particles  = [];

let currentHole  = 0;
let strokes      = 0;
let totalStrokes = 0;
let holeScores   = [];

let isAiming   = false;
let aimCur     = { x:0, y:0 };

let sinkTimer    = 0;
const SINK_DUR   = 48;

let autoComplete  = false;
let holeCardTimer = 0;
let animT         = 0;

let feltPattern  = null;
let sandPattern  = null;
let woodPattern  = null;

// ============================================================
//  HELPERS
// ============================================================
function dst(x1,y1,x2,y2) { const dx=x2-x1,dy=y2-y1; return Math.sqrt(dx*dx+dy*dy); }
function d2(x1,y1,x2,y2)  { const dx=x2-x1,dy=y2-y1; return dx*dx+dy*dy; }
function clamp(v,lo,hi)    { return v<lo?lo:v>hi?hi:v; }
function rnd(lo,hi)        { return Math.floor(Math.random()*(hi-lo+1))+lo; }
function inRect(x,y,r)     { return x>=r.x&&x<=r.x+r.width&&y>=r.y&&y<=r.y+r.height; }

function rRect(x,y,w,h,r) {
    const R = Math.min(r, w/2, h/2);
    ctx.beginPath();
    ctx.moveTo(x+R,y);
    ctx.lineTo(x+w-R,y); ctx.quadraticCurveTo(x+w,y,x+w,y+R);
    ctx.lineTo(x+w,y+h-R); ctx.quadraticCurveTo(x+w,y+h,x+w-R,y+h);
    ctx.lineTo(x+R,y+h); ctx.quadraticCurveTo(x,y+h,x,y+h-R);
    ctx.lineTo(x,y+R); ctx.quadraticCurveTo(x,y,x+R,y);
    ctx.closePath();
}

// ============================================================
//  RATINGS
// ============================================================
function strokeRating(s, par) {
    const d = s - par;
    if (s === 1)  return { label:'HOLE IN ONE!', color:'#e060ff', bg:'rgba(40,10,70,0.95)' };
    if (d <= -2)  return { label:'EAGLE!',        color:'#40d870', bg:'rgba(8,40,20,0.95)'  };
    if (d === -1) return { label:'BIRDIE!',        color:'#80e840', bg:'rgba(12,32,8,0.95)'  };
    if (d ===  0) return { label:'PAR',            color:'#f5d020', bg:'rgba(30,20,0,0.95)'  };
    if (d ===  1) return { label:'BOGEY',          color:'#f08020', bg:'rgba(32,16,0,0.95)'  };
    if (d ===  2) return { label:'DBL BOGEY',      color:'#e04040', bg:'rgba(30,8,8,0.95)'   };
    return              { label:`+${d}`,           color:'#c03030', bg:'rgba(24,4,4,0.95)'   };
}

function finalRating(total) {
    const d = total - TOTAL_PAR;
    if (d <= -6) return { label:'LEGENDARY!',     color:'#e060ff' };
    if (d <= -3) return { label:'EXCELLENT!',      color:'#40d870' };
    if (d <=  1) return { label:'SOLID ROUND',     color:'#f5d020' };
    if (d <=  6) return { label:'AVERAGE',         color:'#f08020' };
    return              { label:'KEEP PRACTISING', color:'#e04040' };
}

// ============================================================
//  LEVEL GENERATION
// ============================================================
function getBBox(obj, pad=0) {
    if (obj.radius !== undefined)
        return { x:obj.x-obj.radius-pad, y:obj.y-obj.radius-pad, w:(obj.radius+pad)*2, h:(obj.radius+pad)*2 };
    return { x:obj.x-pad, y:obj.y-pad, w:obj.width+pad*2, h:obj.height+pad*2 };
}
function overlapsBB(a, b, pad=22) {
    const ba=getBBox(a,pad), bb=getBBox(b);
    return ba.x < bb.x+bb.w && ba.x+ba.w > bb.x && ba.y < bb.y+bb.h && ba.y+ba.h > bb.y;
}
function overlapAny(obj, list) { return list.some(o => overlapsBB(obj,o)); }

function generateLevel(idx) {
    const lvl = { obstacles:[] };
    const placed = [];

    const bx = rnd(55,155), by = rnd(80,H-80);
    lvl.ballStart = { x:bx, y:by, radius:10 };
    placed.push(lvl.ballStart);

    let hx, hy, att=0;
    do {
        hx = rnd(W-155, W-60);
        hy = rnd(80, H-80);
        att++;
    } while (dst(bx,by,hx,hy) < 280 && att < 40);
    lvl.hole = { x:hx, y:hy, radius:14 };
    placed.push(lvl.hole);

    const base  = 4 + Math.floor(idx * 0.85);
    const count = rnd(base, base+4);
    const TRIES = 65;

    for (let i=0; i<count; i++) {
        let added = false;
        for (let a=0; a<TRIES && !added; a++) {
            const roll = Math.random();
            const ox = rnd(80,W-80), oy = rnd(80,H-80);
            let obs;

            if (roll < 0.28) {
                let w=rnd(14,35), h=rnd(72,148);
                if (Math.random()>0.5) [w,h]=[h,w];
                obs = { type:'rect', x:ox-w/2, y:oy-h/2, width:w, height:h };
            } else if (roll < 0.48) {
                obs = { type:'circle', x:ox, y:oy, radius:rnd(16,28) };
            } else if (roll < 0.67) {
                const sw=rnd(55,108), sh=rnd(45,95);
                obs = { type:'sand', x:ox-sw/2, y:oy-sh/2, width:sw, height:sh };
            } else if (roll < 0.84) {
                const ang = Math.atan2(hy-oy, hx-ox) + (Math.random()-0.5)*0.9;
                obs = { type:'boost', x:ox-26, y:oy-13, width:52, height:26, angle:ang };
            } else {
                obs = { type:'portal', x:ox, y:oy, radius:14, teleCD:0, link:null };
            }

            if (!overlapAny(obs, placed)) {
                if (obs.type === 'portal') {
                    let p2 = null;
                    for (let p=0; p<55 && !p2; p++) {
                        const x2=rnd(80,W-80), y2=rnd(80,H-80);
                        if (d2(ox,oy,x2,y2) < 200*200) continue;
                        const cand = { type:'portal', x:x2, y:y2, radius:14, teleCD:0, link:obs };
                        if (!overlapAny(cand,placed) && !overlapsBB(cand,obs)) p2=cand;
                    }
                    if (p2) {
                        obs.link = p2;
                        lvl.obstacles.push(obs, p2);
                        placed.push(obs, p2);
                        added = true;
                    }
                } else {
                    lvl.obstacles.push(obs);
                    placed.push(obs);
                    added = true;
                }
            }
        }
    }
    return lvl;
}

// ============================================================
//  PARTICLES  — chunky arcade confetti squares
// ============================================================
function spawnHoleParticles() {
    const confettiColors = ['#f5d020','#e04040','#40d870','#4090e0','#e060ff','#f08020','#ffffff'];
    for (let i=0; i<32; i++) {
        const ang = Math.random()*Math.PI*2;
        const spd = 1.5 + Math.random()*5;
        particles.push({
            x:hole.x, y:hole.y,
            vx:Math.cos(ang)*spd, vy:Math.sin(ang)*spd,
            life:1, decay:0.018+Math.random()*0.022,
            size:3+Math.random()*5,
            rot:Math.random()*Math.PI*2,
            rotSpd:(Math.random()-0.5)*0.25,
            color:confettiColors[Math.floor(Math.random()*confettiColors.length)],
            square: Math.random() > 0.4
        });
    }
}

function spawnBoostParticles(pad) {
    const cx=pad.x+pad.width/2, cy=pad.y+pad.height/2;
    for (let i=0; i<14; i++) {
        const ang = pad.angle+(Math.random()-0.5)*0.75;
        const spd = 2+Math.random()*5;
        particles.push({
            x:cx, y:cy, vx:Math.cos(ang)*spd, vy:Math.sin(ang)*spd,
            life:1, decay:0.05+Math.random()*0.04,
            size:2+Math.random()*3, rot:0, rotSpd:0,
            color:'#f5d020', square:true
        });
    }
}

function updateParticles() {
    for (let i=particles.length-1; i>=0; i--) {
        const p=particles[i];
        p.x+=p.vx; p.y+=p.vy;
        p.vx*=0.92; p.vy*=0.92;
        p.vy+=0.08; // gravity
        p.rot+=p.rotSpd;
        p.life-=p.decay;
        if (p.life<=0) particles.splice(i,1);
    }
}

function drawParticles() {
    for (const p of particles) {
        ctx.globalAlpha = p.life * 0.9;
        ctx.fillStyle = p.color;
        ctx.save();
        ctx.translate(p.x, p.y);
        ctx.rotate(p.rot);
        const s = p.size * Math.max(0.1, p.life);
        if (p.square) {
            ctx.fillRect(-s/2, -s/2, s, s);
        } else {
            ctx.beginPath();
            ctx.arc(0, 0, s/2, 0, Math.PI*2);
            ctx.fill();
        }
        ctx.restore();
    }
    ctx.globalAlpha = 1;
}

// ============================================================
//  COLLISION DETECTION
// ============================================================
function checkCollisions() {
    if (ball.x - ball.radius < 0)  { ball.x = ball.radius;     ball.vx =  Math.abs(ball.vx); }
    if (ball.x + ball.radius > W)  { ball.x = W-ball.radius;   ball.vx = -Math.abs(ball.vx); }
    if (ball.y - ball.radius < 0)  { ball.y = ball.radius;     ball.vy =  Math.abs(ball.vy); }
    if (ball.y + ball.radius > H)  { ball.y = H-ball.radius;   ball.vy = -Math.abs(ball.vy); }

    for (const obs of obstacles) {
        switch (obs.type) {
            case 'rect': {
                const cx = clamp(ball.x, obs.x, obs.x+obs.width);
                const cy = clamp(ball.y, obs.y, obs.y+obs.height);
                const dx = ball.x-cx, dy = ball.y-cy;
                const d2v = dx*dx+dy*dy;
                if (d2v > 0 && d2v < ball.radius*ball.radius) {
                    const d = Math.sqrt(d2v);
                    const nx=dx/d, ny=dy/d;
                    ball.x = cx + nx*ball.radius;
                    ball.y = cy + ny*ball.radius;
                    const dot = ball.vx*nx + ball.vy*ny;
                    if (dot < 0) { ball.vx -= 2*dot*nx; ball.vy -= 2*dot*ny; }
                }
                break;
            }
            case 'circle': {
                const dx = ball.x-obs.x, dy = ball.y-obs.y;
                const d2v = dx*dx+dy*dy;
                const minD = ball.radius+obs.radius;
                if (d2v > 0 && d2v < minD*minD) {
                    const d = Math.sqrt(d2v);
                    const nx=dx/d, ny=dy/d;
                    ball.x = obs.x + nx*minD;
                    ball.y = obs.y + ny*minD;
                    const dot = ball.vx*nx + ball.vy*ny;
                    if (dot < 0) { ball.vx -= 2*dot*nx*1.05; ball.vy -= 2*dot*ny*1.05; }
                }
                break;
            }
            case 'boost': {
                if (ball.boostCD === 0 && inRect(ball.x,ball.y,obs)) {
                    const spd = Math.sqrt(ball.vx*ball.vx + ball.vy*ball.vy);
                    const newSpd = Math.max(spd*1.65, MAX_POWER*0.72);
                    ball.vx = Math.cos(obs.angle)*newSpd;
                    ball.vy = Math.sin(obs.angle)*newSpd;
                    ball.boostCD = 52;
                    spawnBoostParticles(obs);
                }
                break;
            }
            case 'portal': {
                if (ball.teleCD === 0 && obs.teleCD === 0 && obs.link) {
                    if (d2(ball.x,ball.y,obs.x,obs.y) < (ball.radius+obs.radius)**2) {
                        ball.x = obs.link.x;
                        ball.y = obs.link.y;
                        ball.teleCD  = 90;
                        obs.teleCD   = 90;
                        obs.link.teleCD = 90;
                    }
                }
                break;
            }
        }
    }
}

// ============================================================
//  UPDATE
// ============================================================
function update() {
    animT += 0.05;
    updateParticles();

    if (gameState === 'sinking') {
        sinkTimer++;
        const t = sinkTimer / SINK_DUR;
        ball.radius = Math.max(0, 10*(1-t));
        ball.x += (hole.x-ball.x)*0.13;
        ball.y += (hole.y-ball.y)*0.13;
        if (sinkTimer >= SINK_DUR) showLevelComplete();
        return;
    }

    if (gameState !== 'playing') return;

    if (ball.teleCD  > 0) ball.teleCD--;
    if (ball.boostCD > 0) ball.boostCD--;
    for (const obs of obstacles)
        if (obs.type==='portal' && obs.teleCD>0) obs.teleCD--;

    if (ball.vx === 0 && ball.vy === 0) return;

    let fric = FRICTION;
    for (const obs of obstacles)
        if (obs.type==='sand' && inRect(ball.x,ball.y,obs)) { fric=SAND_FRIC; break; }

    ball.vx *= fric;
    ball.vy *= fric;

    ball.x += ball.vx;
    ball.y += ball.vy;
    checkCollisions();

    if (Math.abs(ball.vx) < MIN_VEL && Math.abs(ball.vy) < MIN_VEL) {
        ball.vx = ball.vy = 0;
        ball.teleCD = ball.boostCD = 0;
        if (autoComplete) { triggerHoleComplete(); return; }
    }

    if (d2(ball.x,ball.y,hole.x,hole.y) < (hole.radius + ball.radius*0.55)**2) {
        ball.vx = ball.vy = 0;
        triggerHoleComplete();
    }
}

function triggerHoleComplete() {
    if (gameState !== 'playing') return;
    gameState    = 'sinking';
    sinkTimer    = 0;
    totalStrokes += strokes;
    holeScores.push(strokes);
    spawnHoleParticles();
    skipBtn.style.display = 'none';
    autoComplete = false;
}

// ============================================================
//  TEXTURE PATTERNS
// ============================================================
function buildPatterns() {
    // Felt green — tight woven texture
    const fc = document.createElement('canvas');
    fc.width = 8; fc.height = 8;
    const fx = fc.getContext('2d');
    fx.fillStyle = '#1e5c2a';
    fx.fillRect(0,0,8,8);
    fx.fillStyle = '#1a5226';
    fx.fillRect(0,0,4,4);
    fx.fillRect(4,4,4,4);
    fx.fillStyle = '#22622e';
    fx.fillRect(1,1,2,2);
    fx.fillRect(5,5,2,2);
    feltPattern = ctx.createPattern(fc,'repeat');

    // Sand — warm grainy dots
    const sc = document.createElement('canvas');
    sc.width = 10; sc.height = 10;
    const sx = sc.getContext('2d');
    sx.fillStyle = '#c8a850';
    sx.fillRect(0,0,10,10);
    const dots = [[1,2],[5,7],[8,1],[3,8],[7,4],[2,5],[9,9],[4,3],[6,6],[0,7]];
    dots.forEach(([dx,dy]) => {
        sx.fillStyle = `rgba(${rnd(100,150)},${rnd(80,110)},${rnd(20,50)},0.45)`;
        sx.fillRect(dx,dy,2,2);
    });
    sandPattern = ctx.createPattern(sc,'repeat');

    // Wood — for walls
    const wc = document.createElement('canvas');
    wc.width = 12; wc.height = 12;
    const wx = wc.getContext('2d');
    wx.fillStyle = '#5c3510';
    wx.fillRect(0,0,12,12);
    wx.fillStyle = '#4e2c0c';
    wx.fillRect(0,3,12,1);
    wx.fillRect(0,7,12,1);
    wx.fillRect(0,11,12,1);
    wx.fillStyle = '#6a4018';
    wx.fillRect(2,0,1,12);
    wx.fillRect(8,0,1,12);
    woodPattern = ctx.createPattern(wc,'repeat');
}

// ============================================================
//  DRAW
// ============================================================
function draw() {
    // Felt green background
    ctx.fillStyle = feltPattern || '#1e5c2a';
    ctx.fillRect(0,0,W,H);

    // Course border stripe
    ctx.strokeStyle = '#175220';
    ctx.lineWidth = 12;
    ctx.strokeRect(6,6,W-12,H-12);
    ctx.strokeStyle = '#22622e';
    ctx.lineWidth = 3;
    ctx.strokeRect(12,12,W-24,H-24);

    // Sand (floor layer first)
    for (const obs of obstacles) if (obs.type==='sand') drawObs(obs);

    // Hole
    drawHole();

    // Direction arrow while ball rolls
    if (ball.vx !== 0 || ball.vy !== 0) drawArrow();

    // Other obstacles
    for (const obs of obstacles) if (obs.type!=='sand') drawObs(obs);

    // Particles
    drawParticles();

    // Ball
    drawBall();

    // Aim guide
    if (isAiming) drawAim();

    // Hole intro card
    if (holeCardTimer > 0) drawHoleCard();
}

function drawHole() {
    const r = hole.radius;

    // Green ring around hole when ball is near
    if (gameState === 'playing') {
        const ballD2 = d2(ball.x,ball.y,hole.x,hole.y);
        if (ballD2 < 120*120) {
            const intensity = 1 - Math.sqrt(ballD2)/120;
            const pulse = 0.5 + 0.5*Math.sin(animT*1.1);
            ctx.strokeStyle = `rgba(245,208,32,${(0.2+intensity*0.5)*pulse})`;
            ctx.lineWidth = 3;
            ctx.beginPath();
            ctx.arc(hole.x, hole.y, r*(1.4+0.15*pulse), 0, Math.PI*2);
            ctx.stroke();
        }
    }

    // Shadow under hole
    ctx.fillStyle = 'rgba(0,0,0,0.4)';
    ctx.beginPath(); ctx.ellipse(hole.x+3,hole.y+4,r*1.1,r*0.7,0,0,Math.PI*2); ctx.fill();

    // Dark pit
    ctx.fillStyle = '#050e05';
    ctx.beginPath(); ctx.arc(hole.x,hole.y,r,0,Math.PI*2); ctx.fill();

    // Chunky white rim
    ctx.strokeStyle = '#ffffff';
    ctx.lineWidth = 3;
    ctx.beginPath(); ctx.arc(hole.x,hole.y,r,0,Math.PI*2); ctx.stroke();
    ctx.strokeStyle = '#a0a080';
    ctx.lineWidth = 1;
    ctx.beginPath(); ctx.arc(hole.x,hole.y,r+3,0,Math.PI*2); ctx.stroke();

    // Flagpole
    ctx.strokeStyle = '#888870';
    ctx.lineWidth = 2;
    ctx.beginPath();
    ctx.moveTo(hole.x+1, hole.y - r*0.15);
    ctx.lineTo(hole.x+1, hole.y - r*1.9);
    ctx.stroke();

    // Flag (red with white dot)
    ctx.fillStyle = '#dd2020';
    ctx.strokeStyle = '#881010';
    ctx.lineWidth = 1;
    ctx.beginPath();
    ctx.moveTo(hole.x+1,       hole.y - r*1.9);
    ctx.lineTo(hole.x + r*1.1, hole.y - r*1.55);
    ctx.lineTo(hole.x+1,       hole.y - r*1.2);
    ctx.closePath();
    ctx.fill();
    ctx.stroke();
    // White dot on flag
    ctx.fillStyle = 'rgba(255,255,255,0.7)';
    ctx.beginPath();
    ctx.arc(hole.x + r*0.45, hole.y - r*1.55, 2, 0, Math.PI*2);
    ctx.fill();
}

function drawArrow() {
    const dx=hole.x-ball.x, dy=hole.y-ball.y;
    if (dx*dx+dy*dy < 100*100) return;
    const ang = Math.atan2(dy,dx);
    const ax = ball.x + Math.cos(ang)*30;
    const ay = ball.y + Math.sin(ang)*30;
    ctx.save();
    ctx.translate(ax,ay); ctx.rotate(ang);
    ctx.fillStyle = 'rgba(245,208,32,0.55)';
    ctx.strokeStyle = 'rgba(100,80,0,0.4)';
    ctx.lineWidth = 1;
    ctx.beginPath();
    ctx.moveTo(9,0); ctx.lineTo(-6,-5); ctx.lineTo(-6,5);
    ctx.closePath(); ctx.fill(); ctx.stroke();
    ctx.restore();
}

function drawBall() {
    if (ball.radius < 0.5) return;
    const r = ball.radius;

    // Rolling motion blur trail when fast
    const spd = Math.sqrt(ball.vx*ball.vx + ball.vy*ball.vy);
    if (spd > 3) {
        for (let i=1; i<=3; i++) {
            const tr = r * (1 - i*0.2);
            const tx = ball.x - ball.vx*i*0.55;
            const ty = ball.y - ball.vy*i*0.55;
            ctx.globalAlpha = 0.12 * (4-i) / 3;
            ctx.fillStyle = '#c8e8f0';
            ctx.beginPath(); ctx.arc(tx,ty,tr,0,Math.PI*2); ctx.fill();
        }
        ctx.globalAlpha = 1;
    }

    // Drop shadow
    ctx.fillStyle = 'rgba(0,0,0,0.30)';
    ctx.beginPath();
    ctx.ellipse(ball.x+3, ball.y+5, r*0.85, r*0.5, 0, 0, Math.PI*2);
    ctx.fill();

    // Main ball — white/cream golf ball
    const g = ctx.createRadialGradient(ball.x-r*0.38,ball.y-r*0.4,r*0.05, ball.x+r*0.1,ball.y+r*0.1,r);
    g.addColorStop(0,   '#ffffff');
    g.addColorStop(0.45,'#e8f4f8');
    g.addColorStop(1,   '#a0c8d8');
    ctx.fillStyle = g;
    ctx.beginPath(); ctx.arc(ball.x,ball.y,r,0,Math.PI*2); ctx.fill();

    // Dimple dots suggestion
    if (r >= 7) {
        ctx.fillStyle = 'rgba(140,185,200,0.45)';
        const dimples = [[-r*0.3,-r*0.25],[r*0.3,-r*0.2],[-r*0.1,r*0.3],[r*0.25,r*0.2],[-r*0.35,r*0.1]];
        dimples.forEach(([dx,dy]) => {
            ctx.beginPath();
            ctx.arc(ball.x+dx, ball.y+dy, r*0.12, 0, Math.PI*2);
            ctx.fill();
        });
    }

    // Hard outline
    ctx.strokeStyle = 'rgba(80,140,160,0.5)';
    ctx.lineWidth = 1;
    ctx.beginPath(); ctx.arc(ball.x,ball.y,r,0,Math.PI*2); ctx.stroke();
}

function drawObs(obs) {
    ctx.save();
    ctx.textAlign = 'center';
    ctx.textBaseline = 'middle';

    switch (obs.type) {
        case 'rect': {
            // Wood-textured wall
            ctx.fillStyle = woodPattern || '#5c3510';
            rRect(obs.x,obs.y,obs.width,obs.height,3);
            ctx.fill();

            // Top-left highlight
            ctx.fillStyle = 'rgba(255,220,140,0.12)';
            rRect(obs.x,obs.y,obs.width,obs.height,3);
            ctx.fill();

            // Dark outline + inner bevel
            ctx.strokeStyle = '#2e1608';
            ctx.lineWidth = 2.5;
            rRect(obs.x,obs.y,obs.width,obs.height,3);
            ctx.stroke();

            ctx.strokeStyle = 'rgba(255,200,100,0.18)';
            ctx.lineWidth = 1;
            rRect(obs.x+2.5,obs.y+2.5,obs.width-5,obs.height-5,2);
            ctx.stroke();
            break;
        }
        case 'sand': {
            // Sandy fill
            ctx.fillStyle = sandPattern || '#c8a850';
            rRect(obs.x,obs.y,obs.width,obs.height,5);
            ctx.fill();

            // Wavy edge suggestion
            ctx.strokeStyle = '#a88838';
            ctx.lineWidth = 2;
            rRect(obs.x,obs.y,obs.width,obs.height,5);
            ctx.stroke();

            // Label
            ctx.fillStyle = 'rgba(80,55,0,0.55)';
            ctx.font = `bold 7px 'Orbitron', sans-serif`;
            ctx.fillText('SAND', obs.x+obs.width/2, obs.y+obs.height/2);
            break;
        }
        case 'circle': {
            // Rubber bumper — red/orange like a pinball bumper
            const bumpG = ctx.createRadialGradient(obs.x-obs.radius*0.3, obs.y-obs.radius*0.35, 2, obs.x,obs.y,obs.radius);
            bumpG.addColorStop(0, '#ff6040');
            bumpG.addColorStop(0.6,'#cc2810');
            bumpG.addColorStop(1, '#6a1008');
            ctx.fillStyle = bumpG;
            ctx.beginPath(); ctx.arc(obs.x,obs.y,obs.radius,0,Math.PI*2); ctx.fill();

            // Hard border
            ctx.strokeStyle = '#3a0808';
            ctx.lineWidth = 2.5;
            ctx.beginPath(); ctx.arc(obs.x,obs.y,obs.radius,0,Math.PI*2); ctx.stroke();

            // Inner ring (arcade bumper ring)
            ctx.strokeStyle = 'rgba(255,200,50,0.55)';
            ctx.lineWidth = 1.5;
            ctx.beginPath(); ctx.arc(obs.x,obs.y,obs.radius*0.65,0,Math.PI*2); ctx.stroke();

            // B label
            ctx.fillStyle = 'rgba(255,230,100,0.75)';
            ctx.font = `bold ${Math.round(obs.radius*0.72)}px 'Orbitron', sans-serif`;
            ctx.fillText('B', obs.x, obs.y);
            break;
        }
        case 'boost': {
            ctx.translate(obs.x+obs.width/2, obs.y+obs.height/2);
            ctx.rotate(obs.angle);

            // Pad body — dark with yellow chevrons
            ctx.fillStyle = '#1e1800';
            ctx.strokeStyle = '#c8a800';
            ctx.lineWidth = 2;
            rRect(-obs.width/2,-obs.height/2,obs.width,obs.height,4);
            ctx.fill();
            rRect(-obs.width/2,-obs.height/2,obs.width,obs.height,4);
            ctx.stroke();

            // Double chevron arrows
            const hw = obs.width*0.38, hh = obs.height*0.35;
            [-hw*0.3, hw*0.2].forEach(offX => {
                ctx.fillStyle = offX < 0 ? 'rgba(220,175,0,0.55)' : '#f5d020';
                ctx.beginPath();
                ctx.moveTo(offX+hw*0.45, 0);
                ctx.lineTo(offX-hw*0.15, -hh);
                ctx.lineTo(offX+hw*0.05, 0);
                ctx.lineTo(offX-hw*0.15, hh);
                ctx.closePath(); ctx.fill();
            });
            break;
        }
        case 'portal': {
            const onCD   = obs.teleCD > 0;
            const pulse  = 0.72 + 0.28*Math.sin(animT*(onCD ? 0.25 : 0.9));
            const col    = onCD ? [100,100,100] : [100,180,255];

            // Outer ring
            ctx.strokeStyle = `rgba(${col[0]},${col[1]},${col[2]},${(0.7)*pulse})`;
            ctx.lineWidth = 3;
            ctx.beginPath();
            ctx.arc(obs.x,obs.y, obs.radius*(0.9+0.15*pulse), 0, Math.PI*2);
            ctx.stroke();

            // Spinning ring segments
            if (!onCD) {
                for (let i=0; i<4; i++) {
                    const offset = animT*0.7 + i*(Math.PI/2);
                    ctx.strokeStyle = `rgba(160,220,255,0.4)`;
                    ctx.lineWidth = 2;
                    ctx.beginPath();
                    ctx.arc(obs.x,obs.y, obs.radius*0.55, offset, offset+Math.PI*0.5);
                    ctx.stroke();
                }
            }

            // Core fill — blue portal glow
            const g = ctx.createRadialGradient(obs.x,obs.y,0, obs.x,obs.y,obs.radius*0.8);
            g.addColorStop(0, onCD ? 'rgba(60,60,70,0.9)' : 'rgba(80,160,255,0.85)');
            g.addColorStop(1, 'rgba(0,0,0,0.7)');
            ctx.fillStyle = g;
            ctx.beginPath(); ctx.arc(obs.x,obs.y,obs.radius*0.78,0,Math.PI*2); ctx.fill();

            // P label
            ctx.fillStyle = onCD ? 'rgba(150,150,160,0.6)' : 'rgba(200,235,255,0.8)';
            ctx.font = `bold ${Math.round(obs.radius*0.65)}px 'Orbitron', sans-serif`;
            ctx.fillText('P', obs.x, obs.y);
            break;
        }
    }
    ctx.restore();
}

function drawAim() {
    const dx = aimCur.x - ball.x, dy = aimCur.y - ball.y;
    const dragDSq = dx*dx+dy*dy;
    const dragD   = Math.min(Math.sqrt(dragDSq), MAX_DRAG);
    const power   = dragD / MAX_DRAG;

    const shotAng = Math.atan2(dy,dx) + Math.PI;
    const lineLen = 65 + power*110;

    // Dashed aim line — white/yellow
    ctx.save();
    ctx.translate(ball.x, ball.y);
    ctx.rotate(shotAng);
    ctx.strokeStyle = power > 0.65 ? `rgba(240,80,80,0.7)` : `rgba(245,208,32,0.65)`;
    ctx.lineWidth = 2;
    ctx.setLineDash([7,5]);
    ctx.beginPath();
    ctx.moveTo(ball.radius+5, 0);
    ctx.lineTo(lineLen, 0);
    ctx.stroke();
    ctx.setLineDash([]);

    // Arrowhead at end
    ctx.fillStyle = power > 0.65 ? 'rgba(240,80,80,0.8)' : 'rgba(245,208,32,0.8)';
    ctx.beginPath();
    ctx.moveTo(lineLen+8, 0);
    ctx.lineTo(lineLen-2, -5);
    ctx.lineTo(lineLen-2, 5);
    ctx.closePath(); ctx.fill();
    ctx.restore();

    // Square dots along aim line (arcade feel)
    const dots = Math.ceil(power*6);
    for (let i=1; i<=dots; i++) {
        const t  = i / (dots+1);
        const px = ball.x + Math.cos(shotAng)*(lineLen*t + ball.radius+5);
        const py = ball.y + Math.sin(shotAng)*(lineLen*t + ball.radius+5);
        ctx.fillStyle = `rgba(245,208,32,${0.9-t*0.5})`;
        ctx.fillRect(px-2, py-2, 4, 4);
    }

    // Power bar fill
    pbarFill.style.width   = `${power*100}%`;
    pbarFill.style.background = power>0.72 ? '#e04040' : power>0.42 ? '#f08020' : '#40c870';
}

function drawHoleCard() {
    holeCardTimer--;
    const alpha = holeCardTimer > 20 ? 1 : holeCardTimer/20;
    ctx.save();
    ctx.globalAlpha = alpha;

    // Card background
    ctx.fillStyle = 'rgba(6,14,6,0.85)';
    ctx.fillRect(0, H/2-62, W, 124);

    // Yellow top border
    ctx.fillStyle = '#f5d020';
    ctx.fillRect(0, H/2-62, W, 4);
    ctx.fillRect(0, H/2+58, W, 4);

    // Hole number — arcade font
    ctx.fillStyle = '#f5d020';
    ctx.font = 'bold 28px "Press Start 2P", monospace';
    ctx.textAlign = 'center';
    ctx.textBaseline = 'middle';
    ctx.shadowColor = '#8a7000';
    ctx.shadowOffsetX = 3; ctx.shadowOffsetY = 3; ctx.shadowBlur = 0;
    ctx.fillText(`HOLE ${currentHole+1}`, W/2, H/2-16);

    ctx.shadowColor = 'transparent';
    ctx.font = '13px "Press Start 2P", monospace';
    ctx.fillStyle = '#9aaa88';
    ctx.fillText(`PAR ${PARS[currentHole]}`, W/2, H/2+18);
    ctx.restore();
}

// ============================================================
//  INPUT
// ============================================================
function getPos(e) {
    const rect=canvas.getBoundingClientRect();
    const sx=W/rect.width, sy=H/rect.height;
    const src=e.touches ? e.touches[0] : e;
    return { x:(src.clientX-rect.left)*sx, y:(src.clientY-rect.top)*sy };
}
function getPosEnd(e) {
    const rect=canvas.getBoundingClientRect();
    const sx=W/rect.width, sy=H/rect.height;
    const src=e.changedTouches ? e.changedTouches[0] : e;
    return { x:(src.clientX-rect.left)*sx, y:(src.clientY-rect.top)*sy };
}

canvas.addEventListener('mousedown',  onDown);
canvas.addEventListener('touchstart', onDown, { passive:false });
canvas.addEventListener('mousemove',  onMove);
canvas.addEventListener('touchmove',  onMove, { passive:false });
canvas.addEventListener('mouseup',    onUp);
canvas.addEventListener('touchend',   onUp,   { passive:false });
canvas.addEventListener('mouseleave', () => {
    if (isAiming) { isAiming=false; pbar.classList.remove('show'); pbarFill.style.width='0%'; }
});

function onDown(e) {
    e.preventDefault();
    if (gameState !== 'playing') return;
    if (ball.vx !== 0 || ball.vy !== 0) return;
    const pos = getPos(e);
    if (d2(pos.x,pos.y,ball.x,ball.y) <= AIM_R*AIM_R) {
        isAiming = true;
        aimCur   = { ...pos };
        pbar.classList.add('show');
    }
}
function onMove(e) {
    e.preventDefault();
    if (!isAiming) return;
    aimCur = getPos(e);
}
function onUp(e) {
    e.preventDefault();
    if (!isAiming) return;
    isAiming = false;
    pbar.classList.remove('show');
    pbarFill.style.width = '0%';
    shoot(getPosEnd(e));
}

function shoot(pos) {
    const dx=pos.x-ball.x, dy=pos.y-ball.y;
    const dSq = dx*dx+dy*dy;
    if (dSq < 25) return;

    const dragD = Math.min(Math.sqrt(dSq), MAX_DRAG);
    const power = (dragD/MAX_DRAG)*MAX_POWER;
    const ang   = Math.atan2(dy,dx)+Math.PI;

    ball.vx = Math.cos(ang)*power;
    ball.vy = Math.sin(ang)*power;
    ball.teleCD = ball.boostCD = 0;
    strokes++;
    updateHUD();

    if (strokes >= PARS[currentHole]+3) skipBtn.style.display = 'block';

    if (strokes >= PARS[currentHole]+7) {
        autoComplete = true;
        showToast('MAX STROKES!', '#e04040', 2200);
    }
}

// ============================================================
//  UI & FLOW
// ============================================================
function updateHUD() {
    document.getElementById('h-hole').textContent = `${currentHole+1}/${TOTAL_HOLES}`;
    document.getElementById('h-str').textContent  = strokes;
    document.getElementById('h-par').textContent  = PARS[currentHole];
}

let toastTmr = null;
function showToast(msg, color, duration=2000) {
    toastEl.textContent    = msg;
    toastEl.style.color    = color;
    toastEl.style.borderColor = color;
    toastEl.classList.add('show');
    clearTimeout(toastTmr);
    toastTmr = setTimeout(() => toastEl.classList.remove('show'), duration);
}

function showLevelComplete() {
    gameState = 'levelComplete';
    const par = PARS[currentHole];
    const rat = strokeRating(strokes, par);

    showToast(rat.label, rat.color, 1400);
    setTimeout(() => {
        document.getElementById('lc-title').textContent   = `HOLE ${currentHole+1} COMPLETE`;
        const rEl = document.getElementById('lc-rating');
        rEl.textContent      = rat.label;
        rEl.style.color      = rat.color;
        rEl.style.background = rat.bg;
        document.getElementById('lc-detail').textContent  = `${strokes} stroke${strokes!==1?'s':''} · Par ${par}`;
        document.getElementById('lc-total').textContent   = `Running total: ${totalStrokes} strokes`;
        mLC.classList.remove('hidden');
    }, 1500);
}

function goNextHole() {
    mLC.classList.add('hidden');
    currentHole++;
    if (currentHole >= TOTAL_HOLES) { showGameOver(); return; }
    loadHole(currentHole);
}

function skipHole() {
    if (gameState !== 'playing') return;
    skipBtn.style.display = 'none';
    ball.vx = ball.vy = 0;
    triggerHoleComplete();
}

// ── SCORE REPORTING TO APP ──
function sendScoreToApp(score, isNewRecord) {
  if (window.ReactNativeWebView) {
    window.ReactNativeWebView.postMessage(JSON.stringify({
      type: 'SEND_SCORE',
      score: score,
      game: 'Cyber Putt',
      isNewRecord: isNewRecord,
    }));
  }
}

function showGameOver() {
    gameState = 'gameOver';
    HUD.style.display     = 'none';
    skipBtn.style.display = 'none';

    const rat = finalRating(totalStrokes);
    const gameScore = Math.max(0, 100000 - totalStrokes * 1000);
    sendScoreToApp(gameScore, false);

    document.getElementById('go-score').textContent = `Total: ${totalStrokes}  ·  Par ${TOTAL_PAR}`;
    const goR = document.getElementById('go-rating');
    goR.textContent = rat.label; goR.style.color = rat.color;

    const sc = document.getElementById('go-sc');
    sc.innerHTML = '';
    const mk = (txt, cls='sc') => {
        const d=document.createElement('div');
        d.className=cls; d.textContent=txt; return d;
    };
    sc.appendChild(mk('','sc hd'));
    for (let i=1;i<=TOTAL_HOLES;i++) sc.appendChild(mk(i,'sc hd'));
    sc.appendChild(mk('Par'));
    PARS.forEach(p=>sc.appendChild(mk(p)));
    sc.appendChild(mk('You'));
    holeScores.forEach((s,i)=>{
        const diff=s-PARS[i];
        let cls='sc';
        if (s===1) cls='sc hio';
        else if (diff<0) cls='sc neg';
        else if (diff>0) cls='sc pos';
        sc.appendChild(mk(s,cls));
    });

    mGO.classList.remove('hidden');
}

function startGame() {
    mStart.classList.add('hidden');
    currentHole=0; totalStrokes=0; holeScores=[];
    HUD.style.display='flex';
    buildPatterns();
    loadHole(0);
    if (!rafId) rafId = requestAnimationFrame(gameLoop);
}

function restartGame() {
    mGO.classList.add('hidden');
    currentHole=0; totalStrokes=0; holeScores=[];
    particles=[];
    HUD.style.display='flex';
    loadHole(0);
}

function loadHole(idx) {
    const lvl = generateLevel(idx);
    ball.x=lvl.ballStart.x; ball.y=lvl.ballStart.y;
    ball.vx=ball.vy=0; ball.radius=10;
    ball.teleCD=ball.boostCD=0;
    hole.x=lvl.hole.x; hole.y=lvl.hole.y; hole.radius=14;
    obstacles = lvl.obstacles;
    particles = [];
    strokes   = 0;
    isAiming  = false;
    autoComplete  = false;
    holeCardTimer = 80;
    skipBtn.style.display = 'none';
    gameState = 'playing';
    updateHUD();
}

// ============================================================
//  GAME LOOP
// ============================================================
function gameLoop() {
    update();
    draw();
    rafId = requestAnimationFrame(gameLoop);
}
</script>
</body>
