<script>
// ── Audio ──────────────────────────────────────────────────────────────────
let soundEnabled = true;
let _audioCtx = null;

function getCtx() {
  if (!_audioCtx || _audioCtx.state === 'closed') {
    _audioCtx = new (window.AudioContext || window.webkitAudioContext)();
  }
  return _audioCtx;
}

function beep(freq = 440, dur = 0.1, type = 'sine') {
  if (!soundEnabled) return;
  try {
    const ctx = getCtx();
    if (ctx.state === 'suspended') ctx.resume();
    const o = ctx.createOscillator();
    const g = ctx.createGain();
    o.connect(g);
    g.connect(ctx.destination);
    o.frequency.value = freq;
    o.type = type;
    g.gain.setValueAtTime(0.22, ctx.currentTime);
    g.gain.exponentialRampToValueAtTime(0.001, ctx.currentTime + dur);
    o.start(ctx.currentTime);
    o.stop(ctx.currentTime + dur + 0.01);
  } catch (e) {}
}

document.getElementById('soundBtn').addEventListener('click', () => {
  soundEnabled = !soundEnabled;
  document.getElementById('soundBtn').textContent = soundEnabled ? '🔊' : '🔇';
  beep(440, 0.05);
});

// ── Confetti ───────────────────────────────────────────────────────────────
function launchConfetti() {
  const canvas = document.createElement('canvas');
  canvas.style.cssText = 'position:fixed;top:0;left:0;width:100%;height:100%;pointer-events:none;z-index:9999;';
  document.body.appendChild(canvas);
  const ctx = canvas.getContext('2d');
  canvas.width = window.innerWidth;
  canvas.height = window.innerHeight;

  const colors = ['#c084fc','#818cf8','#60a5fa','#f59e0b','#34d399','#f472b6'];
  const particles = Array.from({ length: 180 }, () => {
    const angle = (Math.random() * 300 + 120) * Math.PI / 180;
    const speed = 5 + Math.random() * 9;
    return {
      x: canvas.width * (0.2 + Math.random() * 0.6),
      y: canvas.height * 0.35,
      vx: Math.cos(angle) * speed,
      vy: Math.sin(angle) * speed - 2,
      color: colors[Math.floor(Math.random() * colors.length)],
      w: 5 + Math.random() * 7,
      h: 3 + Math.random() * 5,
      rot: Math.random() * 360,
      rotV: (Math.random() - 0.5) * 10,
      life: 1,
      decay: 0.010 + Math.random() * 0.007,
    };
  });

  function draw() {
    ctx.clearRect(0, 0, canvas.width, canvas.height);
    let alive = 0;
    particles.forEach(p => {
      if (p.life <= 0) return;
      p.vy += 0.18; p.vx *= 0.99;
      p.x += p.vx; p.y += p.vy;
      p.rot += p.rotV; p.life -= p.decay;
      ctx.save();
      ctx.translate(p.x, p.y);
      ctx.rotate(p.rot * Math.PI / 180);
      ctx.globalAlpha = Math.max(0, p.life);
      ctx.fillStyle = p.color;
      ctx.fillRect(-p.w / 2, -p.h / 2, p.w, p.h);
      ctx.restore();
      alive++;
    });
    if (alive > 0) requestAnimationFrame(draw);
    else canvas.remove();
  }
  draw();
}

// ── Best Score (localStorage) ──────────────────────────────────────────────
function bestKey() { return `emg_best_${diffSelect.value}`; }
function getBest()  { try { return parseInt(localStorage.getItem(bestKey()) || '0'); } catch(e) { return 0; } }
function saveBest(s) {
  try {
    const prev = getBest();
    if (s > prev) { localStorage.setItem(bestKey(), s); return true; }
  } catch(e) {}
  return false;

function updateMenuBestDisplay() {
  if (modeSelect.value === "2") {
    menuBestEl.textContent = "🏆 2 Players Mode (No High Scores)";
    return;
  }
  const b = getBest();
  const levelName = diffSelect.options[diffSelect.selectedIndex].text.split(' ')[0];
  menuBestEl.textContent = b ? `🏆 Best Score (${levelName}): ${b}` : `🏆 Best Score (${levelName}): 0`;
}
function refreshBestDisplayGame() {
  if (numPlayers === 2) { gameBestEl.textContent = ''; return; }
  const b = getBest();
  gameBestEl.textContent = b ? `🏆 Best: ${b}` : '';
}

modeSelect.addEventListener('change', updateMenuBestDisplay);
diffSelect.addEventListener('change', updateMenuBestDisplay);
updateMenuBestDisplay();

// ── Fisher-Yates shuffle ───────────────────────────────────────────────────
function shuffle(arr) {
  for (let i = arr.length - 1; i > 0; i--) {
    const j = Math.floor(Math.random() * (i + 1));
    [arr[i], arr[j]] = [arr[j], arr[i]];
  }
  return arr;
}

// ── Peek (memorize phase) ──────────────────────────────────────────────────
const PEEK_SEC = 3;

function startPeek(allCardEls) {
  isPeeking = true;
  isProcessing = true;
  allCardEls.forEach(c => c.classList.add('flip'));

  peekOverlay.classList.remove('gone', 'hide');
  peekCd.textContent = PEEK_SEC;

  let remaining = PEEK_SEC;
  const tick = setInterval(() => {
    remaining--;
    peekCd.textContent = remaining;
    if (remaining <= 0) clearInterval(tick);
  }, 1000);
  peekTimers.push(tick);

  const end = setTimeout(() => {
    peekOverlay.classList.add('hide');
    setTimeout(() => peekOverlay.classList.add('gone'), 420);
    allCardEls.forEach(c => c.classList.remove('flip'));
    isPeeking = false;
    isProcessing = false;
    startTimer();
  }, PEEK_SEC * 1000);
  peekTimers.push(end);
}

// ── Stop Game / Cleanup ────────────────────────────────────────────────────
function stopGame() {
  clearInterval(timerID);
  peekTimers.forEach(t => clearTimeout(t));
  peekTimers = [];
  timerID = null;
  peekOverlay.classList.add('gone');
  peekOverlay.classList.remove('hide');
  gameBoard.innerHTML = '';
}

// ── UI Updates ─────────────────────────────────────────────────────────────
function updateTurnUI() {
  if (numPlayers === 1) return;
  if (currentPlayer === 1) {
    turnIndicator.textContent = "Player 1's Turn";
    turnIndicator.style.color = "var(--p1-color)";
    box1.classList.add('active-p1');
    box2.classList.remove('active-p2');
  } else {
    turnIndicator.textContent = "Player 2's Turn";
    turnIndicator.style.color = "var(--p2-color)";
    box2.classList.add('active-p2');
    box1.classList.remove('active-p1');
  }
}

function updateStats() {
  if (numPlayers === 1) {
    val1.textContent = moves;
    val2.textContent = Math.max(score, 0);
  } else {
    val1.textContent = p1Score;
    val2.textContent = p2Score;
  }
}

// ── Start game ─────────────────────────────────────────────────────────────
function startGame() {
  stopGame();
  showGame();

  numPlayers = parseInt(modeSelect.value);
  seconds = 0; matchCount = 0; streak = 0;
  flippedCards = []; isProcessing = false; isPeeking = false;
  streakEl.textContent = '';
  timerEl.textContent = '00:00';

  if (numPlayers === 1) {
    moves = 0; score = 1000;
    label1.textContent = "Moves"; label2.textContent = "Score";
    turnIndicator.textContent = "";
    box1.classList.remove('active-p1'); box2.classList.remove('active-p2');
  } else {
    p1Score = 0; p2Score = 0; currentPlayer = 1;
    label1.textContent = "Player 1"; label2.textContent = "Player 2";
    updateTurnUI();
  }

  updateStats();
  refreshBestDisplayGame();

  const size   = parseInt(diffSelect.value);
  const cols   = size === 8 ? 8 : size;
  const rows   = size === 8 ? 6 : 4;
  const pairs  = (cols * rows) / 2;
  const emSize = size === 8 ? '1.9rem' : size === 6 ? '2.6rem' : '3rem';

  gameBoard.style.gridTemplateColumns = `repeat(${cols}, 1fr)`;

  const src  = themes[document.getElementById('theme').value];
  cards = shuffle([...src.slice(0, pairs), ...src.slice(0, pairs)]);

  const frag = document.createDocumentFragment();
  const allCardEls = [];

  cards.forEach(icon => {
    const card = document.createElement('div');
    card.className = 'card';
    card.dataset.icon = icon;
    card.innerHTML = `<div class="back">?</div><div class="front" style="font-size:${emSize}">${icon}</div>`;
    card.addEventListener('click', flipCard);
    frag.appendChild(card);
    allCardEls.push(card);
  });

  gameBoard.appendChild(frag);
  if (_audioCtx && _audioCtx.state === 'suspended') _audioCtx.resume();
  setTimeout(() => startPeek(allCardEls), 80);
}

// ── Flip ───────────────────────────────────────────────────────────────────
function flipCard() {
  if (isProcessing || this.classList.contains('flip') || this.classList.contains('match')) return;
  this.classList.add('flip');
  flippedCards.push(this);
  beep(350, 0.07);

  if (flippedCards.length === 2) {
    isProcessing = true;
    if (numPlayers === 1) {
      moves++;
      score = Math.max(0, score - 5);
    }
    updateStats();
    setTimeout(checkMatch, 850);
  }
}

// ── Match check ────────────────────────────────────────────────────────────
function checkMatch() {
  const [a, b] = flippedCards;
  flippedCards = [];

  if (a.dataset.icon === b.dataset.icon) {
    a.classList.add('match');
    b.classList.add('match');
    matchCount++;
    streak++;

    const bonus = Math.min(60 + (streak - 1) * 25, 180);
    
    if (numPlayers === 1) {
      score = Math.max(0, score + bonus);
    } else {
      if (currentPlayer === 1) p1Score += bonus;
      else p2Score += bonus;
    }
    updateStats();

    beep(620, 0.08);
    setTimeout(() => beep(940, 0.11), 85);

    if (streak >= 2) showStreak(streak);
    isProcessing = false;
    checkWin();
  } else {
    streak = 0;
    streakEl.textContent = '';
    
    setTimeout(() => {
      a.classList.remove('flip');
      b.classList.remove('flip');
      beep(190, 0.13);

      if (numPlayers === 2) {
        currentPlayer = currentPlayer === 1 ? 2 : 1;
        updateTurnUI();
      }
      isProcessing = false;
    }, 650);
  }
}

// ── Streak banner ──────────────────────────────────────────────────────────
const streakLabels = ['','','🔥 2× Combo!','🔥🔥 3× Combo!','⚡ 4× Hot!','⚡⚡ 5× Blazing!','🌟 MEGA COMBO!'];
let streakClearTimer = null;

function showStreak(n) {
  streakEl.textContent = n < streakLabels.length ? streakLabels[n] : `🌟 ${n}× ULTRA!!`;
  beep(1050, 0.07);
  clearTimeout(streakClearTimer);
  streakClearTimer = setTimeout(() => { streakEl.textContent = ''; }, 2200);
}

// ── Win ────────────────────────────────────────────────────────────────────
// ── SCORE REPORTING TO APP ──
function sendScoreToApp(score, isNewRecord) {
  if (window.ReactNativeWebView) {
    window.ReactNativeWebView.postMessage(JSON.stringify({
      type: 'SEND_SCORE',
      score: score,
      game: 'Epic Memory Game',
      isNewRecord: isNewRecord,
    }));
  }
}

function checkWin() {
  if (matchCount !== cards.length / 2) return;
  clearInterval(timerID);
  timerID = null;

  const winDetails = document.getElementById('winDetails');
  const title = document.getElementById('winTitle');
  const bestMsg = document.getElementById('newBestMsg');
  
  if (numPlayers === 1) {
    const final = Math.max(score, 0);
    const isNew = saveBest(final);
    sendScoreToApp(final, isNew);
    title.textContent = "VICTORY! ★";
    winDetails.innerHTML = `
      <p>Time: <strong>${timerEl.textContent}</strong></p>
      <p>Moves: <strong>${moves}</strong></p>
      <p>Final Score: <strong>${final}</strong></p>
    `;
    bestMsg.textContent = isNew ? '🏆 New Best Score!' : '';
  } else {
    bestMsg.textContent = '';
    if (p1Score > p2Score) {
      title.textContent = "Player 1 Wins!";
      title.style.color = "var(--p1-color)";
    } else if (p2Score > p1Score) {
      title.textContent = "Player 2 Wins!";
      title.style.color = "var(--p2-color)";
    } else {
      title.textContent = "It's a Tie!";
      title.style.color = "var(--gold)";
    }
    
    winDetails.innerHTML = `
      <p style="color:var(--p1-color); font-weight:bold;">Player 1 Score: ${p1Score}</p>
      <p style="color:var(--p2-color); font-weight:bold;">Player 2 Score: ${p2Score}</p>
      <p>Time: <strong>${timerEl.textContent}</strong></p>
    `;
  }

  winModal.classList.add('show');
  setTimeout(launchConfetti, 380);
  [500, 620, 780, 940].forEach((f, i) => setTimeout(() => beep(f, 0.12), i * 90));
}

// ── Timer ──────────────────────────────────────────────────────────────────
function startTimer() {
  if (timerID) return;
  timerID = setInterval(() => {
    seconds++;
    timerEl.textContent =
      String(Math.floor(seconds / 60)).padStart(2, '0') + ':' +
      String(seconds % 60).padStart(2, '0');
      
    // Point drain only in 1P mode
    if (seconds % 15 === 0 && numPlayers === 1) { 
      score = Math.max(0, score - 3); 
      updateStats(); 
    }
  }, 1000);
}

// ── Listeners ─────────────────────────────────────────────────────────────
document.getElementById('startBtn').addEventListener('click', startGame);
document.getElementById('backToMenuBtn').addEventListener('click', showMenu);
document.getElementById('modalMenuBtn').addEventListener('click', showMenu);

</script>
